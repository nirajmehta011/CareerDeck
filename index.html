// ANALYTICS VIEW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function FunnelChart({ applications }) {
  const stages  = ['applied','screening','interview','offer'];
  const counts  = stages.map(s=>applications.filter(j=>j.stage===s||j.stage==='offer'&&s==='interview'||j.stage==='offer'&&s==='screening'||j.stage==='offer'&&s==='applied').length);
  const appCount= applications.filter(j=>['applied','screening','interview','offer'].includes(j.stage)).length;

  const funnel = [
    { from:'Applied', to:'Screening', fromS:'applied', toS:'screening' },
    { from:'Screening', to:'Interview', fromS:'screening', toS:'interview' },
    { from:'Interview', to:'Offer', fromS:'interview', toS:'offer' },
  ].map(f=>{
    const fromN = applications.filter(j=>['applied','screening','interview','offer'].indexOf(j.stage)>=STAGES.indexOf(f.fromS)&&j.stage!=='closed'&&j.stage!=='saved').length;
    const toN   = applications.filter(j=>['screening','interview','offer'].indexOf(j.stage)>=STAGES.indexOf(f.toS)&&j.stage!=='closed'&&j.stage!=='saved').length;
    const pct   = fromN>0?Math.round((toN/fromN)*100):0;
    return { ...f, fromN, toN, pct };
  });

  return (
    <div className="chart-container" style={{ flex:1 }}>
      <div className="chart-title">Conversion Funnel</div>
      {funnel.map(f=>(
        <div key={f.from} className="funnel-bar-row">
          <div className="funnel-bar-label">{f.from} → {f.to}</div>
          <div className="funnel-bar-track">
            <div className="funnel-bar-fill" style={{ width:`${f.pct}%`, background:'var(--accent)' }}>{f.pct>10?`${f.pct}%`:''}</div>
          </div>
          <span className="mono" style={{ fontSize:11, color:'var(--text-2)', width:32, textAlign:'right' }}>{f.pct}%</span>
        </div>
      ))}
    </div>
  );
}

function LineChart({ applications }) {
  const days = 30;
  const w=520, h=100, padL=8, padR=8, padT=8, padB=20;
  const now_ = Date.now();

  const data = useMemo(() => {
    const counts = Array(days).fill(0);
    applications.forEach(j=>{
      const d = Math.floor((now_ - new Date(j.createdAt).getTime())/86400000);
      if(d>=0&&d<days) counts[days-1-d]++;
    });
    return counts;
  }, [applications]);

  const max_ = Math.max(...data,1);
  const pts  = data.map((v,i)=>{
    const x = padL + (i/(days-1))*(w-padL-padR);
    const y = padT + (1-v/max_)*(h-padT-padB);
    return `${x},${y}`;
  }).join(' ');

  return (
    <div className="chart-container" style={{ flex:1 }}>
      <div className="chart-title">Applications (Last 30 Days)</div>
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:'block' }}>
        <defs>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.3"/>
            <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <polygon points={`${padL},${h-padB} ${pts} ${w-padR},${h-padB}`} fill="url(#lineGrad)"/>
        <polyline points={pts} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((v,i)=> v>0 ? (
          <circle key={i} cx={padL+(i/(days-1))*(w-padL-padR)} cy={padT+(1-v/max_)*(h-padT-padB)} r="3" fill="var(--accent)"/>
        ) : null)}
      </svg>
    </div>
  );
}

function DayOfWeekChart({ applications }) {
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const counts = Array(7).fill(0);
  applications.forEach(j=>{ if(j.appliedAt) counts[new Date(j.appliedAt).getDay()]++; });
  const max_ = Math.max(...counts,1);
  const w=400, h=80, bw=40, gap=8, padL=24, padB=20;

  return (
    <div className="chart-container" style={{ flex:1 }}>
      <div className="chart-title">Applications by Day of Week</div>
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:'block' }}>
        {counts.map((v,i)=>{
          const x  = padL + i*(bw+gap);
          const bh = Math.max((v/max_)*(h-padB-10),2);
          const y  = h-padB-bh;
          return (
            <g key={i}>
              <rect x={x} y={y} width={bw} height={bh} rx={4} fill={v===Math.max(...counts)?'var(--accent)':'var(--surface-3)'}/>
              <text x={x+bw/2} y={h-4} textAnchor="middle" fontSize="9" fill="var(--text-3)">{DAYS[i]}</text>
              {v>0&&<text x={x+bw/2} y={y-3} textAnchor="middle" fontSize="9" fill="var(--text-2)">{v}</text>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function WeeklyDigest({ applications }) {
  const { state } = useApp();
  const { user }  = state;
  const [text, setText]       = useState('');
  const [streaming, setStream]= useState(false);
  const [err, setErr]         = useState(null);
  const [done, setDone]       = useState(false);

  const generate = async () => {
    if (!user.apiKey) { setErr(new LLMError('no_key','')); return; }
    setStream(true); setErr(null); setText(''); setDone(false);
    const t = Date.now();
    const added = applications.filter(j=>Date.now()-new Date(j.createdAt).getTime()<7*86400000).length;
    const stale = applications.filter(j=>j.stage==='applied'&&j.appliedAt&&daysSince(j.appliedAt)>=7).map(j=>j.companyName);
    const interviews = applications.filter(j=>j.stage==='interview').length;
    const offers     = applications.filter(j=>j.stage==='offer').length;

    const systemPrompt = `You are a career coach reviewing a job seeker's weekly activity. Be direct, specific, and encouraging. No generic advice. Only insights derived from this specific data. Max 5 sentences. End with exactly ONE recommended action for this week.`;
    const userMsg = `Here is my job search activity for the past 7 days:
- New applications added: ${added}
- Applications with no response for 7+ days: ${stale.join(', ')||'none'}
- Currently in interview stage: ${interviews}
- Offers received: ${offers}
- Total active applications: ${applications.filter(j=>j.stage!=='closed').length}

Generate my weekly momentum digest.`;

    try {
      await callLLM(systemPrompt, userMsg, t=>setText(t), { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      setDone(true);
    } catch(e) { setErr(e); }
    finally { setStream(false); }
  };

  return (
    <div className="chart-container" style={{ marginTop:16 }}>
      <div className="flex-header-responsive" style={{ marginBottom:16 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div className="ai-glow-icon">{Sparkles&&<Sparkles size={20} style={{ color:'var(--accent)' }}/>}</div>
          <div>
            <div style={{ fontWeight:700, color:'var(--text-1)', fontSize:14 }}>Weekly Momentum Digest</div>
            <div style={{ fontSize:12, color:'var(--text-3)' }}>AI-powered job search summary</div>
          </div>
        </div>
        <Btn variant="primary" size="sm" onClick={generate} disabled={streaming}>
          {streaming?<Spinner size={13}/>:(Zap&&<Zap size={13}/>)}
          {streaming?'Generating…':'Generate Digest'}
        </Btn>
      </div>
      <AIError err={err} onRetry={generate}/>
      {text && (
        <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:10, padding:16, fontSize:14, lineHeight:1.8, color:'var(--text-2)', whiteSpace:'pre-wrap' }} className={streaming?'ai-cursor':''}>
          {text}
        </div>
      )}
      {!text && !err && !streaming && (
        <div style={{ color:'var(--text-3)', fontSize:13, textAlign:'center', padding:'16px 0' }}>
          Click "Generate Digest" to get your personalized weekly summary
        </div>
      )}
    </div>
  );
}

function AnalyticsView() {
  const { state } = useApp();
  const { applications } = state;

  const stageCounts = useMemo(()=>{
    const m={};
    STAGES.forEach(s=>m[s]=applications.filter(j=>j.stage===s).length);
    return m;
  },[applications]);

  const insights = useMemo(()=>{
    const list=[];
    const stale = applications.filter(j=>j.stage==='applied'&&j.appliedAt&&daysSince(j.appliedAt)>=10);
    if(stale.length>0) list.push(`${stale.length} application${stale.length>1?'s':''} with no response in 10+ days (${stale.map(j=>j.companyName).slice(0,2).join(', ')}${stale.length>2?'…':''})`);
    const high = applications.filter(j=>j.priority==='high'&&j.stage==='saved');
    if(high.length>0) list.push(`${high.length} high-priority job${high.length>1?'s':''} still in Saved — time to apply!`);
    if(stageCounts.offer>0) list.push(`🎉 You have ${stageCounts.offer} offer${stageCounts.offer>1?'s':''} — congratulations!`);
    const total = applications.filter(j=>j.stage!=='closed').length;
    if(total<5) list.push('Track at least 5 applications to see your full conversion funnel');
    return list;
  },[applications, stageCounts]);

  return (
    <div style={{ flex:1, overflowY:'auto', padding:20, display:'flex', flexDirection:'column', gap:16 }}>
      {/* Stage metric cards */}
      <div className="responsive-grid-6">
        {STAGES.map(s=>{
          const meta=STAGE_META[s];
          return (
            <div key={s} className="stat-card" style={{ borderTop:`3px solid ${meta.color}`, textAlign:'center' }}>
              <div className="mono" style={{ fontSize:26, fontWeight:800, color:meta.color, lineHeight:1 }}>{stageCounts[s]}</div>
              <div style={{ fontSize:11, color:'var(--text-3)', marginTop:4, fontWeight:600 }}>{meta.label}</div>
            </div>
          );
        })}
      </div>

      {/* Charts row */}
      <div style={{ display:'flex', gap:16, flexWrap:'wrap' }}>
        <FunnelChart applications={applications}/>
        <LineChart applications={applications}/>
        <DayOfWeekChart applications={applications}/>
      </div>

      {/* Insights */}
      {insights.length>0&&(
        <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:20 }}>
          <div className="section-title" style={{ marginBottom:12 }}>Auto-Insights</div>
          {insights.map((ins,i)=>(
            <div key={i} style={{ display:'flex', gap:10, padding:'8px 0', borderBottom:i<insights.length-1?'1px solid var(--border)':'none', color:'var(--text-2)', fontSize:13, lineHeight:1.5, alignItems:'flex-start' }}>
              <span style={{ color:'var(--accent)', marginTop:2, flexShrink:0 }}>{Lightbulb?<Lightbulb size={14}/>:'💡'}</span>
              {ins}
            </div>
          ))}
        </div>
      )}

      <WeeklyDigest applications={applications}/>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SETTINGS VIEW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function SettingsView() {
  const { state, dispatch, addToast } = useApp();
  const { user, applications }        = state;
  const [showKey,   setShowKey]   = useState(false);
  const [testing,   setTesting]   = useState(false);
  const [testResult,setTestResult]= useState(null);
  const [fetchingModels, setFetchingModels] = useState(false);
  const [uploadingResume, setUploadingResume] = useState(false);

  const handleResumeUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploadingResume(true);
    try {
      let text = '';
      const name = file.name.toLowerCase();
      if (name.endsWith('.pdf')) {
        text = await parsePDFToText(file);
      } else if (name.endsWith('.docx')) {
        text = await parseDocxToText(file);
      } else if (name.endsWith('.txt')) {
        text = await file.text();
      } else {
        throw new Error('Unsupported file format. Please upload a .pdf, .docx, or .txt file.');
      }
      
      if (!text.trim()) {
        throw new Error('Parsed document is empty or unreadable.');
      }
      
      update('baseResume', text);
      addToast(`Successfully imported resume from ${file.name}!`, 'success');
    } catch(err) {
      console.error(err);
      addToast(`Failed to parse resume: ${err.message}`, 'error');
    } finally {
      setUploadingResume(false);
      e.target.value = '';
    }
  };

  const update = (field, val) => dispatch({ type:A.UPDATE_USER, payload:{ [field]:val } });

  const fetchModelsForProvider = async (provider, apiKey) => {
    if (provider === 'gemini') {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
      if (!res.ok) throw new Error(`API returned status ${res.status}`);
      const data = await res.json();
      if (!data.models) throw new Error('Invalid Gemini models list response');
      return data.models
        .map(m => m.name.replace(/^models\//, ''))
        .filter(name => name.includes('gemini'));
    } else if (provider === 'openai') {
      const res = await fetch('https://api.openai.com/v1/models', {
        headers: { 'Authorization': `Bearer ${apiKey}` }
      });
      if (!res.ok) throw new Error(`API returned status ${res.status}`);
      const data = await res.json();
      if (!data.data) throw new Error('Invalid OpenAI models response');
      return data.data
        .map(m => m.id)
        .filter(id => id.startsWith('gpt-') || id.includes('gpt'));
    } else if (provider === 'anthropic') {
      const res = await fetch('https://api.anthropic.com/v1/models', {
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-allow-browser': 'true'
        }
      });
      if (!res.ok) throw new Error(`API returned status ${res.status}`);
      const data = await res.json();
      if (!data.data) throw new Error('Invalid Anthropic models response');
      return data.data.map(m => m.id);
    } else if (provider === 'openrouter') {
      const res = await fetch('https://openrouter.ai/api/v1/models');
      if (!res.ok) throw new Error(`API returned status ${res.status}`);
      const data = await res.json();
      if (!data.data) throw new Error('Invalid OpenRouter models response');
      const models = data.data.map(m => m.id);
      const freeModels = models.filter(id => id.includes(':free'));
      const paidModels = models.filter(id => !id.includes(':free'));
      return [...freeModels, ...paidModels];
    } else if (provider === 'groq') {
      const res = await fetch('https://api.groq.com/openai/v1/models', {
        headers: { 'Authorization': `Bearer ${apiKey}` }
      });
      if (!res.ok) throw new Error(`API returned status ${res.status}`);
      const data = await res.json();
      if (!data.data) throw new Error('Invalid Groq models response');
      return data.data.map(m => m.id);
    } else if (provider === 'deepseek') {
      const res = await fetch('https://api.deepseek.com/models', {
        headers: { 'Authorization': `Bearer ${apiKey}` }
      });
      if (!res.ok) throw new Error(`API returned status ${res.status}`);
      const data = await res.json();
      if (!data.data) throw new Error('Invalid DeepSeek models response');
      return data.data.map(m => m.id);
    }
    return [];
  };

  const fetchModels = async () => {
    if (!user.apiKey) { addToast('Please enter an API key first.', 'warning'); return; }
    setFetchingModels(true);
    try {
      const fetchedModels = await fetchModelsForProvider(user.llmProvider, user.apiKey);
      if (fetchedModels && fetchedModels.length > 0) {
        const updatedModels = { ...(user.availableModels || DEF_USER.availableModels), [user.llmProvider]: fetchedModels };
        dispatch({
          type: A.UPDATE_USER,
          payload: {
            availableModels: updatedModels,
            llmModel: fetchedModels.includes(user.llmModel) ? user.llmModel : fetchedModels[0]
          }
        });
        addToast(`Loaded ${fetchedModels.length} models for ${PROVIDERS[user.llmProvider]?.label}`, 'success');
      } else {
        addToast('No models returned from API.', 'warning');
      }
    } catch (e) {
      console.error(e);
      addToast(`Error fetching models (likely CORS or block): ${e.message}`, 'error');
    } finally {
      setFetchingModels(false);
    }
  };

  const testConnection = async () => {
    if (!user.apiKey) { setTestResult({ ok:false, msg:'No API key set' }); return; }
    setTesting(true); setTestResult(null);
    try {
      let full='';
      await callLLM('Respond with exactly: OK', 'Say OK', t=>full=t, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      setTestResult({ ok:true, msg:`Connected to ${PROVIDERS[user.llmProvider]?.label} (${user.llmModel})` });
      
      // Auto-fetch models on success
      try {
        const fetchedModels = await fetchModelsForProvider(user.llmProvider, user.apiKey);
        if (fetchedModels && fetchedModels.length > 0) {
          const updatedModels = { ...(user.availableModels || DEF_USER.availableModels), [user.llmProvider]: fetchedModels };
          dispatch({
            type: A.UPDATE_USER,
            payload: {
              availableModels: updatedModels,
              llmModel: fetchedModels.includes(user.llmModel) ? user.llmModel : fetchedModels[0]
            }
          });
          addToast(`Loaded ${fetchedModels.length} models for ${PROVIDERS[user.llmProvider]?.label}`, 'success');
        }
      } catch (me) {
        console.warn('Failed to fetch models list, using defaults:', me);
        addToast(`Connection succeeded. Could not fetch models list: ${me.message}`, 'info');
      }
    } catch(e) { setTestResult({ ok:false, msg:e.message }); }
    finally { setTesting(false); }
  };

  const exportData = () => {
    const data = JSON.stringify({ applications, user }, null, 2);
    const blob  = new Blob([data],{ type:'application/json' });
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement('a');
    a.href=url; a.download='careerdeck-backup.json'; a.click();
    URL.revokeObjectURL(url);
    addToast('Data exported', 'success');
  };

  const clearData = () => {
    if (!confirm('Are you sure? This will delete all your job applications.')) return;
    Object.values(LS).forEach(k=>localStorage.removeItem(k));
    window.location.reload();
  };

  return (
    <div style={{ flex:1, overflowY:'auto', padding:20, maxWidth:680 }}>
      <h1 style={{ fontSize:22, fontWeight:800, letterSpacing:'-0.02em', color:'var(--text-1)', marginBottom:20 }}>Settings</h1>

      {/* Profile */}
      <div className="settings-section">
        <div className="settings-section-header">{Users&&<Users size={15}/>} Profile</div>
        <div className="settings-section-body">
          <div className="responsive-grid-2">
            <div className="field-group">
              <label className="field-label">Your Name</label>
              <input className="field-input" value={user.name} onChange={e=>update('name',e.target.value)} placeholder="Jane Smith"/>
            </div>
            <div className="field-group">
              <label className="field-label">Email</label>
              <input className="field-input" type="email" value={user.email} onChange={e=>update('email',e.target.value)} placeholder="jane@example.com"/>
            </div>
          </div>
        </div>
      </div>

      {/* AI / LLM */}
      <div className="settings-section">
        <div className="settings-section-header">{Brain&&<Brain size={15}/>} AI Configuration</div>
        <div className="settings-section-body">
          <div className="responsive-grid-2">
            <div className="field-group">
              <label className="field-label">LLM Provider</label>
              <select className="field-input" value={user.llmProvider} onChange={e=>{
                const p=e.target.value;
                update('llmProvider',p);
                const pModels = user.availableModels?.[p] || PROVIDERS[p].models;
                update('llmModel', pModels[0]);
              }}>
                {Object.entries(PROVIDERS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
            <div className="field-group">
              <label className="field-label">Model</label>
              <div style={{ display:'flex', gap:8 }}>
                <select className="field-input" value={user.llmModel} onChange={e=>update('llmModel',e.target.value)} style={{ flex:1 }}>
                  {((user.availableModels && user.availableModels[user.llmProvider]) || PROVIDERS[user.llmProvider]?.models || []).map(m=><option key={m} value={m}>{m}</option>)}
                </select>
                <Btn variant="secondary" size="sm" onClick={fetchModels} disabled={fetchingModels} style={{ padding:'0 10px' }} title="Fetch models from API">
                  {fetchingModels ? <Spinner size={12}/> : (RefreshCw && <RefreshCw size={12}/>)}
                </Btn>
              </div>
            </div>
          </div>
          <div className="field-group">
            <label className="field-label">API Key</label>
            <div style={{ position:'relative' }}>
              <input className="field-input" type={showKey?'text':'password'} value={user.apiKey}
                onChange={e=>update('apiKey',e.target.value)}
                placeholder={`Your ${PROVIDERS[user.llmProvider]?.label} API key…`}
                style={{ paddingRight:44 }}/>
              <button className="btn btn-ghost btn-icon" aria-label={showKey?'Hide key':'Show key'}
                style={{ position:'absolute', right:4, top:'50%', transform:'translateY(-50%)' }}
                onClick={()=>setShowKey(v=>!v)}>
                {showKey?(Eye&&<Eye size={14}/>):(EyeOff&&<EyeOff size={14}/>)}
              </button>
            </div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <Btn variant="secondary" size="sm" onClick={testConnection} disabled={testing}>
              {testing?<Spinner size={13}/>:(Zap&&<Zap size={13}/>)}
              {testing?'Testing…':'Test Connection'}
            </Btn>
            {testResult && (
              <span style={{ fontSize:12, color:testResult.ok?'var(--success)':'var(--danger)', display:'flex', alignItems:'center', gap:5 }}>
                {testResult.ok?(CheckCircle&&<CheckCircle size={13}/>):(XCircle&&<XCircle size={13}/>)}
                {testResult.msg}
              </span>
            )}
          </div>
          {user.llmProvider !== 'gemini' && (
            <div style={{ background:'rgba(251,191,36,0.08)', border:'1px solid rgba(251,191,36,0.3)', borderRadius:8, padding:'10px 14px', fontSize:12, color:'var(--warning)', display:'flex', gap:8 }}>
              {AlertTriangle&&<AlertTriangle size={14} style={{ flexShrink:0, marginTop:1 }}/>}
              {`${PROVIDERS[user.llmProvider]?.label} may restrict direct browser calls due to CORS policies. If you encounter errors, use Google Gemini (free/cheap tier) which works natively in the browser, or use a browser extension / CORS proxy.`}
            </div>
          )}
        </div>
      </div>

      {/* Base Resume */}
      <div id="settings-resume-section" className="settings-section" style={{ transition: 'outline 0.15s ease-in-out', borderRadius: 12 }}>
        <div className="settings-section-header">{FileText&&<FileText size={15}/>} Base Resume</div>
        <div className="settings-section-body">
          <div className="field-group">
            <label className="field-label">Master Resume (plain text)</label>
            
            {/* File Upload UI */}
            <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:12, padding:12, background:'var(--surface-2)', border:'1px dashed var(--border)', borderRadius:8 }}>
              <span style={{ fontSize:13, color:'var(--text-2)', flex:1 }}>
                {uploadingResume ? 'Parsing document…' : 'Import from file (.pdf, .docx, .txt)'}
              </span>
              <label className="btn btn-secondary btn-sm" style={{ cursor:'pointer', margin:0, display:'inline-flex', alignItems:'center', gap:5 }}>
                {uploadingResume ? <Spinner size={12}/> : (Upload && <Upload size={12}/>)}
                {uploadingResume ? 'Uploading…' : 'Upload File'}
                <input type="file" accept=".pdf,.docx,.txt" style={{ display:'none' }}
                  onChange={handleResumeUpload} disabled={uploadingResume}/>
              </label>
            </div>

            <textarea className="field-input" style={{ minHeight:200, fontFamily:'JetBrains Mono, monospace', fontSize:12 }}
              value={user.baseResume} onChange={e=>update('baseResume',e.target.value)}
              placeholder="Paste your full resume text here or upload a document. AI features (Resume Tailor, ATS Scanner, Match Score) will use this as the base…"/>
          </div>
          <div style={{ fontSize:12, color:'var(--text-3)' }}>
            {user.baseResume.length>0?`${user.baseResume.length} characters · ${user.baseResume.split(/\s+/).filter(Boolean).length} words`:'No resume added yet'}
          </div>
        </div>
      </div>

      {/* Preferences */}
      <div className="settings-section">
        <div className="settings-section-header">{Bell&&<Bell size={15}/>} Preferences</div>
        <div className="settings-section-body">
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div>
              <div style={{ fontWeight:600, color:'var(--text-1)', fontSize:13 }}>Follow-up Reminders</div>
              <div style={{ fontSize:12, color:'var(--text-3)' }}>Get reminded when to follow up on applications</div>
            </div>
            <input type="checkbox" checked={user.preferences?.weeklyDigestEnabled!==false} onChange={e=>update('preferences',{...user.preferences,weeklyDigestEnabled:e.target.checked})}/>
          </div>
        </div>
      </div>

      {/* Data */}
      <div className="settings-section">
        <div className="settings-section-header">{Database&&<Database size={15}/>} Data Management</div>
        <div className="settings-section-body">
          <div className="responsive-grid-2" style={{ gap:10 }}>
            <Btn variant="secondary" onClick={exportData}>{Download&&<Download size={13}/>} Export JSON</Btn>
            <Btn variant="danger" onClick={clearData}>{Trash2&&<Trash2 size={13}/>} Clear All Data</Btn>
          </div>
          <div style={{ fontSize:12, color:'var(--text-3)' }}>
            {applications.length} applications stored · All data is saved locally in your browser
          </div>
        </div>
      </div>

      {/* Keyboard shortcuts */}
      <div className="settings-section">
        <div className="settings-section-header">{Keyboard&&<Keyboard size={15}/>} Keyboard Shortcuts</div>
        <div className="settings-section-body">
          {[
            ['⌘K / Ctrl+K','Open command palette'],
            ['N','New job (when not typing)'],
            ['Escape','Close any modal or panel'],
            ['⌘1','Switch to Kanban view'],
            ['⌘2','Switch to List view'],
            ['⌘3','Switch to Analytics view'],
            ['/','Focus search bar'],
          ].map(([k,v])=>(
            <div key={k} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 0', borderBottom:'1px solid var(--border)' }}>
              <span style={{ fontSize:12, color:'var(--text-2)' }}>{v}</span>
              <kbd style={{ background:'var(--surface-3)', border:'1px solid var(--border-2)', borderRadius:4, padding:'2px 8px', fontSize:11, fontFamily:'JetBrains Mono,monospace', color:'var(--text-1)' }}>{k}</kbd>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ADD JOB MODAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const BLANK_JOB = { companyName:'', roleName:'', stage:'saved', location:'', remote:false, salaryMin:'', salaryMax:'', jobUrl:'', jdText:'', tags:'', notes:'', priority:'medium' };

function AddJobModal() {
  const { state, dispatch, addToast } = useApp();
  const { modals, user }              = state;
  const [tab,  setTab]  = useState('paste');
  const [form, setForm] = useState(BLANK_JOB);
  const [parsing, setParsing] = useState(false);
  const [parseErr, setParseErr] = useState(null);
  const [pastedJD, setPastedJD] = useState('');

  const close = () => { dispatch({ type:A.SET_MODAL, payload:{ addJob:false } }); setForm(BLANK_JOB); setPastedJD(''); setParseErr(null); setTab('paste'); };

  if (!modals.addJob) return null;

  const f = (field,val) => setForm(p=>({...p,[field]:val}));

  const parseWithAI = async () => {
    if (!pastedJD.trim()) { setParseErr(new LLMError('parse_error','Please paste a job description first.')); return; }
    if (!user.apiKey) { setParseErr(new LLMError('no_key','')); return; }
    setParsing(true); setParseErr(null);
    const sys = `You are a job listing parser. Extract structured data from the job listing text provided.
Return ONLY valid JSON, no markdown, no explanation.
Schema: {"companyName":string,"roleName":string,"location":string,"remote":boolean,"salaryMin":number|null,"salaryMax":number|null,"jdSummary":string,"tags":string[],"jdText":string}`;
    try {
      let full='';
      await callLLM(sys, `Parse this job listing:\n\n${pastedJD}`, t=>full=t, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      const parsed = parseAIJSON(full);
      setForm(p=>({...p, companyName:parsed.companyName||p.companyName, roleName:parsed.roleName||p.roleName, location:parsed.location||'', remote:parsed.remote||false, salaryMin:parsed.salaryMin||'', salaryMax:parsed.salaryMax||'', jdText:parsed.jdText||pastedJD, tags:(parsed.tags||[]).join(', '), notes:parsed.jdSummary||'' }));
      setTab('manual');
      addToast('Job parsed — review and save', 'ai');
    } catch(e) { setParseErr(e); }
    finally { setParsing(false); }
  };

  const save = () => {
    if (!form.companyName.trim() || !form.roleName.trim()) { alert('Company name and role are required.'); return; }
    const job = {
      id:uid(), createdAt:now(), updatedAt:now(), activityLog:[], contacts:[], interviewRounds:[],
      followUpDate:null, followUpSent:false, matchScore:null, atsSuggestions:[], resumeText:'', coverLetter:'', companyLogo:'',
      jdSummary:'',
      ...form,
      salaryMin: form.salaryMin?Number(form.salaryMin):null,
      salaryMax: form.salaryMax?Number(form.salaryMax):null,
      tags: form.tags ? form.tags.split(',').map(t=>t.trim()).filter(Boolean) : [],
      appliedAt: form.stage==='applied'?now():null,
    };
    dispatch({ type:A.ADD_JOB, payload:job });
    addToast(`Added ${job.companyName} — ${job.roleName}`, 'success');
    close();
  };

  return (
    <div className="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="add-job-title" onClick={e=>e.target===e.currentTarget&&close()}>
      <div className="modal-box md">
        <div className="modal-header">
          <h2 id="add-job-title" style={{ fontSize:18, fontWeight:700 }}>{Plus&&<Plus size={16} style={{ display:'inline', marginRight:8 }}/>}Add Job</h2>
          <button className="btn btn-ghost btn-icon" onClick={close} aria-label="Close">{X&&<X size={16}/>}</button>
        </div>

        {/* Tabs */}
        <div style={{ padding:'0 24px 0', borderBottom:'1px solid var(--border)' }}>
          <div className="tabs" style={{ display:'inline-flex', margin:'12px 0' }}>
            <button className={`tab${tab==='paste'?' active':''}`} onClick={()=>setTab('paste')}>
              {Sparkles&&<Sparkles size={12} style={{ display:'inline', marginRight:4 }}/>}Paste JD (AI Parse)
            </button>
            <button className={`tab${tab==='manual'?' active':''}`} onClick={()=>setTab('manual')}>
              {Edit3&&<Edit3 size={12} style={{ display:'inline', marginRight:4 }}/>}Manual Entry
            </button>
          </div>
        </div>

        <div className="modal-body" style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {tab==='paste' && (
            <>
              <div style={{ background:'var(--accent-glow)', border:'1px solid rgba(79,142,247,0.3)', borderRadius:10, padding:'12px 16px', fontSize:13, color:'var(--text-2)', lineHeight:1.6 }}>
                <strong style={{ color:'var(--accent)' }}>AI-Powered Import:</strong> Paste the full job description below and AI will extract all the details automatically.
              </div>
              <div className="field-group">
                <label className="field-label" htmlFor="jd-paste">Job Description *</label>
                <textarea id="jd-paste" className="field-input" style={{ minHeight:200 }}
                  value={pastedJD} onChange={e=>setPastedJD(e.target.value)}
                  placeholder="Paste the full job description here — title, company, responsibilities, requirements, salary info, etc."/>
              </div>
              <AIError err={parseErr} />
              <div style={{ display:'flex', gap:10 }}>
                <Btn variant="primary" onClick={parseWithAI} disabled={parsing}>
                  {parsing?<Spinner size={14}/>:(Wand2&&<Wand2 size={14}/>)}
                  {parsing?'Analyzing job listing…':'Parse with AI'}
                </Btn>
                <Btn variant="secondary" onClick={()=>setTab('manual')}>Enter manually instead</Btn>
              </div>
            </>
          )}

          {tab==='manual' && (
            <>
              <div className="responsive-grid-2">
                <div className="field-group">
                  <label className="field-label" htmlFor="co-name">Company Name *</label>
                  <input id="co-name" className="field-input" value={form.companyName} onChange={e=>f('companyName',e.target.value)} placeholder="Acme Corp"/>
                </div>
                <div className="field-group">
                  <label className="field-label" htmlFor="role">Role Title *</label>
                  <input id="role" className="field-input" value={form.roleName} onChange={e=>f('roleName',e.target.value)} placeholder="Senior Engineer"/>
                </div>
              </div>
              <div className="responsive-grid-2">
                <div className="field-group">
                  <label className="field-label" htmlFor="stage-sel">Stage</label>
                  <select id="stage-sel" className="field-input" value={form.stage} onChange={e=>f('stage',e.target.value)}>
                    {STAGES.map(s=><option key={s} value={s}>{STAGE_META[s].label}</option>)}
                  </select>
                </div>
                <div className="field-group">
                  <label className="field-label" htmlFor="priority-sel">Priority</label>
                  <select id="priority-sel" className="field-input" value={form.priority} onChange={e=>f('priority',e.target.value)}>
                    <option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option>
                  </select>
                </div>
              </div>
              <div className="responsive-grid-2">
                <div className="field-group">
                  <label className="field-label" htmlFor="loc">Location</label>
                  <input id="loc" className="field-input" value={form.location} onChange={e=>f('location',e.target.value)} placeholder="San Francisco, CA"/>
                </div>
                <div className="field-group" style={{ justifyContent:'flex-end' }}>
                  <label className="field-label">Remote</label>
                  <label style={{ display:'flex', alignItems:'center', gap:8, cursor:'pointer', paddingTop:4 }}>
                    <input type="checkbox" checked={form.remote} onChange={e=>f('remote',e.target.checked)}/>
                    <span style={{ fontSize:13, color:'var(--text-2)' }}>Remote role</span>
                  </label>
                </div>
              </div>
              <div className="responsive-grid-2">
                <div className="field-group">
                  <label className="field-label" htmlFor="sal-min">Salary Min ($)</label>
                  <input id="sal-min" className="field-input mono" type="number" value={form.salaryMin} onChange={e=>f('salaryMin',e.target.value)} placeholder="120000"/>
                </div>
                <div className="field-group">
                  <label className="field-label" htmlFor="sal-max">Salary Max ($)</label>
                  <input id="sal-max" className="field-input mono" type="number" value={form.salaryMax} onChange={e=>f('salaryMax',e.target.value)} placeholder="160000"/>
                </div>
              </div>
              <div className="field-group">
                <label className="field-label" htmlFor="job-url">Job URL</label>
                <input id="job-url" className="field-input" value={form.jobUrl} onChange={e=>f('jobUrl',e.target.value)} placeholder="https://…"/>
              </div>
              <div className="field-group">
                <label className="field-label" htmlFor="jd-text">Job Description</label>
                <textarea id="jd-text" className="field-input" style={{ minHeight:100 }} value={form.jdText} onChange={e=>f('jdText',e.target.value)} placeholder="Paste the full job description for AI features…"/>
              </div>
              <div className="field-group">
                <label className="field-label" htmlFor="tags">Tags (comma-separated)</label>
                <input id="tags" className="field-input" value={form.tags} onChange={e=>f('tags',e.target.value)} placeholder="React, TypeScript, Senior, Remote"/>
              </div>
              <div className="field-group">
                <label className="field-label" htmlFor="notes-add">Notes</label>
                <textarea id="notes-add" className="field-input" style={{ minHeight:70 }} value={form.notes} onChange={e=>f('notes',e.target.value)} placeholder="Why this role excites you, referrals, etc."/>
              </div>
            </>
          )}
        </div>

        {tab==='manual'&&(
          <div className="modal-footer">
            <Btn variant="ghost" onClick={close}>Cancel</Btn>
            <Btn variant="primary" onClick={save}>{CheckCircle&&<CheckCircle size={14}/>} Save Job</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// JOB DETAIL PANEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function OverviewTab({ job }) {
  const { dispatch, addToast } = useApp();
  const [editNotes, setEditNotes] = useState(false);
  const [notes, setNotes]         = useState(job.notes||'');
  const [newTag, setNewTag]       = useState('');
  const [addingContact, setAddingContact] = useState(false);
  const [newContact, setNewContact]       = useState({ name:'', role:'', linkedIn:'', note:'' });
  const [expanded, setExpanded]   = useState(false);

  const saveNotes = () => { dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, notes, updatedAt:now() } }); setEditNotes(false); addToast('Notes saved','success'); };
  const addTag = (e) => {
    if ((e.key==='Enter'||e.key===',')&&newTag.trim()) {
      dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, tags:[...(job.tags||[]),newTag.trim()], updatedAt:now() } });
      setNewTag('');
    }
  };
  const removeTag = (t) => dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, tags:(job.tags||[]).filter(x=>x!==t), updatedAt:now() } });
  const saveContact = () => {
    if (!newContact.name.trim()) return;
    dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, contacts:[...(job.contacts||[]),{ id:uid(),...newContact }], updatedAt:now() } });
    setNewContact({ name:'', role:'', linkedIn:'', note:'' });
    setAddingContact(false);
  };

  const JD = job.jdText || '';
  const JDPreview = expanded ? JD : JD.slice(0,600);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {/* Key details */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        {[
          { label:'Location', val:job.location||(job.remote?'Remote':'—'), icon:MapPin },
          { label:'Salary', val:job.salaryMin?`$${(job.salaryMin/1000).toFixed(0)}K–$${(job.salaryMax/1000).toFixed(0)}K`:'—', icon:DollarSign, mono:true },
          { label:'Applied', val:job.appliedAt?formatDate(job.appliedAt):'Not yet', icon:Calendar },
          { label:'Priority', val:PRIORITY_META[job.priority||'medium']?.label, icon:Star },
        ].map(({ label,val,icon:Icon,mono })=>(
          <div key={label} style={{ background:'var(--bg)', borderRadius:8, padding:'10px 12px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:5, color:'var(--text-3)', fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:3 }}>
              {Icon&&<Icon size={11}/>} {label}
            </div>
            <div style={{ fontSize:13, fontWeight:600, color:'var(--text-1)' }} className={mono?'mono':''}>{val}</div>
          </div>
        ))}
      </div>

      {/* URL */}
      {job.jobUrl && (
        <a href={job.jobUrl} target="_blank" rel="noopener noreferrer" style={{ display:'flex', alignItems:'center', gap:6, color:'var(--accent)', fontSize:13 }}>
          {ExternalLink&&<ExternalLink size={13}/>} View original job posting
        </a>
      )}

      {/* Tags */}
      <div>
        <div className="section-title">Tags</div>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' }}>
          {(job.tags||[]).map(t=>(
            <span key={t} className="tag-chip" style={{ cursor:'pointer' }} onClick={()=>removeTag(t)} title="Click to remove">
              {t} <X size={10}/>
            </span>
          ))}
          <input className="field-input" style={{ width:120, padding:'3px 8px', fontSize:12 }}
            value={newTag} onChange={e=>setNewTag(e.target.value)} onKeyDown={addTag}
            placeholder="Add tag…" aria-label="Add tag"/>
        </div>
      </div>

      {/* JD */}
      {JD && (
        <div>
          <div className="section-title">Job Description</div>
          <div style={{ background:'var(--bg)', borderRadius:8, padding:'12px 14px', fontSize:13, lineHeight:1.7, color:'var(--text-2)', whiteSpace:'pre-wrap', maxHeight:expanded?'none':200, overflow:'hidden' }}>
            {JDPreview}{!expanded&&JD.length>600?'…':''}
          </div>
          {JD.length>600&&(
            <button className="btn btn-ghost btn-sm" style={{ marginTop:6 }} onClick={()=>setExpanded(v=>!v)}>
              {expanded?'Show less':'Show more'}
            </button>
          )}
        </div>
      )}

      {/* Notes */}
      <div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
          <div className="section-title" style={{ marginBottom:0 }}>Notes</div>
          <Btn size="sm" variant="ghost" onClick={()=>setEditNotes(v=>!v)}>{Edit3&&<Edit3 size={12}/>} Edit</Btn>
        </div>
        {editNotes ? (
          <div>
            <textarea className="field-input" style={{ minHeight:80 }} value={notes} onChange={e=>setNotes(e.target.value)}/>
            <div style={{ display:'flex', gap:8, marginTop:8 }}>
              <Btn size="sm" variant="primary" onClick={saveNotes}>Save</Btn>
              <Btn size="sm" variant="ghost" onClick={()=>setEditNotes(false)}>Cancel</Btn>
            </div>
          </div>
        ) : (
          <div style={{ fontSize:13, color:job.notes?'var(--text-2)':'var(--text-3)', lineHeight:1.6 }}>
            {job.notes||'No notes yet. Click Edit to add notes.'}
          </div>
        )}
      </div>

      {/* Contacts */}
      <div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
          <div className="section-title" style={{ marginBottom:0 }}>Contacts</div>
          <Btn size="sm" variant="ghost" onClick={()=>setAddingContact(v=>!v)}>{UserPlus&&<UserPlus size={12}/>} Add</Btn>
        </div>
        {addingContact&&(
          <div style={{ background:'var(--bg)', borderRadius:8, padding:12, marginBottom:10, display:'flex', flexDirection:'column', gap:8 }}>
            <div className="responsive-grid-2" style={{ gap:8 }}>
              <input className="field-input" placeholder="Name" value={newContact.name} onChange={e=>setNewContact(p=>({...p,name:e.target.value}))}/>

function JobDetailPanel() {
  const { state, dispatch, addToast } = useApp();
  const { selectedJobId, applications } = state;
  const job = applications.find(j=>j.id===selectedJobId);
  const [tab, setTab]     = useState('overview');
  const panelRef          = useRef(null);

  useEffect(()=>{ if(job) setTab('overview'); },[selectedJobId]);

  useEffect(()=>{
    if(!job) return;
    const el = panelRef.current;
    if(!el) return;
    const focusable = el.querySelectorAll('button,input,textarea,select,[tabindex]:not([tabindex="-1"])');
    const first = focusable[0], last = focusable[focusable.length-1];
    first?.focus();
    const trap = (e)=>{
      if(e.key==='Tab'){
        if(e.shiftKey&&document.activeElement===first){e.preventDefault();last?.focus();}
        else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first?.focus();}
      }
    };
    el.addEventListener('keydown',trap);
    return ()=>el.removeEventListener('keydown',trap);
  },[job]);

  if (!job) return null;

  const meta = STAGE_META[job.stage];

  const changeStage = (s) => {
    const entry = { id:uid(), event:'stage_changed', timestamp:now(), source:'user', detail:{ from:job.stage, to:s } };
    dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, stage:s, updatedAt:now(), appliedAt:s==='applied'&&!job.appliedAt?now():job.appliedAt, activityLog:[entry,...(job.activityLog||[])] } });
    addToast(`Moved to ${STAGE_META[s].label}`, 'success');
  };

  const close = () => dispatch({ type:A.SELECT_JOB, payload:null });

  const tabs=[
    { id:'overview',  label:'Overview'  },
    { id:'ai',        label:'AI Tools'  },
    { id:'activity',  label:'Activity'  },
    { id:'interview', label:'Interviews'},
    { id:'docs',      label:'Documents' },
  ];

  return (
    <>
      <div className="detail-panel-overlay" onClick={close} aria-hidden="true"/>
      <div className="detail-panel" ref={panelRef} role="dialog" aria-modal="true" aria-labelledby="panel-title">
        {/* Header */}
        <div style={{ padding:'16px 20px', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'flex-start', gap:12, marginBottom:12 }}>
            <CompanyLogo name={job.companyName} size={40}/>
            <div style={{ flex:1, minWidth:0 }}>
              <div id="panel-title" style={{ fontSize:17, fontWeight:800, letterSpacing:'-0.02em', color:'var(--text-1)', lineHeight:1.2 }}>{job.companyName}</div>
              <div style={{ fontSize:14, color:'var(--text-2)', marginTop:2 }}>{job.roleName}</div>
            </div>
            <button className="btn btn-ghost btn-icon" onClick={close} aria-label="Close panel">{X&&<X size={16}/>}</button>
          </div>

          {/* Stage pills */}
          <div style={{ display:'flex', gap:5, flexWrap:'wrap', marginBottom:10 }}>
            {STAGES.map(s=>(
              <button key={s} className="stage-pill"
                style={{ background:job.stage===s?STAGE_META[s].bg:'var(--surface-2)', color:job.stage===s?STAGE_META[s].color:'var(--text-3)', borderColor:job.stage===s?STAGE_META[s].color+'66':'var(--border)', fontSize:11 }}
                onClick={()=>changeStage(s)} aria-label={`Set stage to ${STAGE_META[s].label}`} aria-pressed={job.stage===s}>
                {STAGE_META[s].label}
              </button>
            ))}
          </div>

          {/* Match + priority */}
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <MatchChip score={job.matchScore}/>
            <span style={{ fontSize:11, fontWeight:600, color:PRIORITY_META[job.priority||'medium']?.color }}>
              ● {PRIORITY_META[job.priority||'medium']?.label} Priority
            </span>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ padding:'0 20px', borderBottom:'1px solid var(--border)', flexShrink:0, overflowX:'auto' }}>
          <div style={{ display:'flex', gap:0 }}>
            {tabs.map(t=>(
              <button key={t.id} className={`tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)} style={{ borderRadius:0, borderBottom:tab===t.id?'2px solid var(--accent)':'2px solid transparent', paddingBottom:10 }}>
                {t.label}
              </button>
            ))}
          </div>
        </div>

        {/* Tab content */}
        <div style={{ flex:1, overflowY:'auto', padding:'20px 20px 80px' }}>
          {tab==='overview'  && <OverviewTab job={job}/>}
          {tab==='ai'        && <AIToolsTab job={job}/>}
          {tab==='activity'  && <ActivityTab job={job}/>}
          {tab==='interview' && <InterviewTab job={job}/>}
          {tab==='docs'      && <DocumentsTab job={job}/>}
        </div>
      </div>
    </>
  );
}

function ResumeTailor({ job, user }) {
  const { dispatch, addToast } = useApp();
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr]       = useState(null);
  const [accepted, setAccepted] = useState({});
  const [activeTab, setActiveTab] = useState('tune'); // 'tune' or 'preview'
  const [tailoredText, setTailoredText] = useState('');
  const [isEditing, setIsEditing] = useState(false);

  useEffect(() => {
    if (result) {
      setTailoredText(compileStructuredResumeToText(result, accepted));
    } else {
      setTailoredText('');
    }
  }, [result, accepted]);

  if (!user.apiKey) return <NoAPIKey/>;
  if (!user.baseResume) return <NoResume/>;

  const run = async () => {
    setLoading(true); setErr(null); setResult(null); setActiveTab('tune');
    const sys = `You are a world-class Executive Resume Writer with deep expertise in ATS optimization and hiring psychology. Your mission is to transform the candidate's raw resume data into a top-tier, industry-standard tailored resume for the target role.

CONTENT OPTIMIZATION RULES (apply strictly before generating output):

1. PROFESSIONAL SUMMARY: Write a powerful 3-sentence executive summary that: (a) highlights the candidate's unique value proposition aligned to the target role, (b) calls out 2-3 quantifiable top achievements, and (c) ends with a forward-facing statement of intent.

2. EXPERIENCE — XYZ FORMULA: Rewrite every bullet point using the XYZ impact formula: "Accomplished [X] as measured by [Y], by doing [Z]." Rules:
   - Always start with a strong action verb (Led, Architected, Delivered, Reduced, Scaled, Streamlined, etc.)
   - Include quantifiable metrics wherever present in the original (%, $, time saved, number of users/services/team members)
   - Weave in keywords from the target JD naturally
   - NEVER invent metrics, dates, company names, degrees or facts not in the original resume
   - If original bullet has no metrics, still rewrite with strong action verbs and relevant keywords

3. SKILLS GROUPING: Organize skills into clear logical categories such as:
   - Technical Skills / Programming Languages
   - Frameworks & Libraries
   - Testing & QA Tools (if applicable)
   - DevOps & Cloud
   - Core Competencies / Soft Skills
   Only include categories that have actual items from the original resume.

4. FACTUAL INTEGRITY: Do NOT fabricate any information. Only use data present in the original resume.

Return ONLY valid JSON with this exact structure (no markdown, no code blocks, raw JSON only):
{
  "personalInfo": {
    "name": "string",
    "email": "string",
    "phone": "string",
    "location": "string",
    "linkedin": "string",
    "website": "string",
    "targetRole": "string (inferred target role title)"
  },
  "summary": "string (3-sentence executive summary per rules above)",
  "experience": [
    {
      "role": "string",
      "company": "string",
      "location": "string",
      "dates": "string",
      "bullets": [
        {
          "original": "string (exact original bullet text)",
          "rewritten": "string (XYZ-formula rewritten bullet)",
          "keywordsAdded": ["string (keywords added from JD)"]
        }
      ]
    }
  ],
  "education": [
    {
      "degree": "string",
      "school": "string",
      "location": "string",
      "dates": "string"
    }
  ],
  "skills": [
    {
      "category": "string (e.g. Technical Skills, Frameworks & Libraries, Core Competencies)",
      "items": ["string"]
    }
  ],
  "projects": [
    {
      "name": "string",
      "description": "string",
      "url": "string"
    }
  ],
  "certifications": [
    { "name": "string", "issuer": "string", "year": "string" }
  ],
  "atsScoreBefore": number,
  "atsScoreAfter": number,
  "topMissingKeywords": ["string"],
  "summaryNote": "string (1-2 sentences explaining the key tailoring improvements made)"
}`;
    const msg = `TARGET JOB TITLE: ${job.companyName ? `Role at ${job.companyName}` : 'See JD below'}

JOB DESCRIPTION:
${job.jdText||'(No JD provided — perform general optimization for the most likely target role based on the resume)'}

CANDIDATE'S CURRENT RESUME:
${user.baseResume}

Please apply all content optimization rules and return the complete tailored resume JSON.`;
    try {
      let full='';
      await callLLM(sys, msg, t=>full=t, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      const parsed = parseAIJSON(full);
      setResult(parsed);
      const entry = { id:uid(), event:'ai_used', timestamp:now(), source:'ai', detail:{ feature:'Resume Tailor' } };
      dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, activityLog:[entry,...(job.activityLog||[])], updatedAt:now() } });
    } catch(e) { setErr(e); }
    finally { setLoading(false); }
  };

  const copyTailored = () => {
    if (!result || !result.experience) return;
    const bullets = [];
    result.experience.forEach((exp, expIdx) => {
      (exp.bullets || []).forEach((b, bIdx) => {
        const key = `${expIdx}_${bIdx}`;
        const isAccepted = accepted[key] !== false;
        bullets.push(isAccepted ? b.rewritten : b.original);
      });
    });
    const text = bullets.join('\n');
    navigator.clipboard.writeText(text).then(()=>addToast('Tailored bullets copied!','success'));
  };

  const copyFullResume = () => {
    if (!tailoredText) return;
    navigator.clipboard.writeText(tailoredText).then(()=>addToast('Updated resume copied!','success'));
    dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, resumeText:tailoredText, updatedAt:now() } });
  };

  const saveToJob = () => {
    if (!tailoredText) return;
    dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, resumeText:tailoredText, updatedAt:now() } });
    addToast('Tailored resume saved to job application!','success');
  };

  const renderVisualResume = () => {
    if (!result) return null;
    const NAVY = '#1B365D';
    const DARK = '#0F172A';
    const GREY = '#374151';
    const MUTED = '#64748B';
    const RULE = '#CBD5E1';

    const SectionHead = ({ title }) => (
      <div style={{ display:'flex', alignItems:'center', gap:8, margin:'16px 0 8px' }}>
        <div style={{ width:4, height:18, background:NAVY, borderRadius:2, flexShrink:0 }}/>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:10, fontWeight:800, color:NAVY, textTransform:'uppercase', letterSpacing:'0.08em', lineHeight:1.2 }}>{title}</div>
          <div style={{ height:1, background:RULE, marginTop:3 }}/>
        </div>
      </div>
    );

    const pi = result.personalInfo || {};
    const contactParts = [pi.email, pi.phone, pi.location, pi.linkedin, pi.website].filter(Boolean);

    return (
      <div style={{ background:'#fff', color:GREY, padding:'28px 32px', borderRadius:6, fontFamily:'Arial, Helvetica, sans-serif', fontSize:12, lineHeight:1.55, textAlign:'left', boxShadow:'0 12px 40px rgba(0,0,0,0.45)', maxWidth:780, margin:'0 auto' }}>

        {/* ── Header ── */}
        <div style={{ textAlign:'center', borderBottom:`2.5px solid ${NAVY}`, paddingBottom:14, marginBottom:4 }}>
          <div style={{ fontSize:24, fontWeight:900, color:NAVY, letterSpacing:'-0.01em', lineHeight:1.1 }}>{pi.name || 'Your Name'}</div>
          {(result.targetRole || pi.targetRole) &&
            <div style={{ fontSize:10, color:MUTED, fontStyle:'italic', marginTop:3 }}>{result.targetRole || pi.targetRole}</div>
          }
          {contactParts.length > 0 &&
            <div style={{ fontSize:8.5, color:MUTED, marginTop:6, display:'flex', flexWrap:'wrap', justifyContent:'center', gap:'4px 10px' }}>

        </div>

        {/* ── Professional Summary ── */}
        {result.summary && (
          <div style={{ marginBottom:4 }}>
            <SectionHead title="Professional Summary"/>

          </div>

        {/* ── Professional Experience ── */}
        {result.experience && result.experience.length > 0 && (
          <div style={{ marginBottom:4 }}>
            <SectionHead title="Professional Experience"/>
            {result.experience.map((exp, expIdx) => (
              <div key={expIdx} style={{ marginBottom:10 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
                  <div style={{ fontWeight:700, color:DARK, fontSize:9.5 }}>
                    {exp.role}{exp.company ? <span style={{ fontWeight:400, color:MUTED }}> · {exp.company}</span> : ''}

                  {exp.dates && <div style={{ fontSize:8.5, color:MUTED, fontStyle:'italic', flexShrink:0, marginLeft:8 }}>{exp.dates}</div>}
                </div>
                {exp.location && <div style={{ fontSize:8, color:MUTED, fontStyle:'italic', marginBottom:3 }}>{exp.location}</div>}
                <div style={{ paddingLeft:8 }}>
                  {(exp.bullets||[]).map((b, bIdx) => {
                    const key = `${expIdx}_${bIdx}`;
                    const isAccepted = accepted[key] !== false;
                    const text = isAccepted ? b.rewritten : b.original;
                    return (
                      <div key={bIdx} style={{
                        display:'flex', gap:6, alignItems:'flex-start',
                        marginBottom:3,
                        background: isAccepted ? 'rgba(27,54,93,0.05)' : 'rgba(248,113,113,0.05)',
