                        {/* Match score ring */}
                        {matchData && (
                          <div style={{ textAlign:'center', flexShrink:0, background:'var(--surface-2)', borderRadius:10, padding:'8px 12px', border:`2px solid ${getScoreColor(matchData.score)}30` }}>
                            <div className="mono" style={{ fontSize:20, fontWeight:900, color:getScoreColor(matchData.score), lineHeight:1 }}>{matchData.score}%</div>
                            <div style={{ fontSize:9, color:'var(--text-3)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em', marginTop:2 }}>Match</div>
                          </div>
                        )}
                      </div>

                      {/* Source + posted */}
                      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
                        {job.source && <span className={`portal-badge ${portalClass}`}>{job.source}</span>}
                        <span style={{ fontSize:10, color:'var(--text-3)' }}>Posted {job.posted||'Recently'}</span>
                      </div>

                      {/* Tags */}
                      <div style={{ display:'flex', gap:5, flexWrap:'wrap', marginBottom:10 }}>
                        {(job.tags||[]).slice(0,5).map(t => <span key={t} className="tag-chip" style={{ fontSize:10 }}>{t}</span>)}
                      </div>

                      {/* Description */}
                      <div style={{ fontSize:12, color:'var(--text-3)', lineHeight:1.65, marginBottom:8,
                        display: isExpanded ? 'block' : '-webkit-box', WebkitLineClamp:3, WebkitBoxOrient:'vertical', overflow: isExpanded ? 'visible' : 'hidden' }}>
                        {job.description}
                      </div>

                      {/* Expanded content */}
                      {isExpanded && (
                        <>
                          {job.requirements && job.requirements.length > 0 && (
                            <div style={{ marginBottom:12 }}>
                              <div style={{ fontSize:10, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:7 }}>Requirements</div>
                              <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                                {job.requirements.map((r,i) => (
                                  <div key={i} style={{ display:'flex', gap:8, alignItems:'flex-start', fontSize:12, color:'var(--text-2)' }}>
                                    <span style={{ color:'var(--success)', flexShrink:0, marginTop:1 }}>✓</span>{r}
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}
                          {job.benefits && job.benefits.length > 0 && (
                            <div style={{ marginBottom:12 }}>
                              <div style={{ fontSize:10, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:7 }}>Benefits & Perks</div>
                              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                                {job.benefits.map((b,i) => <span key={i} style={{ fontSize:11, color:'var(--violet)', background:'rgba(167,139,250,0.1)', padding:'3px 10px', borderRadius:20, border:'1px solid rgba(167,139,250,0.2)' }}>✦ {b}</span>)}
                              </div>
                            </div>
                          )}
                          {matchData?.reason && (
                            <div style={{ background:'var(--accent-glow)', border:'1px solid rgba(79,142,247,0.2)', borderRadius:10, padding:'12px 14px', fontSize:12, color:'var(--text-2)', lineHeight:1.6, marginBottom:12 }}>
                              {Sparkles && <Sparkles size={12} style={{ display:'inline', marginRight:6, color:'var(--accent)' }}/>}<strong>AI Analysis: </strong>{matchData.reason}
                              {matchData.strengths?.length > 0 && (
                                <div style={{ marginTop:8, display:'flex', gap:5, flexWrap:'wrap' }}>
                                  {matchData.strengths.map((s,i) => <span key={i} style={{ fontSize:10, color:'var(--success)', background:'rgba(52,211,153,0.1)', padding:'2px 8px', borderRadius:20, border:'1px solid rgba(52,211,153,0.2)' }}>✓ {s}</span>)}
                                </div>
                              )}
                              {matchData.gaps?.length > 0 && (
                                <div style={{ marginTop:5, display:'flex', gap:5, flexWrap:'wrap' }}>
                                  {matchData.gaps.map((g,i) => <span key={i} style={{ fontSize:10, color:'var(--warning)', background:'rgba(251,191,36,0.1)', padding:'2px 8px', borderRadius:20, border:'1px solid rgba(251,191,36,0.2)' }}>△ {g}</span>)}
                                </div>
                              )}
                            </div>
                          )}
                        </>
                      )}

                      <button className="btn btn-ghost btn-sm" style={{ fontSize:11, padding:'2px 0', marginBottom:10, color:'var(--accent)' }}
                        onClick={() => setExpanded(isExpanded ? null : job.id)}>
                        {isExpanded ? '▲ Show less' : '▼ Show more details'}
                      </button>

                      {/* Action row */}
                      <div style={{ display:'flex', gap:8, paddingTop:10, borderTop:'1px solid var(--border)', alignItems:'center' }}>
                        {/* Apply button with portal picker */}
                        <div style={{ position:'relative', flex:1 }}>
                          <div className="apply-btn-group">
                            <a href={job.applyUrl && job.applyUrl !== '#' ? job.applyUrl : buildApplyUrl(job.source||'LinkedIn', job.roleName, job.companyName, job.location, job.remote)}
                              target="_blank" rel="noopener noreferrer"
                              className="apply-btn-main"
                              style={{ textDecoration:'none' }}
                              title={job.applyUrl && job.applyUrl !== '#' ? `Apply directly to ${job.companyName}` : `Search for "${job.roleName}" at ${job.companyName} on ${job.source||'LinkedIn'}`}>
                              {ExternalLink && <ExternalLink size={13}/>}
                              {job.applyUrl && job.applyUrl.includes('http') && !job.applyUrl.includes('search') ? 'Apply Directly' : `Apply on ${job.source||'LinkedIn'}`}
                            </a>
                            <button className="apply-btn-dropdown" title="Apply on other portals"
                              onClick={e=>{ e.stopPropagation(); setApplyPortalOpen(applyPortalOpen===job.id?null:job.id); }}>
                              {ChevronDown && <ChevronDown size={13}/>}
                            </button>
                          </div>
                          {applyPortalOpen === job.id && (
                            <>
                              <div style={{ position:'fixed', inset:0, zIndex:48 }} onClick={()=>setApplyPortalOpen(null)}/>
                              <ApplyPortalPicker job={job}/>
                            </>
                          )}
                        </div>

                        {/* AI Score */}
                        <button className="btn btn-secondary" style={{ fontSize:12, gap:5 }}
                          onClick={()=>scoreJob(job)} disabled={scoring===job.id} title="AI match score">
                          {scoring===job.id ? <Spinner size={12}/> : (Target&&<Target size={13}/>)}
                          {matchData ? 'Re-score' : 'AI Score'}
                        </button>

                        {/* Track */}
                        <button className="btn btn-ghost" style={{ fontSize:12, gap:5 }}
                          onClick={()=>addToTracker(job)} disabled={alreadyTracked}
                          title={alreadyTracked?'Already in tracker':'Save to tracker'}>
                          {alreadyTracked
                            ? (CheckCircle && <CheckCircle size={14} style={{ color:'var(--success)' }}/>)
                            : (Plus && <Plus size={14}/>)
                          }
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )
        )}
      </div>

      {/* ── Datalists for autosuggest ── */}
      <datalist id="role-suggestions">
        {['Software Engineer','Senior Software Engineer','Full Stack Developer','Frontend Developer','Backend Developer',
          'React Developer','Node.js Engineer','Python Developer','Java Developer','Go Engineer',
          'iOS Developer','Android Developer','Mobile Developer','Data Scientist','Data Analyst',
          'Machine Learning Engineer','AI Engineer','DevOps Engineer','Site Reliability Engineer',
          'Cloud Architect','AWS Engineer','Azure Engineer','GCP Engineer','Product Manager',
          'Engineering Manager','Tech Lead','Solutions Architect','Cybersecurity Engineer',
          'QA Engineer','UI/UX Designer','Scrum Master','Business Analyst'].map(v => <option key={v} value={v}/>)}
      </datalist>
      <datalist id="location-suggestions">
        {['Remote','Hybrid','San Francisco, CA','New York, NY','Seattle, WA','Austin, TX','Boston, MA',
          'London, UK','Berlin, Germany','Toronto, Canada','Singapore','Dubai, UAE',
          'Bangalore, India','Mumbai, India','Hyderabad, India','Pune, India','Delhi NCR, India',
          'Chennai, India','Noida, India','Gurgaon, India'].map(v => <option key={v} value={v}/>)}
      </datalist>
      <datalist id="company-suggestions">
        {['Google','Microsoft','Amazon','Apple','Meta','Netflix','Salesforce','Adobe','Atlassian',
          'Uber','Airbnb','Stripe','Shopify','Infosys','TCS','Wipro','HCL','Cognizant',
          'Flipkart','Zomato','Swiggy','BYJU\'S','Razorpay','PhonePe'].map(v => <option key={v} value={v}/>)}
      </datalist>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RESUME BUILDER VIEW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ResumeBuilderView() {
  const { state, addToast } = useApp();
  const { user } = state;
  const [step, setStep] = useState(0);
  const [data, setData] = useState(() => ls_get(LS.BUILT_RESUME, null) || BLANK_BUILT_RESUME);
  const [generating, setGenerating] = useState('');
  const [atsResult, setAtsResult]   = useState(null);
  const [showPreview, setShowPreview] = useState(false);

  const save = (next) => { ls_set(LS.BUILT_RESUME, next); setData(next); };
  const upPersonal = (f, v) => save({ ...data, personalInfo: { ...data.personalInfo, [f]:v } });
  const STEPS = ['Personal Info','Summary','Experience','Education & Skills','Projects & Export'];

  // AI helpers
  const genSummary = async () => {
    if (!user.apiKey) { addToast('Add API key in Settings','warning'); return; }
    setGenerating('summary');
    try {
      const sys = 'You are a professional resume writer. Write a compelling 3-sentence professional summary optimized for ATS. Return ONLY the summary text, no quotes, no explanation.';
      const msg = `Target role: ${data.personalInfo.targetRole||'Software Engineer'}
Experience: ${data.experience.map(e=>`${e.role} at ${e.company}`).join(', ')||'Not provided'}
Skills: ${data.skills.flatMap(s=>s.items||[]).join(', ')||'Not provided'}`;
      let full = '';
      await callLLM(sys, msg, t => { full = t; }, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      save({ ...data, summary: full.trim() });
      addToast('Summary generated!','ai');
    } catch(e) { addToast('Generation failed','error'); }
    finally { setGenerating(''); }
  };

  const genBullets = async (idx) => {
    if (!user.apiKey) { addToast('Add API key in Settings','warning'); return; }
    setGenerating('bullets-'+idx);
    const exp = data.experience[idx];
    try {
      const sys = 'You are an expert resume writer. Generate 4 strong STAR-format achievement bullets. Return ONLY a JSON array of strings, no markdown: ["bullet 1","bullet 2","bullet 3","bullet 4"]';
      const msg = `Role: ${exp.role}\nCompany: ${exp.company}\nDates: ${exp.dates}\nTarget role I am applying for: ${data.personalInfo.targetRole||''}`;
      let full = '';
      await callLLM(sys, msg, t => { full = t; }, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      const bullets = parseAIJSON(full);
      const updated = data.experience.map((e,i) => i===idx ? { ...e, bullets } : e);
      save({ ...data, experience:updated });
      addToast('Bullets generated!','ai');
    } catch(e) { addToast('Generation failed','error'); }
    finally { setGenerating(''); }
  };

  const runATS = async () => {
    if (!user.apiKey) { addToast('Add API key in Settings','warning'); return; }
    setGenerating('ats');
    try {
      const sys = 'You are an ATS (Applicant Tracking System) expert. Analyze this resume and return ONLY valid JSON: {"score":number,"issues":["issue1","issue2"],"strengths":["str1","str2"],"keywords_missing":["kw1"]}';
      const resumeText = `${data.personalInfo.name} — ${data.personalInfo.targetRole}\n${data.summary}\n${data.experience.map(e=>`${e.role} at ${e.company} (${e.dates}): ${(e.bullets||[]).join('; ')}`).join('\n')}\nSkills: ${data.skills.flatMap(s=>s.items||[]).join(', ')}`;
      let full = '';
      await callLLM(sys, `Analyze for ATS compatibility:\n\n${resumeText}`, t => { full = t; }, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      const result = parseAIJSON(full);
      setAtsResult(result);
      addToast(`ATS Score: ${result.score}/100`, result.score >= 70 ? 'success' : 'warning');
    } catch(e) { addToast('ATS analysis failed','error'); }
    finally { setGenerating(''); }
  };

  const addExp = () => save({ ...data, experience:[...data.experience, { id:uid(), role:'', company:'', dates:'', location:'', bullets:[''] }] });
  const removeExp = (id) => save({ ...data, experience:data.experience.filter(e=>e.id!==id) });
  const upExp = (id, f, v) => save({ ...data, experience:data.experience.map(e=>e.id===id?{...e,[f]:v}:e) });
  const upExpBullet = (id, i, v) => save({ ...data, experience:data.experience.map(e=>e.id===id?{...e,bullets:e.bullets.map((b,bi)=>bi===i?v:b)}:e) });
  const addExpBullet = (id) => save({ ...data, experience:data.experience.map(e=>e.id===id?{...e,bullets:[...e.bullets,'']}:e) });
  const removeExpBullet = (id, i) => save({ ...data, experience:data.experience.map(e=>e.id===id?{...e,bullets:e.bullets.filter((_,bi)=>bi!==i)}:e) });
  const addEdu = () => save({ ...data, education:[...data.education, { id:uid(), degree:'', school:'', dates:'', location:'', gpa:'' }] });
  const removeEdu = (id) => save({ ...data, education:data.education.filter(e=>e.id!==id) });
  const upEdu = (id, f, v) => save({ ...data, education:data.education.map(e=>e.id===id?{...e,[f]:v}:e) });
  const upSkill = (id, f, v) => save({ ...data, skills:data.skills.map(s=>s.id===id?{...s,[f]:v}:s) });
  const upSkillItems = (id, v) => save({ ...data, skills:data.skills.map(s=>s.id===id?{...s,rawText:v,items:v.split(',').map(x=>x.trim()).filter(Boolean)}:s) });
  const addProj = () => save({ ...data, projects:[...data.projects, { id:uid(), name:'', url:'', description:'', tech:'' }] });
  const removeProj = (id) => save({ ...data, projects:data.projects.filter(p=>p.id!==id) });
  const upProj = (id, f, v) => save({ ...data, projects:data.projects.map(p=>p.id===id?{...p,[f]:v}:p) });

  const exportPDF = () => {
    if (typeof exportResumeAsPDF === 'function') {
      exportResumeAsPDF(data, data.personalInfo?.name || 'Resume');
    } else {
      const el = document.getElementById('rb-preview-content');
      if (el && window.print) {
        const w = window.open('','','width=800,height=900');
        w.document.write('<html><head><title>Resume</title><style>body{font-family:Arial,sans-serif;margin:40px;color:#1a1a1a;}h1{font-size:22px;margin:0;}h2{font-size:14px;border-bottom:1px solid #ddd;padding-bottom:4px;}ul{margin:4px 0;padding-left:18px;}p{margin:4px 0;font-size:12px;}</style></head><body>');
        w.document.write(el.innerHTML);
        w.document.write('</body></html>');
        w.document.close();
        w.print();
        w.close();
      }
    }
  };

  const P = data.personalInfo;

  const renderStep = () => {
    switch(step) {
      case 0: return (
        <div style={{ display:'flex', flexDirection:'column', gap:16, maxWidth:600 }}>
          <div style={{ background:'var(--accent-glow)', border:'1px solid rgba(79,142,247,0.3)', borderRadius:10, padding:'12px 16px', fontSize:13, color:'var(--text-2)', lineHeight:1.6 }}>
            <strong style={{ color:'var(--accent)' }}>Step 1 of 5:</strong> Enter your personal information. This forms the header of your resume.
          </div>
          <div className="responsive-grid-2">
            <div className="field-group"><label className="field-label">Full Name *</label><input className="field-input" value={P.name} onChange={e=>upPersonal('name',e.target.value)} placeholder="Jane Doe"/></div>
            <div className="field-group"><label className="field-label">Target Role *</label><input className="field-input" value={P.targetRole} onChange={e=>upPersonal('targetRole',e.target.value)} placeholder="Senior Software Engineer"/></div>
            <div className="field-group"><label className="field-label">Email *</label><input className="field-input" type="email" value={P.email} onChange={e=>upPersonal('email',e.target.value)} placeholder="jane@example.com"/></div>
            <div className="field-group"><label className="field-label">Phone</label><input className="field-input" value={P.phone} onChange={e=>upPersonal('phone',e.target.value)} placeholder="+1 (555) 000-0000"/></div>
            <div className="field-group"><label className="field-label">Location</label><input className="field-input" value={P.location} onChange={e=>upPersonal('location',e.target.value)} placeholder="San Francisco, CA"/></div>
            <div className="field-group"><label className="field-label">LinkedIn URL</label><input className="field-input" value={P.linkedin} onChange={e=>upPersonal('linkedin',e.target.value)} placeholder="linkedin.com/in/janedoe"/></div>
            <div className="field-group" style={{ gridColumn:'1/-1' }}><label className="field-label">Website / Portfolio</label><input className="field-input" value={P.website} onChange={e=>upPersonal('website',e.target.value)} placeholder="https://janedoe.dev"/></div>
          </div>
        </div>
      );
      case 1: return (
        <div style={{ display:'flex', flexDirection:'column', gap:16, maxWidth:700 }}>
          <div style={{ background:'var(--accent-glow)', border:'1px solid rgba(79,142,247,0.3)', borderRadius:10, padding:'12px 16px', fontSize:13, color:'var(--text-2)', lineHeight:1.6 }}>
            <strong style={{ color:'var(--accent)' }}>Step 2 of 5:</strong> Write or AI-generate your professional summary. This is the most-read section — make it count.
          </div>
          <div className="field-group">
            <label className="field-label" style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span>Professional Summary</span>
              <span style={{ fontSize:11, color:'var(--text-3)', fontWeight:400 }}>{data.summary.length} chars</span>
            </label>
            <textarea className="field-input" style={{ minHeight:140, lineHeight:1.7, fontSize:13 }} value={data.summary} onChange={e=>save({...data,summary:e.target.value})} placeholder="Experienced software engineer with 6+ years building scalable distributed systems…"/>
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <Btn variant="primary" onClick={genSummary} disabled={generating==='summary'}>
              {generating==='summary' ? <Spinner size={14}/> : (Sparkles && <Sparkles size={14}/>)}
              {data.summary ? 'Regenerate with AI' : 'Generate with AI'}
            </Btn>
          </div>
          <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8, padding:'12px 14px' }}>
            <div style={{ fontSize:11, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6 }}>ATS Tips</div>
            <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
              {['Include your target job title in the first sentence','Use active verbs: developed, architected, drove, scaled','Mention 2–3 key skills matching the target role','Keep it 3–4 sentences (50–80 words optimal)'].map((t,i) => (
                <div key={i} style={{ fontSize:12, color:'var(--text-2)', display:'flex', gap:8 }}><span style={{ color:'var(--success)' }}>✓</span>{t}</div>
              ))}
            </div>
          </div>
        </div>
      );
      case 2: return (
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div>
              <div style={{ fontSize:15, fontWeight:700, color:'var(--text-1)' }}>Work Experience</div>
              <div style={{ fontSize:12, color:'var(--text-3)', marginTop:2 }}>Add positions in reverse chronological order (most recent first)</div>
            </div>
            <Btn variant="secondary" onClick={addExp}>{Plus && <Plus size={14}/>} Add Position</Btn>
          </div>
          {data.experience.length === 0 && (
            <div style={{ textAlign:'center', padding:'40px 0', color:'var(--text-3)', fontSize:13 }}>
              <div style={{ fontSize:32, marginBottom:8 }}>💼</div>No positions yet. Click Add Position to start.
            </div>
          )}
          {data.experience.map((exp, idx) => (
            <div key={exp.id} className="exp-card">
              <div className="exp-card-header">
                <div style={{ fontSize:13, fontWeight:700, color:'var(--text-1)' }}>Position {idx+1}</div>
                <div style={{ display:'flex', gap:8 }}>
                  <Btn size="sm" variant="primary" style={{ background:'var(--violet)', color:'white' }} onClick={()=>genBullets(idx)} disabled={!!generating}>
                    {generating===`bullets-${idx}` ? <Spinner size={12}/> : (Sparkles && <Sparkles size={12}/>)}
                    AI Bullets
                  </Btn>
                  <Btn size="sm" variant="ghost" onClick={()=>removeExp(exp.id)}>{Trash2 && <Trash2 size={12}/>}</Btn>
                </div>
              </div>
              <div className="responsive-grid-2" style={{ gap:10, marginBottom:10 }}>
                <div className="field-group"><label className="field-label">Job Title *</label><input className="field-input" value={exp.role} onChange={e=>upExp(exp.id,'role',e.target.value)} placeholder="Software Engineer"/></div>
                <div className="field-group"><label className="field-label">Company *</label><input className="field-input" value={exp.company} onChange={e=>upExp(exp.id,'company',e.target.value)} placeholder="Acme Corp"/></div>
                <div className="field-group"><label className="field-label">Dates</label><input className="field-input" value={exp.dates} onChange={e=>upExp(exp.id,'dates',e.target.value)} placeholder="Jan 2022 – Present"/></div>
                <div className="field-group"><label className="field-label">Location</label><input className="field-input" value={exp.location} onChange={e=>upExp(exp.id,'location',e.target.value)} placeholder="San Francisco, CA (Remote)"/></div>
              </div>
              <div className="field-group">
                <label className="field-label">Bullet Points</label>
                {(exp.bullets||['']).map((b, bi) => (
                  <div key={bi} style={{ display:'flex', gap:6, marginBottom:6, alignItems:'center' }}>
                    <span style={{ color:'var(--text-3)', fontSize:16, flexShrink:0 }}>•</span>
                    <input className="field-input" style={{ flex:1 }} value={b} onChange={e=>upExpBullet(exp.id,bi,e.target.value)} placeholder="Achieved X by doing Y, resulting in Z…"/>
                    <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>removeExpBullet(exp.id,bi)} disabled={(exp.bullets||[]).length<=1}>{Trash2 && <Trash2 size={11}/>}</button>
                  </div>
                ))}
                <button className="btn btn-ghost btn-sm" style={{ marginTop:4 }} onClick={()=>addExpBullet(exp.id)}>{Plus && <Plus size={12}/>} Add bullet</button>
              </div>
            </div>
          ))}
        </div>
      );
      case 3: return (
        <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
          {/* Education */}
          <div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <div style={{ fontSize:15, fontWeight:700, color:'var(--text-1)' }}>Education</div>
              <Btn variant="secondary" onClick={addEdu}>{Plus && <Plus size={14}/>} Add Education</Btn>
            </div>
            {data.education.length === 0 && (
              <div style={{ textAlign:'center', padding:'24px 0', color:'var(--text-3)', fontSize:13 }}>
                <div style={{ fontSize:28, marginBottom:6 }}>🎓</div>No education entries yet.
              </div>
            )}
            {data.education.map((edu) => (
              <div key={edu.id} className="exp-card">
                <div className="responsive-grid-2" style={{ gap:10 }}>
                  <div className="field-group"><label className="field-label">Degree / Certificate *</label><input className="field-input" value={edu.degree} onChange={e=>upEdu(edu.id,'degree',e.target.value)} placeholder="B.S. Computer Science"/></div>
                  <div className="field-group"><label className="field-label">School *</label><input className="field-input" value={edu.school} onChange={e=>upEdu(edu.id,'school',e.target.value)} placeholder="Stanford University"/></div>
                  <div className="field-group"><label className="field-label">Dates</label><input className="field-input" value={edu.dates} onChange={e=>upEdu(edu.id,'dates',e.target.value)} placeholder="2016–2020"/></div>
                  <div className="field-group"><label className="field-label">GPA (optional)</label><input className="field-input mono" value={edu.gpa} onChange={e=>upEdu(edu.id,'gpa',e.target.value)} placeholder="3.8/4.0"/></div>
                </div>
                <div style={{ display:'flex', justifyContent:'flex-end', marginTop:8 }}><Btn size="sm" variant="ghost" onClick={()=>removeEdu(edu.id)}>{Trash2 && <Trash2 size={12}/>} Remove</Btn></div>
              </div>
            ))}
          </div>
          {/* Skills */}
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:'var(--text-1)', marginBottom:12 }}>Skills</div>
            {data.skills.map(skill => (
              <div key={skill.id} className="exp-card" style={{ marginBottom:10 }}>
                <div className="skills-grid">
                  <div className="field-group"><label className="field-label">Category</label><input className="field-input" value={skill.category} onChange={e=>upSkill(skill.id,'category',e.target.value)} placeholder="Technical Skills"/></div>
                  <div className="field-group"><label className="field-label">Skills (comma-separated)</label><input className="field-input" value={skill.rawText !== undefined ? skill.rawText : (skill.items||[]).join(', ')} onChange={e=>upSkillItems(skill.id,e.target.value)} placeholder="React, TypeScript, Node.js, PostgreSQL…"/></div>
                </div>
              </div>
            ))}
            <Btn variant="secondary" onClick={() => save({ ...data, skills:[...data.skills, { id:uid(), category:'', items:[] }] })}>
              {Plus && <Plus size={14}/>} Add Skill Category
            </Btn>
          </div>
        </div>
      );
      case 4: return (
        <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
          {/* Projects */}
          <div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <div style={{ fontSize:15, fontWeight:700, color:'var(--text-1)' }}>Projects</div>
              <Btn variant="secondary" onClick={addProj}>{Plus && <Plus size={14}/>} Add Project</Btn>
            </div>
            {data.projects.map(proj => (
              <div key={proj.id} className="exp-card" style={{ marginBottom:10 }}>
                <div className="responsive-grid-2" style={{ gap:10, marginBottom:10 }}>
                  <div className="field-group"><label className="field-label">Project Name</label><input className="field-input" value={proj.name} onChange={e=>upProj(proj.id,'name',e.target.value)} placeholder="CareerDeck"/></div>
                  <div className="field-group"><label className="field-label">URL</label><input className="field-input" value={proj.url} onChange={e=>upProj(proj.id,'url',e.target.value)} placeholder="https://github.com/…"/></div>
                  <div className="field-group" style={{ gridColumn:'1/-1' }}><label className="field-label">Description</label><textarea className="field-input" style={{ minHeight:60 }} value={proj.description} onChange={e=>upProj(proj.id,'description',e.target.value)} placeholder="Brief description of what you built and the impact…"/></div>
                  <div className="field-group" style={{ gridColumn:'1/-1' }}><label className="field-label">Technologies</label><input className="field-input" value={proj.tech} onChange={e=>upProj(proj.id,'tech',e.target.value)} placeholder="React, Node.js, PostgreSQL"/></div>
                </div>
                <div style={{ display:'flex', justifyContent:'flex-end' }}><Btn size="sm" variant="ghost" onClick={()=>removeProj(proj.id)}>{Trash2 && <Trash2 size={12}/>} Remove</Btn></div>
              </div>
            ))}
          </div>

          {/* ATS Scanner */}
          <div className="dash-section">
            <div style={{ fontSize:14, fontWeight:700, color:'var(--text-1)', marginBottom:8 }}>
              {Target && <Target size={14} style={{ display:'inline', marginRight:6, color:'var(--violet)' }}/>}ATS Optimization Score
            </div>
            <div style={{ fontSize:12, color:'var(--text-3)', marginBottom:12, lineHeight:1.6 }}>
              AI analyzes your resume against common ATS systems and identifies issues that could disqualify you.
            </div>
            {atsResult ? (
              <div>
                <div style={{ display:'flex', alignItems:'center', gap:20, marginBottom:16, padding:'16px', background:'var(--bg)', borderRadius:10 }}>
                  <div style={{ textAlign:'center' }}>
                    <div className="mono score-reveal" style={{ fontSize:40, fontWeight:800, color:getScoreColor(atsResult.score), lineHeight:1 }}>{atsResult.score}</div>
                    <div style={{ fontSize:11, color:'var(--text-3)', fontWeight:600, textTransform:'uppercase' }}>ATS Score</div>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ height:8, background:'var(--border)', borderRadius:4, overflow:'hidden', marginBottom:6 }}>
                      <div style={{ width:`${atsResult.score}%`, height:'100%', background:getScoreColor(atsResult.score), borderRadius:4, transition:'width 1s ease-out' }}/>
                    </div>
                    <div style={{ fontSize:11, color:'var(--text-3)' }}>
                      {atsResult.score >= 80 ? '🟢 Excellent — you\'re likely to pass most ATS filters' :
                       atsResult.score >= 60 ? '🟡 Good — a few improvements can boost your chances' :
                       '🔴 Needs work — follow the suggestions below'}
                    </div>
                  </div>
                </div>
                {atsResult.issues?.length > 0 && <div style={{ marginBottom:12 }}>
                  <div style={{ fontSize:11, fontWeight:700, color:'#F87171', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6 }}>Issues to Fix</div>
                  {atsResult.issues.map((issue,i) => <div key={i} className="ats-feedback-item"><span style={{ color:'#F87171', flexShrink:0 }}>✗</span>{issue}</div>)}
                </div>}
                {atsResult.strengths?.length > 0 && <div style={{ marginBottom:12 }}>
                  <div style={{ fontSize:11, fontWeight:700, color:'var(--success)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6 }}>Strengths</div>
                  {atsResult.strengths.map((s,i) => <div key={i} className="ats-feedback-item"><span style={{ color:'var(--success)', flexShrink:0 }}>✓</span>{s}</div>)}
                </div>}
                {atsResult.keywords_missing?.length > 0 && <div>
                  <div style={{ fontSize:11, fontWeight:700, color:'var(--warning)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6 }}>Missing Keywords</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>{atsResult.keywords_missing.map(k => <span key={k} className="tag-chip" style={{ background:'rgba(251,191,36,0.15)', color:'var(--warning)', border:'1px solid rgba(251,191,36,0.3)' }}>{k}</span>)}</div>
                </div>}
              </div>
            ) : null}
            <div style={{ display:'flex', gap:10, marginTop:12 }}>
              <Btn variant="primary" style={{ background:'var(--violet)', color:'white' }} onClick={runATS} disabled={generating==='ats'}>
                {generating==='ats' ? <Spinner size={14}/> : (Target && <Target size={14}/>)}
                {atsResult ? 'Re-analyze ATS Score' : 'Analyze ATS Score'}
              </Btn>
            </div>
          </div>

          {/* Export */}
          <div className="dash-section">
            <div style={{ fontSize:14, fontWeight:700, color:'var(--text-1)', marginBottom:8 }}>
              {Download && <Download size={14} style={{ display:'inline', marginRight:6, color:'var(--success)' }}/>}Export Resume
            </div>
            <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
              <Btn variant="primary" onClick={exportPDF}>
                {Download && <Download size={14}/>} Download PDF
              </Btn>
              <Btn variant="secondary" onClick={() => setShowPreview(v => !v)}>
                {Eye && <Eye size={14}/>} {showPreview ? 'Hide' : 'Preview'} Resume
              </Btn>
            </div>
          </div>

          {/* Preview */}
          {showPreview && (
            <div className="resume-preview-wrap">
              <div id="rb-preview-content" className="resume-preview">
                <div style={{ borderBottom:'2px solid #1a1a1a', paddingBottom:12, marginBottom:12 }}>
                  <h1 style={{ fontSize:22, fontWeight:700, margin:'0 0 4px', color:'#1a1a1a' }}>{P.name||'Your Name'}</h1>
                  <div style={{ fontSize:13, color:'#555', marginBottom:4 }}>{P.targetRole}</div>
                  <div style={{ fontSize:11, color:'#777', display:'flex', flexWrap:'wrap', gap:12 }}>
                    {P.email && <span>✉ {P.email}</span>}
                    {P.phone && <span>📞 {P.phone}</span>}
                    {P.location && <span>📍 {P.location}</span>}
                    {P.linkedin && <span>🔗 {P.linkedin}</span>}
                    {P.website && <span>🌐 {P.website}</span>}
                  </div>
                </div>
                {data.summary && <><h2 style={{ fontSize:13, textTransform:'uppercase', letterSpacing:'0.08em', color:'#333', borderBottom:'1px solid #ddd', paddingBottom:4, marginBottom:8 }}>Summary</h2><p style={{ fontSize:12, lineHeight:1.6, color:'#333', marginBottom:16 }}>{data.summary}</p></>}
                {data.experience.length > 0 && <>
                  <h2 style={{ fontSize:13, textTransform:'uppercase', letterSpacing:'0.08em', color:'#333', borderBottom:'1px solid #ddd', paddingBottom:4, marginBottom:8 }}>Experience</h2>
                  {data.experience.map(exp => <div key={exp.id} style={{ marginBottom:12 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
                      <strong style={{ fontSize:13, color:'#1a1a1a' }}>{exp.role}</strong>
                      <span style={{ fontSize:11, color:'#777' }}>{exp.dates}</span>
                    </div>
                    <div style={{ fontSize:12, color:'#555', marginBottom:4 }}>{exp.company}{exp.location ? ` · ${exp.location}` : ''}</div>
                    <ul style={{ margin:'4px 0', paddingLeft:16 }}>{(exp.bullets||[]).filter(Boolean).map((b,i) => <li key={i} style={{ fontSize:12, color:'#333', marginBottom:2, lineHeight:1.5 }}>{b}</li>)}</ul>
                  </div>)}
                </>}
                {data.education.length > 0 && <>
                  <h2 style={{ fontSize:13, textTransform:'uppercase', letterSpacing:'0.08em', color:'#333', borderBottom:'1px solid #ddd', paddingBottom:4, marginBottom:8 }}>Education</h2>
                  {data.education.map(edu => <div key={edu.id} style={{ marginBottom:8 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
                      <strong style={{ fontSize:13, color:'#1a1a1a' }}>{edu.degree}</strong>
                      <span style={{ fontSize:11, color:'#777' }}>{edu.dates}</span>
                    </div>
                    <div style={{ fontSize:12, color:'#555' }}>{edu.school}{edu.gpa ? ` · GPA: ${edu.gpa}` : ''}</div>
                  </div>)}
                </>}
                {data.skills.length > 0 && data.skills.some(s=>(s.items||[]).length>0) && <>
                  <h2 style={{ fontSize:13, textTransform:'uppercase', letterSpacing:'0.08em', color:'#333', borderBottom:'1px solid #ddd', paddingBottom:4, marginBottom:8 }}>Skills</h2>
                  {data.skills.filter(s=>(s.items||[]).length>0).map(s => <div key={s.id} style={{ marginBottom:4, fontSize:12, color:'#333' }}><strong>{s.category}:</strong> {(s.items||[]).join(', ')}</div>)}
                </>}
                {data.projects.length > 0 && <>
                  <h2 style={{ fontSize:13, textTransform:'uppercase', letterSpacing:'0.08em', color:'#333', borderBottom:'1px solid #ddd', paddingBottom:4, marginBottom:8 }}>Projects</h2>
                  {data.projects.map(proj => <div key={proj.id} style={{ marginBottom:8 }}>
                    <div style={{ display:'flex', gap:8, alignItems:'baseline' }}>
                      <strong style={{ fontSize:13, color:'#1a1a1a' }}>{proj.name}</strong>
                      {proj.url && <a href={proj.url} style={{ fontSize:11, color:'#4F8EF7' }}>{proj.url}</a>}
                    </div>
                    {proj.tech && <div style={{ fontSize:11, color:'#777', marginBottom:2 }}>{proj.tech}</div>}
                    <p style={{ fontSize:12, color:'#333', margin:'2px 0', lineHeight:1.5 }}>{proj.description}</p>
                  </div>)}
                </>}
              </div>
            </div>
          )}
        </div>
      );
      default: return null;
    }
  };

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Header */}
      <div style={{ padding:'16px 24px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12, flexWrap:'wrap', flexShrink:0 }}>
        <div style={{ flex:1 }}>
          <h1 style={{ fontSize:20, fontWeight:800, color:'var(--text-1)', letterSpacing:'-0.02em', marginBottom:2 }}>
            {FileText && <FileText size={18} style={{ display:'inline', marginRight:8, color:'var(--accent)' }}/>}AI Resume Builder
          </h1>
          <div style={{ fontSize:12, color:'var(--text-3)' }}>Create an ATS-optimized, tailored resume in 5 steps — your data auto-saves locally</div>
        </div>
        {atsResult && (
          <div style={{ display:'flex', alignItems:'center', gap:8, background:'var(--bg)', border:'1px solid var(--border)', borderRadius:10, padding:'8px 14px' }}>
            <div style={{ fontSize:11, color:'var(--text-3)' }}>ATS Score</div>
            <div className="mono" style={{ fontSize:22, fontWeight:800, color:getScoreColor(atsResult.score) }}>{atsResult.score}/100</div>
          </div>
        )}
      </div>

      {/* Step Bar */}
      <div style={{ borderBottom:'1px solid var(--border)', flexShrink:0 }}>
        <div style={{ display:'flex' }}>
          {STEPS.map((s, i) => (
            <button key={s} className={`rb-step-btn${i===step?' active':i<step?' done':''}`} onClick={()=>setStep(i)}>
              <span style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                {i < step ? (CheckCircle && <CheckCircle size={12}/>) : <span style={{ width:16, height:16, borderRadius:'50%', border:'1.5px solid currentColor', display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:9, lineHeight:1 }}>{i+1}</span>}
                <span className="hidden-mobile" style={{ fontSize:11 }}>{s}</span>
              </span>
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div className="rb-content">
        {renderStep()}
      </div>

      {/* Navigation */}
      <div style={{ padding:'12px 24px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', flexShrink:0 }}>
        <Btn variant="secondary" onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}>
          {ChevronLeft && <ChevronLeft size={15}/>} Previous
        </Btn>
        {step < STEPS.length-1 ? (
          <Btn variant="primary" onClick={()=>setStep(s=>Math.min(STEPS.length-1,s+1))}>
            Next {ChevronRight && <ChevronRight size={15}/>}
          </Btn>
        ) : (
          <Btn variant="primary" onClick={exportPDF}>
            {Download && <Download size={14}/>} Export Resume
          </Btn>
        )}
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MOCK INTERVIEW VIEW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const INTERVIEW_TYPES = [
  { id:'behavioral', label:'Behavioral',     emoji:'🗣️',  desc:'STAR-format questions about past situations' },
  { id:'technical',  label:'Technical',      emoji:'💻',  desc:'Coding concepts, architecture, problem solving' },
  { id:'system',     label:'System Design',  emoji:'🏗️',  desc:'Design scalable systems at the whiteboard' },
  { id:'hr',         label:'HR / Culture',   emoji:'🤝',  desc:'Company fit, compensation, career goals' },
  { id:'case',       label:'Case Study',     emoji:'📊',  desc:'Business problem analysis and strategy' },
];
const INTERVIEW_LEVELS = ['Junior','Mid-level','Senior','Staff / Principal'];
const INTERVIEW_DURATIONS = [
  { label:'Quick (3 questions)',   count:3  },
  { label:'Standard (6 questions)',count:6  },
  { label:'Full (10 questions)',   count:10 },
];

function MockInterviewView() {
  const { state, addToast } = useApp();
  const { user } = state;
  const [phase, setPhase]   = useState('setup');   // setup | session | results
  const [config, setConfig] = useState(() => {
    const saved = ls_get(LS.INTERVIEW_CFG, null);
    if (saved) {
      return {
        type: 'behavioral',
        level: 'Mid-level',
        duration: INTERVIEW_DURATIONS[1],
        company: '',
        customRole: '',
        ...saved
      };
    }
    return { type:'behavioral', level:'Mid-level', duration:INTERVIEW_DURATIONS[1], company: '', customRole: '' };
  });

  useEffect(() => {
    ls_set(LS.INTERVIEW_CFG, config);
  }, [config]);

  const [questions, setQuestions] = useState([]);
  const [currentQ, setCurrentQ]   = useState(0);
  const [answers, setAnswers]     = useState([]);
  const [curAnswer, setCurAnswer] = useState('');
  const [timeLeft, setTimeLeft]   = useState(0);
  const [timerRunning, setTimerRunning] = useState(false);
  const [generating, setGenerating]    = useState(false);
  const [feedback, setFeedback]        = useState(null);
  const [history, setHistory]          = useState(() => ls_get(LS.INTERVIEW_HIST, []));
  const timerRef = useRef(null);

  const SECS_PER_Q = 180; // 3 min per question

  useEffect(() => {
    if (timerRunning && timeLeft > 0) {
      timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    } else if (timerRunning && timeLeft <= 0) {
      moveNext();
    }
    return () => clearTimeout(timerRef.current);
  }, [timerRunning, timeLeft]);

  const startSession = async () => {
    if (!user.apiKey) { addToast('Add API key in Settings to generate questions','warning'); return; }
    setGenerating(true);
    try {
      const targetDetails = [];
      if (config.company) targetDetails.push(`at the company "${config.company}"`);
      if (config.customRole) {
        targetDetails.push(`specifically tailored for the custom role "${config.customRole}" (replacing standard generic roles)`);
      } else {
        targetDetails.push(`for a generic ${config.level} role`);
      }

      const promptContext = targetDetails.length > 0 ? `Target details: ${targetDetails.join(' and ')}.` : '';

      const sys = `You are an expert interviewer. Generate realistic interview questions. If a target company or custom role is specified, utilize your knowledge of actual interviews and data analysis at that company/role to generate authentic questions historically asked for that position. Return ONLY a JSON array of strings with exactly the specified number of questions. Do not include markdown formatting, backticks, or 'json' prefixes.`;
      
      const msg = `Generate ${config.duration.count} ${config.type} interview questions ${config.level ? `at experience level: ${config.level}` : ''}.
${promptContext}
Focus: ${INTERVIEW_TYPES.find(t=>t.id===config.type)?.desc}
Make them realistic, challenging, and highly aligned with the target company's real-life interview standards (for example, if Google is specified, ask typical Google style coding, system design, or behavioral questions matching the role level). No numbering, just the question text.`;

      let full = '';
      await callLLM(sys, msg, t => { full = t; }, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      const qs = parseAIJSON(full);
      setQuestions(qs);
      setAnswers(Array(qs.length).fill(''));
      setCurrentQ(0);
      setCurAnswer('');
      setTimeLeft(SECS_PER_Q);
      setTimerRunning(true);
      setPhase('session');
    } catch(e) {
      addToast('Failed to generate questions. Check your API key.','error');
    } finally {
      setGenerating(false);
    }
  };

  const moveNext = () => {
    clearTimeout(timerRef.current);
    setTimerRunning(false);
    const updated = [...answers];
    updated[currentQ] = curAnswer;
    setAnswers(updated);
    if (currentQ < questions.length - 1) {
      setCurrentQ(q => q + 1);
      setCurAnswer(answers[currentQ + 1] || '');
      setTimeLeft(SECS_PER_Q);
      setTimerRunning(true);
    } else {
      finishSession(updated);
    }
  };

  const finishSession = async (finalAnswers) => {
    clearTimeout(timerRef.current);
    setTimerRunning(false);
    setPhase('scoring');
    setGenerating(true);
    try {
      const qa = questions.map((q,i) => `Q: ${q}\nA: ${finalAnswers[i]||'(no answer)'}`).join('\n\n');
      
      const targetContext = [];
      if (config.company) targetContext.push(`Target Company: ${config.company}`);
      if (config.customRole) targetContext.push(`Target Role: ${config.customRole}`);
      const targetPrompt = targetContext.length > 0 ? `Evaluate the answers specifically against standard benchmarks and rubrics for ${targetContext.join(' - ')} at the ${config.level} level.` : `Evaluate the answers for a generic ${config.level} role.`;

      const sys = `You are an expert interview coach. Evaluate the candidate's answers. ${targetPrompt} Return ONLY valid JSON matching this exact schema: {"overall_score":number,"summary":"2-sentence summary","strengths":["str1","str2"],"improvements":["imp1","imp2"],"question_scores":[{"question":"...","score":number,"feedback":"..."}]}`;
      
      const msg = `Interview Type: ${config.type}
Level: ${config.level}
${config.company ? `Target Company: ${config.company}` : ''}
${config.customRole ? `Target Role: ${config.customRole}` : ''}

Evaluate the following responses:
${qa}`;

      let full = '';
      await callLLM(sys, msg, t => { full = t; }, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      const result = parseAIJSON(full);
      setFeedback(result);
      const newSession = { 
        id:uid(), 
        date:now(), 
        type:config.type, 
        level:config.level, 
        score:result.overall_score, 
        questions:questions.length,
        company: config.company || '',
        customRole: config.customRole || ''
      };
      const newHistory = [newSession, ...history].slice(0,10);
      setHistory(newHistory);
      ls_set(LS.INTERVIEW_HIST, newHistory);
      addToast(`Interview complete! Score: ${result.overall_score}/100`, result.overall_score >= 70 ? 'success' : 'ai');
    } catch(e) {
      addToast('Scoring failed. Showing raw answers.','error');
      setFeedback({ overall_score:0, summary:'Scoring failed.', strengths:[], improvements:[], question_scores:[] });
    } finally {
      setGenerating(false);
      setPhase('results');
    }
  };

  const reset = () => {
    setPhase('setup'); setQuestions([]); setAnswers([]); setCurAnswer(''); setCurrentQ(0);
    setFeedback(null); setTimerRunning(false); clearTimeout(timerRef.current);
  };

  const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const timerClass = timeLeft <= 30 ? 'interview-timer danger' : timeLeft <= 60 ? 'interview-timer warning' : 'interview-timer';
  const scoreColor = feedback ? getScoreColor(feedback.overall_score) : 'var(--text-1)';

  if (phase === 'scoring') {
    return (
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:20 }}>
        <Spinner size={40}/>
        <div style={{ fontSize:16, fontWeight:600, color:'var(--text-1)' }}>AI is scoring your interview…</div>
        <div style={{ fontSize:13, color:'var(--text-3)' }}>This takes about 15–30 seconds</div>
      </div>
    );
  }

  if (phase === 'results' && feedback) {
    return (
      <div className="view-container">
        <div style={{ maxWidth:720, margin:'0 auto', display:'flex', flexDirection:'column', gap:20 }}>
          {/* Score Header */}
          <div className="interview-score-hero">
            <div style={{ textAlign:'center' }}>
              <div className="mono score-reveal" style={{ fontSize:60, fontWeight:900, color:'white', lineHeight:1, textShadow:'0 2px 12px rgba(0,0,0,0.3)' }}>{feedback.overall_score}</div>
              <div style={{ fontSize:12, color:'rgba(255,255,255,0.7)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em' }}>/ 100</div>
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:600, color:'rgba(255,255,255,0.6)', textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:6 }}>
                {INTERVIEW_TYPES.find(t=>t.id===config.type)?.emoji} {config.type} · {config.level}
              </div>
              {(config.customRole || config.company) && (
                <div style={{ fontSize:13, fontWeight:700, color:'rgba(255,255,255,0.95)', marginBottom:4 }}>
                  Target: {config.customRole || 'Selected Role'}{config.company ? ` at ${config.company}` : ''}
                </div>
              )}
              <div style={{ fontSize:18, fontWeight:800, color:'white', marginBottom:8 }}>
                {feedback.overall_score >= 85 ? '🏆 Excellent Performance!' : feedback.overall_score >= 70 ? '✅ Good Job!' : feedback.overall_score >= 50 ? '📈 Keep Practicing!' : '💪 Room to Grow'}
              </div>
              <div style={{ fontSize:13, color:'rgba(255,255,255,0.8)', lineHeight:1.6 }}>{feedback.summary}</div>
            </div>
          </div>

          <div className="responsive-grid-2" style={{ gap:16 }}>
            {/* Strengths */}
            <div className="dash-section">
              <div style={{ fontSize:13, fontWeight:700, color:'var(--success)', marginBottom:12, display:'flex', gap:6, alignItems:'center' }}>
                {ThumbsUp && <ThumbsUp size={14}/>} Strengths
              </div>
              {(feedback.strengths||[]).map((s,i) => (
                <div key={i} style={{ display:'flex', gap:8, padding:'7px 0', borderBottom:'1px solid var(--border)', fontSize:12, color:'var(--text-2)', lineHeight:1.5 }}>
                  <span style={{ color:'var(--success)', flexShrink:0 }}>✓</span>{s}
                </div>
              ))}
            </div>
            {/* Improvements */}
            <div className="dash-section">
              <div style={{ fontSize:13, fontWeight:700, color:'var(--warning)', marginBottom:12, display:'flex', gap:6, alignItems:'center' }}>
                {Target && <Target size={14}/>} Areas to Improve
              </div>
              {(feedback.improvements||[]).map((imp,i) => (
                <div key={i} style={{ display:'flex', gap:8, padding:'7px 0', borderBottom:'1px solid var(--border)', fontSize:12, color:'var(--text-2)', lineHeight:1.5 }}>
                  <span style={{ color:'var(--warning)', flexShrink:0 }}>→</span>{imp}
                </div>
              ))}
            </div>
          </div>

          {/* Per-question breakdown */}
          <div className="dash-section">
            <div style={{ fontSize:13, fontWeight:700, color:'var(--text-1)', marginBottom:14 }}>Question-by-Question Breakdown</div>
            {(feedback.question_scores||[]).map((qs,i) => (
              <div key={i} className="score-breakdown-row">
                <div style={{ width:36, height:36, borderRadius:'50%', background:`${getScoreColor(qs.score)}20`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span className="mono" style={{ fontSize:13, fontWeight:800, color:getScoreColor(qs.score) }}>{qs.score}</span>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, fontWeight:600, color:'var(--text-1)', marginBottom:2, lineHeight:1.4 }}>{qs.question}</div>
                  <div style={{ fontSize:11, color:'var(--text-3)', lineHeight:1.5 }}>{qs.feedback}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ display:'flex', gap:12 }}>
            <Btn variant="primary" onClick={reset} style={{ flex:1 }}>
              {PlayCircle && <PlayCircle size={14}/>} Practice Again
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  if (phase === 'session') {
    const progress = ((currentQ) / questions.length) * 100;
    return (
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* Progress bar */}
        <div style={{ height:3, background:'var(--border)', flexShrink:0 }}>
          <div style={{ height:'100%', background:'var(--accent)', width:`${progress}%`, transition:'width 0.3s ease' }}/>
        </div>
        <div className="interview-session-container">
          <div style={{ width:'100%', maxWidth:680, display:'flex', flexDirection:'column', gap:20 }}>
            {/* Top bar */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{ fontSize:13, fontWeight:600, color:'var(--text-3)' }}>Question {currentQ+1} of {questions.length}</div>
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                <div className={timerClass}>{fmt(timeLeft)}</div>
                <button className="btn btn-ghost btn-icon" title={timerRunning?'Pause timer':'Resume timer'} onClick={()=>setTimerRunning(v=>!v)}>
                  {timerRunning ? (PauseCircle && <PauseCircle size={18}/>) : (PlayCircle && <PlayCircle size={18}/>)}
                </button>
              </div>
            </div>

            {/* Question card */}
            <div className="interview-question-card">
              <div style={{ fontSize:11, fontWeight:700, color:'var(--accent)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:10 }}>
                {INTERVIEW_TYPES.find(t=>t.id===config.type)?.emoji} {config.type} Question
              </div>
              <div style={{ fontSize:17, fontWeight:700, color:'var(--text-1)', lineHeight:1.55 }}>
                {questions[currentQ]}
              </div>
            </div>

            {/* STAR hint */}
            <details style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10, padding:'10px 14px' }}>
              <summary style={{ fontSize:12, fontWeight:600, color:'var(--text-3)', cursor:'pointer', userSelect:'none' }}>
                💡 STAR Framework Reminder
              </summary>
              <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:6 }}>
                {[['S — Situation','Set the scene. What was the context?'],['T — Task','What was your responsibility or goal?'],['A — Action','What specific steps did YOU take?'],['R — Result','What was the measurable outcome?']].map(([l,d])=>(
                  <div key={l} style={{ display:'flex', gap:10, fontSize:12, color:'var(--text-2)' }}><strong style={{ color:'var(--accent)', flexShrink:0, width:100 }}>{l}</strong>{d}</div>
                ))}
              </div>
            </details>

            {/* Answer area */}
            <div className="field-group">
              <label className="field-label" style={{ display:'flex', justifyContent:'space-between' }}>
                <span>Your Answer</span>
                <span style={{ fontSize:11, color:'var(--text-3)', fontWeight:400 }}>{curAnswer.length} characters</span>
              </label>
              <textarea className="field-input" style={{ minHeight:160, lineHeight:1.7, fontSize:13 }}
                value={curAnswer} onChange={e=>setCurAnswer(e.target.value)}
                placeholder="Structure your answer using the STAR framework. Aim for 2–4 minutes of speaking time (200–400 words)…"/>
            </div>

            <div style={{ display:'flex', gap:10 }}>
              <Btn variant="primary" onClick={moveNext} style={{ flex:1 }}>
                {currentQ < questions.length - 1 ? `Next Question →` : 'Finish & Get Score'}
              </Btn>
              <Btn variant="ghost" onClick={reset}>Quit</Btn>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // Setup phase
  return (
    <div className="view-container">
      <div style={{ maxWidth:700, margin:'0 auto', display:'flex', flexDirection:'column', gap:28 }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:800, color:'var(--text-1)', letterSpacing:'-0.02em', marginBottom:6 }}>
            {Mic && <Mic size={20} style={{ display:'inline', marginRight:10, color:'var(--pink)' }}/>}Mock Interview Practice
          </h1>
          <p style={{ fontSize:13, color:'var(--text-3)', margin:0, lineHeight:1.6 }}>Practice real-time interview questions, get AI scoring, and receive actionable feedback to land your dream job.</p>
        </div>

        {/* Interview Type */}
        <div>
          <div style={{ fontSize:13, fontWeight:700, color:'var(--text-1)', marginBottom:12 }}>Choose Interview Type</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(130px, 1fr))', gap:10 }}>
            {INTERVIEW_TYPES.map(t => (
              <div key={t.id} className={`interview-type-card${config.type===t.id?' selected':''}`} onClick={()=>setConfig(c=>({...c,type:t.id}))}>
                <span style={{ fontSize:24 }}>{t.emoji}</span>
                <div style={{ fontSize:12, fontWeight:700, color:'var(--text-1)' }}>{t.label}</div>
                <div style={{ fontSize:10, color:'var(--text-3)', lineHeight:1.4 }}>{t.desc}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Target Position (Optional) */}
        <div>
          <div style={{ fontSize:13, fontWeight:700, color:'var(--text-1)', marginBottom:12 }}>Target Position (Optional)</div>
          <div className="responsive-grid-2" style={{ gap:20 }}>
            <div>
              <label className="field-label" style={{ fontSize:11, color:'var(--text-3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>Target Company</label>
              <input 
                className="field-input" 
                style={{ fontSize:13 }} 
                placeholder="e.g. Google, Stripe, Netflix" 
                value={config.company || ''} 
                onChange={e=>setConfig(c=>({...c,company:e.target.value}))}
              />
            </div>
            <div>
              <label className="field-label" style={{ fontSize:11, color:'var(--text-3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>Custom Role / Position</label>
              <input 
                className="field-input" 
                style={{ fontSize:13 }} 
                placeholder="e.g. Senior iOS Developer, Staff DevOps" 
                value={config.customRole || ''} 
                onChange={e=>setConfig(c=>({...c,customRole:e.target.value}))}
              />
            </div>
          </div>
        </div>

        {/* Level + Duration */}
        <div className="responsive-grid-2" style={{ gap:20 }}>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:'var(--text-1)', marginBottom:10 }}>Experience Level</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {INTERVIEW_LEVELS.map(l => (
                <label key={l} style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer', padding:'10px 12px', background:'var(--surface)', border:`1px solid ${config.level===l?'var(--accent)':'var(--border)'}`, borderRadius:9, transition:'all 0.15s' }}>
                  <input type="radio" name="level" checked={config.level===l} onChange={()=>setConfig(c=>({...c,level:l}))} style={{ accentColor:'var(--accent)' }}/>
                  <span style={{ fontSize:13, fontWeight:600, color:config.level===l?'var(--accent)':'var(--text-1)' }}>{l}</span>
                </label>
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:'var(--text-1)', marginBottom:10 }}>Session Length</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {INTERVIEW_DURATIONS.map(d => (
                <label key={d.label} style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer', padding:'10px 12px', background:'var(--surface)', border:`1px solid ${config.duration.count===d.count?'var(--accent)':'var(--border)'}`, borderRadius:9, transition:'all 0.15s' }}>
                  <input type="radio" name="duration" checked={config.duration.count===d.count} onChange={()=>setConfig(c=>({...c,duration:d}))} style={{ accentColor:'var(--accent)' }}/>
                  <span style={{ fontSize:13, fontWeight:600, color:config.duration.count===d.count?'var(--accent)':'var(--text-1)' }}>{d.label}</span>
                </label>
              ))}
            </div>
          </div>
        </div>

        {/* Session history */}
        {history.length > 0 && (
          <div className="dash-section">
            <div style={{ fontSize:13, fontWeight:700, color:'var(--text-1)', marginBottom:12 }}>Past Sessions</div>
            <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
              {history.slice(0,5).map(s => (
                <div key={s.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'8px 0', borderBottom:'1px solid var(--border)' }}>
                  <span style={{ fontSize:16 }}>{INTERVIEW_TYPES.find(t=>t.id===s.type)?.emoji||'🎤'}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontWeight:600, color:'var(--text-1)' }}>
                      {INTERVIEW_TYPES.find(t=>t.id===s.type)?.label} · {s.level}
                      {(s.customRole || s.company) && (
                        <span style={{ fontSize:11, color:'var(--text-2)', marginLeft:6 }}>
                          ({s.customRole || 'Custom Role'}{s.company ? ` @ ${s.company}` : ''})
                        </span>
                      )}
                    </div>
                    <div style={{ fontSize:11, color:'var(--text-3)' }}>{s.questions} questions · {formatRelative(s.date)}</div>
                  </div>
                  <div className="mono" style={{ fontSize:16, fontWeight:800, color:getScoreColor(s.score) }}>{s.score}/100</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <Btn variant="primary" style={{ padding:'14px 24px', fontSize:15, width:'100%', justifyContent:'center' }}
          onClick={startSession} disabled={generating}>
          {generating ? <Spinner size={16}/> : (PlayCircle && <PlayCircle size={18}/>)}
          {generating ? 'Generating questions…' : `Start Interview — ${config.duration.count} Questions`}
        </Btn>
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// KANBAN VIEW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function KanbanColumn({ stage, jobs }) {
  const { dispatch, addToast } = useApp();
  const [dragOver, setDragOver] = useState(false);
  const meta = STAGE_META[stage];

  const handleDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const jobId    = e.dataTransfer.getData('jobId');
    const fromStage= e.dataTransfer.getData('fromStage');
    if (fromStage !== stage) {
      dispatch({ type:A.UPDATE_JOB, payload:{ id:jobId, stage, updatedAt:now(), appliedAt: stage==='applied'?now():undefined } });
      addToast(`Moved to ${meta.label}`, 'success');
    }
  };

  return (
    <div className={`kanban-col${dragOver?' drag-over':''}`}
      onDragOver={e=>{e.preventDefault();setDragOver(true);}}
      onDragLeave={()=>setDragOver(false)}
      onDrop={handleDrop}
      aria-label={`${meta.label} column, ${jobs.length} jobs`}>
      <div className="kanban-col-header">
        <div style={{ width:8, height:8, borderRadius:'50%', background:meta.color, flexShrink:0 }}/>
        <span style={{ fontSize:12, fontWeight:700, color:'var(--text-1)', flex:1 }}>{meta.label}</span>
        <span className="mono" style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', background:'var(--surface-3)', padding:'1px 7px', borderRadius:10 }}>{jobs.length}</span>
        <button className="btn btn-ghost btn-icon btn-sm" aria-label={`Add job to ${meta.label}`}
          onClick={()=>dispatch({ type:A.SET_MODAL, payload:{ addJob:true } })}>
          {Plus&&<Plus size={13}/>}
        </button>
      </div>
      <div className="kanban-col-body">
        {jobs.length === 0 ? (
          <div style={{ padding:'20px 12px', textAlign:'center', color:'var(--text-3)', fontSize:12, border:'1px dashed var(--border)', borderRadius:8, lineHeight:1.5 }}>
            Drag jobs here<br/>or add a new one
          </div>
        ) : jobs.map(job=><JobCard key={job.id} job={job} />)}
      </div>
    </div>
  );
}

function KanbanView() {
  const { state } = useApp();
  const { applications, filters } = state;

  const filtered = useMemo(() => {
    let jobs = applications;
    if (filters.search) {
      const q = filters.search.toLowerCase();
      jobs = jobs.filter(j =>
        j.companyName.toLowerCase().includes(q) ||
        j.roleName.toLowerCase().includes(q) ||
        (j.tags||[]).some(t=>t.toLowerCase().includes(q))
      );
    }
    return jobs;
  }, [applications, filters]);

  const byStage = useMemo(() => {
    const m = {};
    STAGES.forEach(s => m[s] = []);
    filtered.forEach(j => { if (m[j.stage]) m[j.stage].push(j); });
    return m;
  }, [filtered]);

  return (
    <div className="kanban-scroll" role="main" aria-label="Kanban board">
      {STAGES.map(s=><KanbanColumn key={s} stage={s} jobs={byStage[s]}/>)}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LIST VIEW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ListView() {
  const { state, dispatch, addToast } = useApp();
  const { applications, filters } = state;
  const [sort, setSort]         = useState({ col:'updatedAt', asc:false });
  const [selected, setSelected] = useState(new Set());
  const [stageFilter, setStageFilter] = useState('all');

  const filtered = useMemo(() => {
    let jobs = applications;
    if (filters.search) {
      const q = filters.search.toLowerCase();
      jobs = jobs.filter(j=>j.companyName.toLowerCase().includes(q)||j.roleName.toLowerCase().includes(q));
    }
    if (stageFilter!=='all') jobs = jobs.filter(j=>j.stage===stageFilter);
    const { col, asc } = sort;
    jobs = [...jobs].sort((a,b)=>{
      let av=a[col]||'', bv=b[col]||'';
      if (typeof av==='number') return asc?av-bv:bv-av;
      return asc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
    });
    return jobs;
  }, [applications, filters, sort, stageFilter]);

  const toggleSort = (col) => setSort(s=>({ col, asc:s.col===col?!s.asc:true }));
  const SortIcon = ({ col }) => sort.col===col ? (sort.asc?<ChevronUp size={12}/>:<ChevronDown size={12}/>) : null;

  const exportCSV = () => {
    const header = 'Company,Role,Stage,Location,Match%,Applied,Priority\n';
    const rows   = applications.map(j=>
      `"${j.companyName}","${j.roleName}","${j.stage}","${j.location||''}","${j.matchScore||''}","${j.appliedAt?formatDate(j.appliedAt):''}","${j.priority||''}"`
    ).join('\n');
    const blob = new Blob([header+rows], { type:'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download='careerdeck-applications.csv'; a.click();
    URL.revokeObjectURL(url);
    addToast('CSV exported', 'success');
  };

  const bulkDelete = () => {
    selected.forEach(id=>dispatch({ type:A.DELETE_JOB, payload:id }));
    addToast(`Deleted ${selected.size} jobs`, 'error');
    setSelected(new Set());
  };

  const cols = [
    { key:'companyName', label:'Company' }, { key:'roleName', label:'Role' },
    { key:'stage',       label:'Stage'   }, { key:'location',  label:'Location' },
    { key:'matchScore',  label:'Match%'  }, { key:'appliedAt', label:'Applied' },
    { key:'priority',    label:'Priority' },
  ];

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Filter bar */}
      <div style={{ padding:'12px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', flexShrink:0, background:'var(--bg)' }}>
        <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
          {['all',...STAGES].map(s=>(
            <button key={s} className={`stage-pill${stageFilter===s?' active':''}`}
              style={{ background:stageFilter===s?(s==='all'?'var(--surface-3)':STAGE_META[s]?.bg):'var(--surface)', color:stageFilter===s?(s==='all'?'var(--text-1)':STAGE_META[s]?.color):'var(--text-2)', borderColor:stageFilter===s?(s==='all'?'var(--border-2)':STAGE_META[s]?.color+'66'):'var(--border)' }}
              onClick={()=>setStageFilter(s)}>
              {s==='all'?'All Stages':STAGE_META[s]?.label}
            </button>
          ))}
        </div>
        <div style={{ flex:1 }}/>
        {selected.size>0 && (
          <Btn variant="danger" size="sm" onClick={bulkDelete}>
            {Trash2&&<Trash2 size={13}/>} Delete {selected.size}
          </Btn>
        )}
        <Btn variant="secondary" size="sm" onClick={exportCSV}>
          {Download&&<Download size={13}/>} Export CSV
        </Btn>
      </div>

      {/* Table */}
      <div style={{ flex:1, overflowX:'auto', overflowY:'auto', paddingBottom:100 }}>
        {filtered.length === 0 ? (
          <div className="empty-state" style={{ paddingTop:80 }}>
            <Briefcase size={40} style={{ color:'var(--text-3)' }}/>
            <div style={{ fontSize:15, fontWeight:600, color:'var(--text-2)' }}>No jobs found</div>
            <div style={{ fontSize:13, color:'var(--text-3)' }}>Try adjusting your filters</div>
          </div>
        ) : (
          <table className="list-table">
            <thead>
              <tr>
                <th style={{ width:36 }}>
                  <input type="checkbox" checked={selected.size===filtered.length&&filtered.length>0}
                    onChange={e=>{
                      if(e.target.checked) setSelected(new Set(filtered.map(j=>j.id)));
                      else setSelected(new Set());
                    }} aria-label="Select all"/>
                </th>
                {cols.map(c=>{
                  const isHidden = ['location', 'appliedAt', 'priority'].includes(c.key);
                  return (
                    <th key={c.key} onClick={()=>toggleSort(c.key)} className={isHidden ? 'hide-mobile' : ''}>
                      <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
                        {c.label}{SortIcon({col:c.key})}
                      </span>
                    </th>
                  );
