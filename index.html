                        borderRadius:'0 3px 3px 0',
                        padding:'2px 6px'
                      }} title={isAccepted ? 'AI Tailored Bullet' : 'Original Bullet'}>
                        <span style={{ color:NAVY, fontSize:8, marginTop:2, flexShrink:0 }}>▸</span>
                        <span style={{ fontSize:9.5, color:GREY, lineHeight:1.6 }}>{text}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── Education ── */}
        {result.education && result.education.length > 0 && (
          <div style={{ marginBottom:4 }}>
            <SectionHead title="Education"/>
            {result.education.map((edu, idx) => (
              <div key={idx} style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4 }}>
                <div>
                  <span style={{ fontWeight:700, color:DARK, fontSize:9.5 }}>{edu.degree}</span>
                  {edu.school && <span style={{ color:MUTED, fontSize:9 }}> — {edu.school}</span>}
                  {edu.location && <div style={{ fontSize:8.5, color:MUTED, fontStyle:'italic' }}>{edu.location}</div>}
                </div>
                {edu.dates && <div style={{ fontSize:8.5, color:MUTED, fontStyle:'italic', flexShrink:0, marginLeft:8 }}>{edu.dates}</div>}
              </div>
            ))}
          </div>
        )}

        {/* ── Skills ── */}
        {result.skills && result.skills.length > 0 && (
          <div style={{ marginBottom:4 }}>
            <SectionHead title="Skills"/>
            {result.skills.map((sg, idx) => (
              <div key={idx} style={{ fontSize:9.5, color:GREY, marginBottom:3 }}>
                <strong style={{ color:DARK }}>{sg.category}:</strong> {(sg.items||[]).join(', ')}
              </div>
            ))}
          </div>
        )}

        {/* ── Projects ── */}
        {result.projects && result.projects.length > 0 && (
          <div style={{ marginBottom:4 }}>
            <SectionHead title="Projects"/>
            {result.projects.map((proj, idx) => (
              <div key={idx} style={{ marginBottom:6 }}>
                <div style={{ fontWeight:700, color:DARK, fontSize:9.5 }}>
                  {proj.name}{proj.url && <span style={{ fontSize:8.5, fontWeight:'normal', color:'#3B82F6', marginLeft:4 }}>({proj.url})</span>}
                </div>
                {proj.description && <div style={{ fontSize:9.5, color:GREY, paddingLeft:8, marginTop:2, borderLeft:`2px solid ${RULE}` }}>{proj.description}</div>}
              </div>
            ))}
          </div>
        )}

        {/* ── Certifications ── */}
        {result.certifications && result.certifications.length > 0 && (
          <div style={{ marginBottom:4 }}>
            <SectionHead title="Certifications"/>
            {result.certifications.map((cert, idx) => (
              <div key={idx} style={{ fontSize:9.5, color:GREY, marginBottom:3 }}>
                <strong style={{ color:DARK }}>{cert.name}</strong>
                {cert.issuer && <span style={{ color:MUTED }}> · {cert.issuer}</span>}
                {cert.year && <span style={{ color:MUTED }}> ({cert.year})</span>}
              </div>
            ))}
          </div>
        )}

        {/* ── Footer note ── */}
        <div style={{ marginTop:14, paddingTop:8, borderTop:`1px solid ${RULE}`, fontSize:7.5, color:RULE, textAlign:'center' }}>
          AI-Tailored Resume · CareerDeck · {new Date().toLocaleDateString()}
        </div>
      </div>
    );
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {!result&&!loading&&(
        <div className="ai-placeholder">
          <div className="ai-glow-icon">{Wand2&&<Wand2 size={22} style={{ color:'var(--accent)' }}/>}</div>
          <div style={{ fontWeight:700, fontSize:15, color:'var(--text-1)' }}>Resume Tailor</div>
          <div style={{ fontSize:13, color:'var(--text-3)', maxWidth:380, lineHeight:1.6 }}>
            AI will completely restructure and tailor your resume layout and content to fit this job's standards
          </div>
          <Btn variant="primary" onClick={run}>{Wand2&&<Wand2 size={14}/>} Tailor & Redesign Resume</Btn>
        </div>
      )}
      {loading&&(
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, padding:40 }}>
          <Spinner size={28}/>
          <div style={{ color:'var(--text-2)', fontSize:14 }}>Redesigning & Tailoring resume…</div>
        </div>
      )}
      <AIError err={err} onRetry={run}/>
      {result&&(
        <>
          {/* Sub Navigation Tabs */}
          <div className="tabs" style={{ alignSelf: 'flex-start' }}>
            <button className={`tab ${activeTab==='tune'?'active':''}`} onClick={()=>setActiveTab('tune')}>Bullets Tuning</button>
            <button className={`tab ${activeTab==='preview'?'active':''}`} onClick={()=>setActiveTab('preview')}>Full Resume Preview & Export</button>
          </div>

          {activeTab === 'tune' && (
            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
              {/* ATS score */}
              <div style={{ display:'flex', gap:12 }}>
                {[{label:'Before',score:result.atsScoreBefore,color:'var(--danger)'},{label:'After',score:result.atsScoreAfter,color:'var(--success)'}].map(s=>(
                  <div key={s.label} style={{ flex:1, background:'var(--bg)', borderRadius:10, padding:'14px 16px', textAlign:'center' }}>
                    <div style={{ fontSize:11, color:'var(--text-3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6 }}>{s.label}</div>
                    <div className="mono" style={{ fontSize:28, fontWeight:800, color:s.color }}>{s.score}</div>
                    <div style={{ fontSize:11, color:'var(--text-3)' }}>ATS Score</div>
                  </div>
                ))}
              </div>
              {result.summaryNote&&<div style={{ background:'var(--accent-glow)', border:'1px solid rgba(79,142,247,0.3)', borderRadius:8, padding:'10px 14px', fontSize:13, color:'var(--text-2)' }}>{Sparkles&&<Sparkles size={12} style={{ display:'inline', marginRight:5, color:'var(--accent)' }}/>}{result.summaryNote}</div>}

              {/* Diffs grouped by work experience */}
              {result.experience && result.experience.length > 0 && (
                <div>
                  <div style={{ fontSize:12, fontWeight:700, color:'var(--text-2)', marginBottom:8 }}>Tune Experience Bullets:</div>
                  <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                    {result.experience.map((exp, expIdx) => (
                      <div key={expIdx} style={{ background:'var(--surface-2)', padding:12, borderRadius:10, border:'1px solid var(--border)' }}>
                        <div style={{ fontSize:12, fontWeight:700, color:'var(--text-1)', marginBottom:8 }}>{exp.role} at {exp.company}</div>
                        
                        {(exp.bullets || []).map((b, bIdx) => {
                          const key = `${expIdx}_${bIdx}`;
                          return (
                            <div key={bIdx} style={{ background:'var(--bg)', borderRadius:8, border:'1px solid var(--border)', overflow:'hidden', marginBottom:10 }}>
                              <div style={{ display:'flex' }} className="diff-row-container">
                                <div style={{ flex:1, padding:10, borderRight:'1px solid var(--border)' }}>
                                  <div style={{ fontSize:9, fontWeight:700, color:'var(--danger)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4 }}>Original</div>
                                  <div style={{ fontSize:11, lineHeight:1.6, color:'var(--text-3)' }}>{b.original}</div>
                                </div>
                                <div style={{ flex:1, padding:10 }}>
                                  <div style={{ fontSize:9, fontWeight:700, color:'var(--success)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4 }}>Rewritten</div>
                                  <div style={{ fontSize:11, lineHeight:1.6, color:'var(--text-1)' }}>{b.rewritten}</div>
                                  {(b.keywordsAdded||[]).length>0&&<div style={{ marginTop:4, display:'flex', gap:4, flexWrap:'wrap' }}>
                                    {b.keywordsAdded.map(k=><span key={k} style={{ fontSize:9, background:'rgba(79,142,247,0.15)', color:'var(--accent)', borderRadius:4, padding:'1px 5px' }}>+{k}</span>)}
                                  </div>}
                                </div>
                              </div>
                              <div style={{ padding:'5px 10px', borderTop:'1px solid var(--border)', display:'flex', gap:6, background:'var(--surface-3)' }}>
                                <button className="btn btn-sm" style={{ background:accepted[key]!==false?'rgba(52,211,153,0.15)':'var(--surface-2)', color:accepted[key]!==false?'var(--success)':'var(--text-3)', border:`1px solid ${accepted[key]!==false?'rgba(52,211,153,0.4)':'var(--border)'}`, borderRadius:5 }}
                                  onClick={()=>setAccepted(a=>({...a,[key]:true}))}>✓ Accept</button>
                                <button className="btn btn-sm" style={{ background:accepted[key]===false?'rgba(248,113,113,0.15)':'var(--surface-2)', color:accepted[key]===false?'var(--danger)':'var(--text-3)', border:`1px solid ${accepted[key]===false?'rgba(248,113,113,0.4)':'var(--border)'}`, borderRadius:5 }}
                                  onClick={()=>setAccepted(a=>({...a,[key]:false}))}>✗ Keep original</button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Missing keywords */}
              {(result.topMissingKeywords||[]).length>0&&(
                <div>
                  <div className="section-title">Top Missing Keywords</div>
                  <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                    {result.topMissingKeywords.map(k=>(
                      <span key={k} className="keyword-chip missing" onClick={()=>navigator.clipboard.writeText(k)}>{k}</span>
                    ))}
                  </div>
                </div>
              )}
              <div style={{ display:'flex', gap:8 }}>
                <Btn variant="primary" onClick={()=>setActiveTab('preview')}>{ArrowRight&&<ArrowRight size={14}/>} Preview & Export</Btn>
                <Btn variant="secondary" onClick={copyTailored}>{Copy&&<Copy size={14}/>} Copy Bullets Only</Btn>
                <Btn variant="ghost" onClick={run}>{RefreshCw&&<RefreshCw size={14}/>} Regenerate</Btn>
              </div>
            </div>
          )}

          {activeTab === 'preview' && (
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <div style={{ fontSize:13, color:'var(--text-2)' }}>
                  This preview renders your redesigned resume adhering to top-notch formatting standards.
                </div>
                <Btn size="sm" variant="secondary" onClick={()=>setIsEditing(!isEditing)}>
                  {Edit3&&<Edit3 size={13}/>} {isEditing ? 'Visual Preview' : 'Edit Plain Text'}
                </Btn>
              </div>

              {isEditing ? (
                <textarea
                  className="field-input text-preview-box"
                  style={{
                    minHeight:350,
                    maxHeight:450,
                    fontFamily:'Courier New, Courier, monospace',
                    fontSize:12,
                    lineHeight:1.6,
                    padding:16,
                    background:'var(--bg)',
                    color:'var(--text-1)',
                    border:'1px solid var(--border)',
                    borderRadius:8,
                    resize:'vertical'
                  }}
                  value={tailoredText}
                  onChange={e=>setTailoredText(e.target.value)}
                />
              ) : (
                <div
                  className="text-preview-box"
                  style={{
                    maxHeight:450,
                    overflowY:'auto',
                    border:'1px solid var(--border)',
                    borderRadius:8,
                    background:'rgba(255,255,255,0.05)',
                    padding:8
                  }}
                >
                  {renderVisualResume()}
                </div>
              )}

              <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                <Btn variant="primary" onClick={()=>exportResumeAsPDF(result, accepted, job.companyName)}>
                  {Download&&<Download size={14}/>} Download PDF
                </Btn>
                <Btn variant="primary" style={{ background:'var(--success)' }} onClick={()=>exportResumeAsDocx(result, accepted, job.companyName)}>
                  {Download&&<Download size={14}/>} Download Word
                </Btn>
                <Btn variant="secondary" onClick={saveToJob}>
                  {Check&&<Check size={14}/>} Save to Job
                </Btn>
                <Btn variant="ghost" onClick={copyFullResume}>
                  {Copy&&<Copy size={14}/>} Copy Full Resume
                </Btn>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// — ATS Scanner —
function ATSScanner({ job, user }) {
  const { dispatch } = useApp();
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr]       = useState(null);
  const [actions, setActions] = useState({});

  if (!user.apiKey) return <NoAPIKey/>;
  if (!user.baseResume) return <NoResume/>;

  const run = async () => {
    setLoading(true); setErr(null); setResult(null);
    const sys = `You are an ATS expert. Analyze the resume against the job description.
Return ONLY valid JSON: {"overallScore":number,"categories":{"keywords":{"score":number,"found":string[],"missing":string[]},"skills":{"score":number,"found":string[],"missing":string[]},"experience":{"score":number,"notes":string},"formatting":{"score":number,"issues":string[]}},"topActions":string[],"verdict":string}`;
    const msg = `Job Description:\n${job.jdText||'(No JD)'}\n\nResume:\n${user.baseResume}`;
    try {
      let full='';
      await callLLM(sys, msg, t=>full=t, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      const parsed = parseAIJSON(full);
      setResult(parsed);
      dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, matchScore:parsed.overallScore, atsSuggestions:parsed.topActions||[], updatedAt:now() } });
    } catch(e) { setErr(e); }
    finally { setLoading(false); }
  };

  // SVG circular dial
  const CircularScore = ({ score, size=100 }) => {
    const r=40, cx=50, cy=50, circ=2*Math.PI*r;
    const dash=circ*(score/100), gap=circ-dash;
    const color=getScoreColor(score);
    return (
      <div className="ats-score-wrap">
        <svg width={size} height={size} viewBox="0 0 100 100">
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="8"/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="8" strokeLinecap="round"
            strokeDasharray={`${dash} ${gap}`} className="score-ring" style={{ transition:'stroke-dasharray 0.8s ease-out' }}/>
          <text x={cx} y={cy+2} textAnchor="middle" dominantBaseline="middle" fontSize="18" fontWeight="800" fill={color} fontFamily="JetBrains Mono,monospace">{score}</text>
          <text x={cx} y={cy+18} textAnchor="middle" fontSize="8" fill="var(--text-3)" fontFamily="Inter,sans-serif">/ 100</text>
        </svg>
        <div style={{ fontSize:12, fontWeight:700, color }}>{getScoreLabel(score)}</div>
      </div>
    );
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {!result&&!loading&&(
        <div className="ai-placeholder">
          <div className="ai-glow-icon">{Target&&<Target size={22} style={{ color:'var(--violet)' }}/>}</div>
          <div style={{ fontWeight:700, fontSize:15, color:'var(--text-1)' }}>ATS Scanner</div>
          <div style={{ fontSize:13, color:'var(--text-3)', maxWidth:360, lineHeight:1.6 }}>Score your resume against this job's ATS system with a detailed breakdown</div>
          <Btn variant="primary" style={{ background:'var(--violet)' }} onClick={run}>{Target&&<Target size={14}/>} Scan My Resume</Btn>
        </div>
      )}
      {loading&&(
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, padding:40 }}>
          <Spinner size={28} color="var(--violet)"/>
          <div style={{ color:'var(--text-2)', fontSize:14 }}>Scanning your resume…</div>
        </div>
      )}
      <AIError err={err} onRetry={run}/>
      {result&&(
        <>
          <div style={{ display:'flex', justifyContent:'center' }}>
            <CircularScore score={result.overallScore}/>
          </div>
          {result.verdict&&(
            <div style={{ background:'var(--bg)', borderRadius:10, padding:14, fontSize:14, color:'var(--text-2)', lineHeight:1.6, textAlign:'center' }}>{result.verdict}</div>
          )}
          {/* Category bars */}
          <div className="responsive-grid-2" style={{ gap:10 }}>
            {Object.entries(result.categories||{}).map(([k,v])=>(
              <div key={k} style={{ background:'var(--bg)', borderRadius:8, padding:12 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:'var(--text-2)', textTransform:'capitalize' }}>{k}</span>
                  <span className="mono" style={{ fontSize:12, fontWeight:700, color:getScoreColor(v.score) }}>{v.score}</span>
                </div>
                <div className="progress-bar-outer">
                  <div className="progress-bar-inner" style={{ width:`${v.score}%`, background:getScoreColor(v.score) }}/>
                </div>
              </div>
            ))}
          </div>
          {/* Missing keywords */}
          {(result.categories?.keywords?.missing||[]).length>0&&(
            <div>
              <div className="section-title">Missing Keywords (click to copy)</div>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                {result.categories.keywords.missing.map(k=>(
                  <span key={k} className="keyword-chip missing" onClick={()=>navigator.clipboard.writeText(k)} title="Click to copy">
                    {k}
                  </span>
                ))}
              </div>
            </div>
          )}
          {/* Top actions */}
          {(result.topActions||[]).length>0&&(
            <div>
              <div className="section-title">Top 3 Actions</div>
              {result.topActions.slice(0,3).map((a,i)=>(
                <div key={i} style={{ display:'flex', gap:10, padding:'10px 0', borderBottom:'1px solid var(--border)', alignItems:'flex-start' }}>
                  <input type="checkbox" checked={!!actions[i]} onChange={e=>setActions(ac=>({...ac,[i]:e.target.checked}))} aria-label={`Action ${i+1}`}/>
                  <span style={{ fontSize:13, color:actions[i]?'var(--text-3)':'var(--text-1)', textDecoration:actions[i]?'line-through':'none', lineHeight:1.5 }}>{a}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{ display:'flex', gap:8 }}>
            <Btn variant="secondary" onClick={run}>{RefreshCw&&<RefreshCw size={14}/>} Re-scan</Btn>
          </div>
        </>
      )}
    </div>
  );
}

// — Interview Coach —
function InterviewCoach({ job, user }) {
  const { dispatch } = useApp();
  const [result, setResult]       = useState(null);
  const [loading, setLoading]     = useState(false);
  const [err, setErr]             = useState(null);
  const [expanded, setExpanded]   = useState({});
  const [practiced, setPracticed] = useState({});
  const [practiceMode, setPracticeMode] = useState(null);
  const [answer, setAnswer]       = useState('');
  const [feedback, setFeedback]   = useState('');
  const [fbLoading, setFbLoading] = useState(false);

  // TYPE_COLORS must be defined before any early return so it's always available
  const TYPE_COLORS = {
    behavioral: 'var(--accent)',
    technical:  'var(--violet)',
    culture:    'var(--success)',
    situational:'var(--warning)'
  };

  if (!user.apiKey) return <NoAPIKey/>;

  // Count only genuinely-practiced items
  const practicedCount = Object.values(practiced).filter(Boolean).length;

  const toggleExpanded = (idx) => {
    setExpanded(prev => ({ ...prev, [idx]: !prev[idx] }));
  };

  const togglePracticed = (idx, evt) => {
    evt.stopPropagation();
    setPracticed(prev => ({ ...prev, [idx]: !prev[idx] }));
  };

  const run = async () => {
    setLoading(true); setErr(null); setResult(null);
    setExpanded({}); setPracticed({}); setPracticeMode(null); setAnswer(''); setFeedback('');
    const sys = `You are a senior career coach and ex-FAANG interviewer. Generate a comprehensive interview prep guide for the candidate.

Return ONLY valid JSON (no markdown, no code fences, raw JSON only) with this exact structure:
{
  "questions": [
    {
      "type": "behavioral",
      "question": "Tell me about a time you...",
      "whyAsked": "Interviewers ask this to assess...",
      "starScaffold": {
        "situation": "Describe the context...",
        "task": "Explain your responsibility...",
        "action": "Detail the specific steps you took...",
        "result": "Quantify the outcome..."
      },
      "redFlags": "Avoid vague answers without metrics..."
    }
  ],
  "companyInsights": "Key things to know about this company culture and interview style...",
  "suggestedQuestions": ["Question to ask the interviewer...", "Another insightful question..."]
}

IMPORTANT RULES:
- Include exactly 15 questions total: 6 behavioral, 5 technical/role-specific, 2 culture, 2 situational
- "type" field must be exactly one of: behavioral, technical, culture, situational
- Every question object MUST have all fields: type, question, whyAsked, starScaffold, redFlags
- starScaffold MUST have all four fields: situation, task, action, result
- Do NOT use apostrophes or special characters inside string values that could break JSON
- Keep each string value concise (under 200 characters) to avoid response truncation
- suggestedQuestions should have 5 items`;
    const msg = `Job Description:\n${job.jdText||`${job.roleName} at ${job.companyName}`}\n\n${user.baseResume?'My background:\n'+user.baseResume.slice(0,600):''}`;
    try {
      let full='';
      await callLLM(sys, msg, t=>full=t, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      const parsed = parseAIJSON(full);
      if (!parsed.questions) parsed.questions = [];
      parsed.questions = parsed.questions.map(q => ({
        type:        String(q.type || 'behavioral'),
        question:    String(q.question || ''),
        whyAsked:    String(q.whyAsked || ''),
        starScaffold: (q.starScaffold && typeof q.starScaffold === 'object' && !Array.isArray(q.starScaffold))
          ? Object.fromEntries(
              Object.entries(q.starScaffold).map(([k,v]) => [k, String(v || '')])
            )
          : { situation:'', task:'', action:'', result:'' },
        redFlags:    String(q.redFlags || '')
      }));
      if (!Array.isArray(parsed.suggestedQuestions)) parsed.suggestedQuestions = [];
      parsed.suggestedQuestions = parsed.suggestedQuestions.map(s => String(s || ''));
      parsed.companyInsights = String(parsed.companyInsights || '');
      setResult(parsed);
      dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, activityLog:[{ id:uid(), event:'ai_used', timestamp:now(), source:'ai', detail:{ feature:'Interview Coach' } },...(job.activityLog||[])], updatedAt:now() } });
    } catch(e) { setErr(e); }
    finally { setLoading(false); }
  };

  const getFeedback = async (question) => {
    if (!answer.trim()) return;
    setFbLoading(true); setFeedback('');
    const sys = 'You are a career coach. Give concise, specific feedback on this interview answer. Max 3 sentences. Be honest and constructive.';
    const msg = `Interview question: "${question}"\n\nCandidate answer: "${answer}"`;
    try {
      let full='';
      await callLLM(sys, msg, t=>full=t, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      setFeedback(full);
    } catch(_) {}
    finally { setFbLoading(false); }
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {!result&&!loading&&(
        <div className="ai-placeholder">
          <div className="ai-glow-icon" style={{ background:'rgba(251,191,36,0.15)' }}>{Brain&&<Brain size={22} style={{ color:'var(--warning)' }}/>}</div>
          <div style={{ fontWeight:700, fontSize:15, color:'var(--text-1)' }}>Interview Coach</div>
          <div style={{ fontSize:13, color:'var(--text-3)', maxWidth:360, lineHeight:1.6 }}>Get 15 tailored interview questions with STAR scaffolds and company insights</div>
          <Btn variant="primary" style={{ background:'var(--warning)', color:'#000' }} onClick={run}>{Brain&&<Brain size={14}/>} Generate Questions</Btn>
        </div>
      )}
      {loading&&(
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, padding:40 }}>
          <Spinner size={28} color="var(--warning)"/>
          <div style={{ color:'var(--text-2)', fontSize:14 }}>Preparing your interview guide…</div>
        </div>
      )}
      <AIError err={err} onRetry={run}/>
      {result&&(
        <>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div style={{ fontSize:13, color:'var(--text-3)' }}>{practicedCount}/{(result.questions||[]).length} practiced</div>
            <Btn size="sm" variant="secondary" onClick={run}>{RefreshCw&&<RefreshCw size={13}/>} Regenerate</Btn>
          </div>

          {result.companyInsights&&(
            <div style={{ background:'var(--bg)', borderRadius:10, padding:14, border:'1px solid var(--border)' }}>
              <div className="section-title">Company Insights</div>
              <div style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.7, whiteSpace:'pre-line' }}>{result.companyInsights}</div>
            </div>
          )}

          {(result.questions||[]).map((q, idx) => {
            if (!q || !q.question) return null;
            const qType     = String(q.type || 'behavioral').toLowerCase();
            const typeColor = TYPE_COLORS[qType] || 'var(--accent)';
            // Ensure scaffold values are plain strings — never objects
            const rawScaffold = (q.starScaffold && typeof q.starScaffold === 'object' && !Array.isArray(q.starScaffold))
              ? q.starScaffold : {};
            const scaffold = Object.fromEntries(
              Object.entries(rawScaffold)
                .filter(([,v]) => v !== null && v !== undefined && v !== '')
                .map(([k,v]) => [k, typeof v === 'string' ? v : String(v)])
            );
            const questionText = String(q.question || '');
            const whyAsked    = String(q.whyAsked || '');
            const redFlags     = String(q.redFlags || '');
            const isExpanded  = !!expanded[idx];
            const isPracticed = !!practiced[idx];
            const inPractice  = practiceMode === idx;

            return (
              <div key={idx} className={`question-card${isExpanded?' expanded':''}`}>
                {/* Header row — click to expand */}
                <div
                  style={{ padding:'12px 14px', display:'flex', alignItems:'flex-start', gap:10, cursor:'pointer' }}
                  onClick={() => toggleExpanded(idx)}
                >
                  <input
                    type="checkbox"
                    checked={isPracticed}
                    onClick={evt => evt.stopPropagation()}
                    onChange={evt => togglePracticed(idx, evt)}
                    aria-label={`Mark question ${idx+1} as practiced`}
                  />
                  <div style={{ flex:1 }}>
                    <div style={{ marginBottom:6 }}>
                      <span className="type-badge" style={{ background:`${typeColor}20`, color:typeColor }}>
                        {qType}

                    </div>
                    <div style={{ fontSize:13, fontWeight:600, color:'var(--text-1)', lineHeight:1.5 }}>{questionText}</div>
                  </div>
                  {isExpanded
                    ? (ChevronUp&&<ChevronUp size={14} style={{ color:'var(--text-3)', flexShrink:0 }}/>)
                    : (ChevronDown&&<ChevronDown size={14} style={{ color:'var(--text-3)', flexShrink:0 }}/>)
                  }
                </div>

                {/* Expanded body */}
                {isExpanded&&(
                  <div style={{ padding:'0 14px 14px', borderTop:'1px solid var(--border)' }}>
                    <div style={{ paddingTop:12, display:'flex', flexDirection:'column', gap:10 }}>
                      {whyAsked&&<div style={{ fontSize:12, color:'var(--text-3)', fontStyle:'italic' }}>Why asked: {whyAsked}</div>}

                      {Object.keys(scaffold).length>0&&(
                        <div style={{ background:'var(--bg)', borderRadius:8, padding:12, display:'flex', flexDirection:'column', gap:6 }}>
                          <div style={{ fontSize:11, fontWeight:700, color:'var(--accent)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4 }}>STAR Guide</div>
                          {Object.entries(scaffold).map(([k,v]) => (
                            <div key={k} className="star-row">
                              <div className="star-label">{String(k)}</div>
                              <div style={{ fontSize:12, color:'var(--text-2)', lineHeight:1.6 }}>{String(v)}</div>
                            </div>
                          ))}
                        </div>
                      )}

                      {redFlags&&<div style={{ fontSize:12, color:'var(--danger)', background:'rgba(248,113,113,0.08)', borderRadius:6, padding:'8px 10px' }}><strong>⚠ Avoid:</strong> {redFlags}</div>}

                      {inPractice ? (
                        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                          <textarea className="field-input" style={{ minHeight:80 }} placeholder="Type your practice answer…" value={answer} onChange={evt=>setAnswer(evt.target.value)}/>
                          <div style={{ display:'flex', gap:8 }}>
                            <Btn size="sm" variant="primary" onClick={()=>getFeedback(questionText)} disabled={fbLoading||!answer.trim()}>
                              {fbLoading?<Spinner size={12}/>:(Sparkles&&<Sparkles size={12}/>)} Get AI Feedback
                            </Btn>
                            <Btn size="sm" variant="ghost" onClick={()=>{setPracticeMode(null);setAnswer('');setFeedback('');}}>Done</Btn>
                          </div>
                          {feedback&&(
                            <div style={{ background:'rgba(79,142,247,0.08)', border:'1px solid rgba(79,142,247,0.3)', borderRadius:8, padding:12, fontSize:13, color:'var(--text-1)', lineHeight:1.7 }}>
                              <div style={{ fontSize:11, fontWeight:700, color:'var(--accent)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6 }}>AI Feedback</div>
                              {feedback}
                            </div>
                          )}
                        </div>
                      ) : (
                        <Btn size="sm" variant="secondary" onClick={()=>{setPracticeMode(idx);setAnswer('');setFeedback('');}}>
                          {Mic&&<Mic size={12}/>} Practice this question
                        </Btn>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          })}

          {(result.suggestedQuestions||[]).length>0&&(
            <div style={{ background:'var(--bg)', borderRadius:10, padding:14, border:'1px solid var(--border)' }}>
              <div className="section-title">Questions to Ask the Interviewer</div>
              {result.suggestedQuestions.map((q,i)=>(
                <div key={i} style={{ fontSize:13, color:'var(--text-2)', padding:'6px 0', borderBottom:i<result.suggestedQuestions.length-1?'1px solid var(--border)':'none', lineHeight:1.5 }}>
                  {i+1}. {q}
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// — Match Score —
function MatchScoreFeature({ job, user }) {
  const { dispatch } = useApp();
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  if (!user.apiKey) return <NoAPIKey/>;
  if (!user.baseResume) return <NoResume/>;

  const run = async () => {
    setLoading(true); setErr(null); setResult(null);
    const sys = `You are an expert talent recruiter. Compare the candidate's resume against the job description and calculate a detailed match score.

Return ONLY valid JSON (no markdown, no code fences, raw JSON only) with this exact structure:
{
  "overallScore": 78,
  "breakdown": {
    "skillsMatch": { "score": 80, "matched": ["React", "TypeScript"], "missing": ["GraphQL"] },
    "experienceMatch": { "score": 75, "note": "5 years aligns with 3-5 year requirement." },
    "seniorityMatch": { "score": 70, "note": "Strong mid-level match for a senior role." },
    "keywordDensity": { "score": 85, "note": "Good keyword overlap with the job description." }
  },
  "verdict": "moderate",
  "oneLineVerdict": "Strong candidate; upskilling in GraphQL would significantly improve fit."
}

RULES:
- overallScore must be a plain integer between 0 and 100
- verdict must be exactly one of: strong, moderate, stretch, reach
- All score values must be plain integers between 0 and 100
- Every breakdown category must have at minimum score (number) and note (string)
- skillsMatch must also include matched and missing string arrays
- Keep all string values concise (under 150 characters)
- Do NOT use special characters or unescaped quotes inside strings`;
    const msg = `Job Description:\n${job.jdText||'(No JD provided)'}\n\nResume:\n${user.baseResume}`;
    try {
      let full='';
      await callLLM(sys, msg, t=>full=t, { provider:user.llmProvider, model:user.llmModel, apiKey:user.apiKey });
      const parsed = parseAIJSON(full);
      // Normalize: ensure overallScore is always a number
      if (typeof parsed.overallScore !== 'number') parsed.overallScore = parseInt(parsed.overallScore, 10) || 0;
      parsed.overallScore = Math.max(0, Math.min(100, parsed.overallScore));
      if (!parsed.verdict) parsed.verdict = 'moderate';
      if (!parsed.oneLineVerdict) parsed.oneLineVerdict = '';
      if (!parsed.breakdown || typeof parsed.breakdown !== 'object') parsed.breakdown = {};
      // Normalize each breakdown entry score to a valid number
      Object.keys(parsed.breakdown).forEach(k => {
        const v = parsed.breakdown[k];
        if (v && typeof v === 'object') {
          if (typeof v.score !== 'number') v.score = parseInt(v.score, 10) || 0;
          v.score = Math.max(0, Math.min(100, v.score));
          if (!v.note) v.note = '';
          if (!Array.isArray(v.matched)) v.matched = [];
          if (!Array.isArray(v.missing)) v.missing = [];
        }
      });
      setResult(parsed);
      dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, matchScore:parsed.overallScore, updatedAt:now() } });
    } catch(e) { setErr(e); }
    finally { setLoading(false); }
  };

  const score = result?.overallScore ?? job.matchScore;
  const color = score!=null?getScoreColor(score):'var(--text-3)';

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {!result&&!loading&&(
        <div className="ai-placeholder">
          <div className="ai-glow-icon" style={{ background:'rgba(94,135,247,0.15)' }}>{BarChart2&&<BarChart2 size={22} style={{ color:'var(--text-2)' }}/>}</div>
          <div style={{ fontWeight:700, fontSize:15, color:'var(--text-1)' }}>Match Score</div>
          {score!=null&&<div className="mono" style={{ fontSize:36, fontWeight:800, color }}>{score}%</div>}
          <div style={{ fontSize:13, color:'var(--text-3)', lineHeight:1.6 }}>Get a detailed breakdown of how well you match this role</div>
          <Btn variant="secondary" onClick={run}>{BarChart2&&<BarChart2 size={14}/>} {score!=null?'Recalculate Score':'Calculate Score'}</Btn>
        </div>
      )}
      {loading&&(
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, padding:40 }}>
          <Spinner size={28}/>
          <div style={{ color:'var(--text-2)', fontSize:14 }}>Calculating match…</div>
        </div>
      )}
      <AIError err={err} onRetry={run}/>
      {result&&(
        <>
          <div style={{ textAlign:'center', padding:'20px 0' }}>
            <div className="mono" style={{ fontSize:52, fontWeight:800, color, lineHeight:1 }}>{result.overallScore}</div>
            <div style={{ fontSize:14, color, fontWeight:700, marginTop:4 }}>{result.verdict?.toUpperCase()}</div>
            {result.oneLineVerdict&&<div style={{ fontSize:13, color:'var(--text-3)', marginTop:8, maxWidth:360, margin:'8px auto 0' }}>{result.oneLineVerdict}</div>}
          </div>
          {result.breakdown && Object.keys(result.breakdown).length > 0 &&(
            <div className="responsive-grid-2" style={{ gap:10 }}>
              {Object.entries(result.breakdown).map(([k,v])=>{
                if (!v || typeof v !== 'object') return null;
                const bScore = typeof v.score === 'number' ? Math.max(0, Math.min(100, v.score)) : 0;
                const matched = Array.isArray(v.matched) ? v.matched : [];
                const missing = Array.isArray(v.missing) ? v.missing : [];
                return (
                  <div key={k} style={{ background:'var(--bg)', borderRadius:10, padding:12 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                      <span style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'capitalize' }}>{k.replace(/([A-Z])/g,' $1').trim()}</span>
                      <span className="mono" style={{ fontSize:12, fontWeight:700, color:getScoreColor(bScore) }}>{bScore}</span>
                    </div>
                    <div className="progress-bar-outer"><div className="progress-bar-inner" style={{ width:`${bScore}%`, background:getScoreColor(bScore) }}/></div>
                    {v.note&&<div style={{ fontSize:11, color:'var(--text-3)', marginTop:6, lineHeight:1.5 }}>{v.note}</div>}
                    {matched.length > 0 &&(
                      <div style={{ marginTop:6, display:'flex', flexWrap:'wrap', gap:3 }}>
                        {matched.slice(0,6).map(s=><span key={s} style={{ fontSize:9, background:'rgba(52,211,153,0.15)', color:'var(--success)', borderRadius:4, padding:'1px 5px' }}>✓ {s}</span>)}
                      </div>
                    )}
                    {missing.length > 0 &&(
                      <div style={{ marginTop:4, display:'flex', flexWrap:'wrap', gap:3 }}>
                        {missing.slice(0,4).map(s=><span key={s} style={{ fontSize:9, background:'rgba(248,113,113,0.12)', color:'var(--danger)', borderRadius:4, padding:'1px 5px' }}>✗ {s}</span>)}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          <Btn variant="secondary" size="sm" onClick={run}>{RefreshCw&&<RefreshCw size={13}/>} Recalculate</Btn>
        </>
      )}
    </div>
  );
}

// — Cover Letter Generator —
function CoverLetterGenerator({ job, user }) {
  const { dispatch, addToast } = useApp();
  const [text, setText] = useState(job.coverLetter || '');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  useEffect(() => {
    setText(job.coverLetter || '');
  }, [job.coverLetter]);

  if (!user.apiKey) return <NoAPIKey/>;

  const run = async () => {
    setLoading(true); setErr(null);
    let full = '';
    const currentDate = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    const sys = `You are a world-class Executive Resume & Cover Letter Writer.
Your goal is to write a highly compelling, professional, yet natural and human-written cover letter.
Avoid generic AI patterns (such as "I am writing to express my enthusiastic interest...", "delighted to apply", "testament to my skills", "plethora", "nestled", "delve", "furthermore", "in conclusion"). Use an active, authentic voice that shows genuine insight into the company.

Target Role: ${job.roleName}
Company Name: ${job.companyName}
Company Details/Notes: ${job.notes || ''}

If the Job Description is provided, align the cover letter with its key requirements.
If the Job Description is missing, write a cover letter based on typical industry responsibilities for a "${job.roleName}" at "${job.companyName}" (for example, researching their engineering/product/business culture).

Candidate Base Resume:
${user.baseResume || '(No resume provided)'}

Candidate Information:
Name: ${user.name || 'Candidate'}
Email: ${user.email || ''}

Structure the cover letter professionally:
1. Header:
   - Use the exact date: ${currentDate}. Never use generic placeholder dates or outdated dates such as October 26, 2023.
   - Candidate contact details (email, phone, LinkedIn).
   - CRITICAL: Do NOT write or print any physical address or home address details under the candidate's name or anywhere in the letter.
2. Greeting (e.g., "Dear Hiring Team at ${job.companyName}," or specific name if available)
3. Opening hook: Briefly state the role you're targeting and show excitement about ${job.companyName}'s mission or recent product work.
4. Core value proposition (1-2 short paragraphs): Connect 2-3 specific accomplishments from the resume directly to the needs of the role. Use strong metrics/outcomes.
5. Cultural fit: Mention why ${job.companyName}'s work environment, values, or engineering style resonates with you.
6. Professional closing: Reiterate value and suggest next steps.
7. Sign-off: "Sincerely,\n${user.name || 'Candidate'}"

Write in plain text. Do not output markdown code fences.`;

    const msg = `Write a cover letter for ${job.roleName} at ${job.companyName}.\n\nJob Description:\n${job.jdText || '(Not provided)'}`;

    try {
      await callLLM(sys, msg, t => {
        full = t;
        setText(t);
      }, { provider: user.llmProvider, model: user.llmModel, apiKey: user.apiKey });

      dispatch({
        type: A.UPDATE_JOB,
        payload: {
          id: job.id,
          coverLetter: full,
          activityLog: [
            { id: uid(), event: 'ai_used', timestamp: now(), source: 'ai', detail: { feature: 'Cover Letter Generator' } },
            ...(job.activityLog || [])
          ],
          updatedAt: now()
        }
      });
      addToast('Cover letter generated and added to Documents!', 'success');
    } catch (e) {
      setErr(e);
    } finally {
      setLoading(false);
    }
  };

  const saveManual = () => {
    dispatch({
      type: A.UPDATE_JOB,
      payload: {
        id: job.id,
        coverLetter: text,
        updatedAt: now()
      }
    });
    addToast('Cover letter saved!', 'success');
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.6 }}>
        Generate a tailored, human-sounding cover letter using AI, or write and edit it manually below. Once saved, it will be available under the <strong>Documents</strong> tab.
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        <label className="field-label" htmlFor="cl-editor" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span>Cover Letter Editor</span>
          <span style={{ fontSize: 11, color: 'var(--text-3)' }}>{text.length} characters</span>
        </label>
        <textarea
          id="cl-editor"
          className="field-input"
          style={{ minHeight: 250, fontFamily: 'sans-serif', lineHeight: 1.6, fontSize: 13 }}
          value={text}
          onChange={e => setText(e.target.value)}
          placeholder="Enter cover letter manually or click Generate below..."
        />
      </div>

      <div style={{ display: 'flex', gap: 10 }}>
        <Btn variant="primary" style={{ background: 'var(--pink)', color: '#000' }} onClick={run} disabled={loading}>
          {loading ? <Spinner size={14} color="#000"/> : (Sparkles && <Sparkles size={14}/>)}
          {text ? 'Regenerate with AI' : 'Generate with AI'}
        </Btn>
        <Btn variant="secondary" onClick={saveManual} disabled={loading || !text.trim()}>
          {Check && <Check size={14}/>} Save Changes
        </Btn>
      </div>

      <AIError err={err} onRetry={run}/>
    </div>
  );
}

// — AI Modal Container —
function AIModal() {
  const { state, dispatch } = useApp();
  const { modals, applications, user } = state;
  const { aiMode, aiJobId } = modals;
  const job = applications.find(j=>j.id===aiJobId);

  if (!aiMode || !job) return null;

  const close = () => dispatch({ type:A.SET_MODAL, payload:{ aiMode:null, aiJobId:null } });

  const MODES = {
    resume:      { title:'Resume Tailor',          comp:ResumeTailor,          size:'lg' },
    coverletter: { title:'Cover Letter Generator', comp:CoverLetterGenerator,  size:'lg' },
    ats:         { title:'ATS Scanner',            comp:ATSScanner,            size:'md' },
    interview:   { title:'Interview Coach',        comp:InterviewCoach,        size:'lg' },
    outreach:    { title:'Outreach Writer',        comp:OutreachWriter,        size:'md' },
    match:       { title:'Match Score',            comp:MatchScoreFeature,     size:'md' },
  };

  const mode = MODES[aiMode];
  if (!mode) return null;
  const Comp = mode.comp;

  return (
    <div className="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="ai-modal-title" onClick={e=>e.target===e.currentTarget&&close()}>
      <div className={`modal-box ${mode.size}`}>
        <div className="modal-header">
          <div>
            <div style={{ fontSize:11, color:'var(--accent)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:2 }}>
              {Sparkles&&<Sparkles size={11} style={{ display:'inline', marginRight:4 }}/>}AI Feature
            </div>
            <h2 id="ai-modal-title" style={{ fontSize:18, fontWeight:800 }}>{mode.title}</h2>
            <div style={{ fontSize:12, color:'var(--text-3)', marginTop:2 }}>{job.companyName} · {job.roleName}</div>
          </div>
          <button className="btn btn-ghost btn-icon" onClick={close} aria-label="Close">{X&&<X size={16}/>}</button>
        </div>
        <div className="modal-body"><Comp job={job} user={user}/></div>
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COMMAND PALETTE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function CommandPalette() {
  const { state, dispatch } = useApp();
  const { isCommandPaletteOpen, applications } = state;
  const [query, setQuery]   = useState('');
  const [cursor, setCursor] = useState(0);
  const inputRef            = useRef(null);

  useEffect(()=>{ if(isCommandPaletteOpen){ setTimeout(()=>inputRef.current?.focus(),50); setQuery(''); setCursor(0); } },[isCommandPaletteOpen]);

  if (!isCommandPaletteOpen) return null;

  const close = () => dispatch({ type:A.CLOSE_PALETTE });

  const quickActions = [
    { label:'Dashboard',          icon:Home,        action:()=>{ close(); dispatch({ type:A.SET_VIEW, payload:'dashboard' }); }},
    { label:'Add New Job',        icon:Plus,        action:()=>{ close(); dispatch({ type:A.SET_MODAL, payload:{ addJob:true } }); }},
    { label:'Find Jobs',          icon:Search,      action:()=>{ close(); dispatch({ type:A.SET_VIEW, payload:'jobsearch' }); }},
    { label:'Resume Builder',     icon:FileText,    action:()=>{ close(); dispatch({ type:A.SET_VIEW, payload:'resumebuilder' }); }},
    { label:'Mock Interview',     icon:Mic,         action:()=>{ close(); dispatch({ type:A.SET_VIEW, payload:'mockinterview' }); }},
    { label:'Kanban Board',       icon:LayoutGrid,  action:()=>{ close(); dispatch({ type:A.SET_VIEW, payload:'kanban' }); }},
    { label:'List View',          icon:List,        action:()=>{ close(); dispatch({ type:A.SET_VIEW, payload:'list' }); }},
    { label:'Analytics',          icon:BarChart2,   action:()=>{ close(); dispatch({ type:A.SET_VIEW, payload:'analytics' }); }},
    { label:'Settings',           icon:Settings,    action:()=>{ close(); dispatch({ type:A.SET_VIEW, payload:'settings' }); }},
  ];

  const jobResults = query.length>0 ? applications.filter(j=>
    j.companyName.toLowerCase().includes(query.toLowerCase()) ||
    j.roleName.toLowerCase().includes(query.toLowerCase()) ||
    (j.tags||[]).some(t=>t.toLowerCase().includes(query.toLowerCase()))
  ).slice(0,5) : [];

  const filteredActions = quickActions.filter(a=>!query||a.label.toLowerCase().includes(query.toLowerCase()));
  const allResults = [
    ...jobResults.map(j=>({ label:`${j.companyName} — ${j.roleName}`, icon:Briefcase, sub:STAGE_META[j.stage]?.label, action:()=>{ close(); dispatch({ type:A.SELECT_JOB, payload:j.id }); } })),
    ...filteredActions,
  ];

  const handleKey = (e) => {
    if (e.key==='Escape') { close(); }
    if (e.key==='ArrowDown') { e.preventDefault(); setCursor(c=>Math.min(c+1,allResults.length-1)); }
    if (e.key==='ArrowUp') { e.preventDefault(); setCursor(c=>Math.max(c-1,0)); }
    if (e.key==='Enter' && allResults[cursor]) { allResults[cursor].action(); }
  };

  return (
    <div className="cmd-overlay" onClick={e=>e.target===e.currentTarget&&close()} role="dialog" aria-modal="true" aria-label="Command palette">
      <div className="cmd-box">
        <div style={{ display:'flex', alignItems:'center', borderBottom:'1px solid var(--border)', padding:'0 16px' }}>
          {Search&&<Search size={16} style={{ color:'var(--text-3)', flexShrink:0 }}/>}
          <input ref={inputRef} className="cmd-input" placeholder="Search jobs or type a command…"
            value={query} onChange={e=>{ setQuery(e.target.value); setCursor(0); }}
            onKeyDown={handleKey} aria-label="Command search"/>
          <kbd style={{ background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:4, padding:'2px 6px', fontSize:11, color:'var(--text-3)', flexShrink:0 }}>ESC</kbd>
        </div>

        <div style={{ padding:'8px 8px', maxHeight:400, overflowY:'auto' }}>
          {allResults.length === 0 && (
            <div style={{ padding:'20px', textAlign:'center', color:'var(--text-3)', fontSize:13 }}>No results found</div>
          )}
          {allResults.map((r,i)=>{
            const Icon = r.icon;
            return (
              <div key={i} className={`cmd-result${cursor===i?' active':''}`}
                onClick={r.action} onMouseEnter={()=>setCursor(i)}>
                <div style={{ width:28, height:28, background:'var(--surface-2)', borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  {Icon&&<Icon size={14} style={{ color:'var(--text-2)' }}/>}
                </div>
                <span style={{ flex:1, fontSize:13 }}>{r.label}</span>
                {r.sub&&<span style={{ fontSize:11, color:'var(--text-3)' }}>{r.sub}</span>}
              </div>
            );
          })}
        </div>

        <div style={{ padding:'8px 16px', borderTop:'1px solid var(--border)', display:'flex', gap:12 }}>
          {[['↑↓','Navigate'],['↵','Select'],['Esc','Close']].map(([k,v])=>(
            <span key={k} style={{ fontSize:11, color:'var(--text-3)', display:'flex', gap:4, alignItems:'center' }}>
              <kbd style={{ background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:3, padding:'1px 5px' }}>{k}</kbd> {v}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

  return (

      <div className="search-input-wrap">
        <div className="search-icon">{Search&&<Search size={15}/>}</div>

          placeholder={window.innerWidth <= 768 ? "Search jobs…" : "Search jobs… (press / to focus)"}

      <div className="topbar-spacer" style={{ flex:1 }}/>
      <Btn variant="primary" onClick={()=>dispatch({ type:A.SET_MODAL, payload:{ addJob:true } })} id="add-job-btn" aria-label="Add new job">

function App() {
  const { state, dispatch, addToast } = useApp();
  const { activeView, modals, isCommandPaletteOpen, applications } = state;

  // Keyboard shortcuts
  useEffect(() => {
    const isInput = () => {
      const el = document.activeElement;
      return el && (el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'||el.isContentEditable);
    };

    const onKey = (e) => {
      // ⌘K
      if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); dispatch({ type:A.TOGGLE_PALETTE }); return; }
      // Escape
      if (e.key==='Escape') {
        if (isCommandPaletteOpen) { dispatch({ type:A.CLOSE_PALETTE }); return; }
        if (modals.aiMode)   { dispatch({ type:A.SET_MODAL, payload:{ aiMode:null } }); return; }
        if (modals.addJob)   { dispatch({ type:A.SET_MODAL, payload:{ addJob:false } }); return; }
        if (state.selectedJobId) { dispatch({ type:A.SELECT_JOB, payload:null }); return; }
      }
      if (isInput()) return;
      // N — new job
      if (e.key==='n'||e.key==='N') { e.preventDefault(); dispatch({ type:A.SET_MODAL, payload:{ addJob:true } }); return; }
      // / — focus search
      if (e.key==='/') { e.preventDefault(); document.getElementById('global-search')?.focus(); return; }
      // ⌘1/2/3
      if ((e.metaKey||e.ctrlKey)&&e.key==='1') { e.preventDefault(); dispatch({ type:A.SET_VIEW, payload:'kanban' }); }
      if ((e.metaKey||e.ctrlKey)&&e.key==='2') { e.preventDefault(); dispatch({ type:A.SET_VIEW, payload:'list' }); }
      if ((e.metaKey||e.ctrlKey)&&e.key==='3') { e.preventDefault(); dispatch({ type:A.SET_VIEW, payload:'analytics' }); }
    };

    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [state, dispatch, isCommandPaletteOpen, modals]);

  // Reminder check on mount
  useEffect(() => {
    if (!applications.length) return;
    const shown = ls_get('careerdeck_reminders_shown', []);
    applications.forEach(job => {
      if (job.stage==='applied' && job.appliedAt && !shown.includes(job.id)) {
        const d = daysSince(job.appliedAt);
        if (d >= (state.user.preferences?.reminderLeadDays || 5)) {
          addToast(
            `Follow up with ${job.companyName}? Applied ${d} days ago`,
            'warning',
            { label:'Write follow-up', onClick:()=>dispatch({ type:A.SET_MODAL, payload:{ aiMode:'outreach', aiJobId:job.id } }) },
            8000
          );
          ls_set('careerdeck_reminders_shown', [...shown, job.id]);
        }
      }
    });
  }, []);

  return (
    <div className="app-layout">
      <Sidebar/>
      <div className="main-area">
        <TopBar/>
        <div style={{ flex:1, overflowY: activeView==='kanban'?'hidden':'auto', display:'flex', flexDirection:'column' }}>
          {activeView==='dashboard'     && <DashboardView/>}
          {activeView==='kanban'        && <KanbanView/>}
          {activeView==='list'          && <ListView/>}
          {activeView==='jobsearch'     && <JobSearchView/>}
          {activeView==='resumebuilder' && <ResumeBuilderView/>}
          {activeView==='mockinterview' && <MockInterviewView/>}
          {activeView==='analytics'     && <AnalyticsView/>}
          {activeView==='settings'      && <SettingsView/>}
        </div>
      </div>

      {/* Panels & Modals */}
      <JobDetailPanel/>
      <AddJobModal/>
      <AIModal/>
      <CommandPalette/>
      <ToastStack/>
    </div>
  );
}
