<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerDeck — AI Job Application Tracker</title>
  <meta name="description" content="CareerDeck: The world's most intelligent job application tracker. AI-powered resume tailoring, ATS scanning, interview coaching, and outreach writing." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>

  <!-- Babel Standalone (JSX only — pinned to v7 to avoid Babel 8 ESM output regression) -->
  <script src="https://unpkg.com/@babel/standalone@7.26.5/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons: Inline SVG icon factory (no CDN needed) -->
</head>

<style>
  /* ━━ CSS CUSTOM PROPERTIES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  :root {
    --bg:           #0F1117;
    --surface:      #161B27;
    --surface-2:    #1E2535;
    --surface-3:    #252D3D;
    --border:       #2A3347;
    --border-2:     #364155;
    --accent:       #4F8EF7;
    --accent-glow:  rgba(79,142,247,0.15);
    --accent-hover: #6BA1FF;
    --success:      #34D399;
    --warning:      #FBBF24;
    --danger:       #F87171;
    --violet:       #A78BFA;
    --pink:         #F472B6;
    --text-1:       #F1F5F9;
    --text-2:       #94A3B8;
    --text-3:       #4A5568;
    --sidebar-w:    220px;
    --panel-w:      480px;
  }

  /* ━━ GLOBAL RESET ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-1);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; }
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-2); }
  input, textarea, select { font-family: inherit; }
  button { font-family: inherit; cursor: pointer; }
  a { color: var(--accent); text-decoration: none; }

  /* ━━ LAYOUT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .app-layout { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ━━ KANBAN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .kanban-scroll { display: flex; gap: 12px; padding: 20px; height: 100%; overflow-x: auto; overflow-y: hidden; align-items: flex-start; }
  .kanban-col { width: 260px; flex-shrink: 0; display: flex; flex-direction: column; max-height: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .kanban-col-header { padding: 14px 14px 10px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
  .kanban-col-body { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .kanban-col.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

  /* ━━ JOB CARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .job-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 12px 10px 16px; cursor: pointer; position: relative; transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s; will-change: transform; display: flex; flex-direction: column; gap: 8px; }
  .job-card:hover { border-color: var(--border-2); box-shadow: 0 4px 16px rgba(0,0,0,0.3); transform: translateY(-1px); }
  .job-card.dragging { opacity: 0.5; transform: rotate(2deg) scale(0.97); }
  .job-card .accent-bar { position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 0 2px 2px 0; background: linear-gradient(to bottom, var(--stage-color, var(--accent)), transparent); }
  .job-card.recently-changed .accent-bar { animation: accentPulse 2s ease-in-out infinite; }

  /* ━━ DETAIL PANEL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .detail-panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 40; animation: fadeIn 0.15s ease-out; }
  .detail-panel { position: fixed; right: 0; top: 0; width: var(--panel-w); height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 41; display: flex; flex-direction: column; animation: slideInRight 0.2s ease-out; overflow: hidden; }

  /* ━━ MODALS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.15s ease-out; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.15s ease-out; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
  .modal-box.sm { max-width: 480px; }
  .modal-box.md { max-width: 620px; }
  .modal-box.lg { max-width: 820px; }
  .modal-box.xl { max-width: 1000px; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* ━━ TOASTS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .toast-stack { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  .toast { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; max-width: 360px; animation: slideInRight 0.2s ease-out; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .toast-dismiss { opacity: 0; transition: opacity 0.2s; }
  .toast:hover .toast-dismiss { opacity: 1; }

  /* ━━ COMMAND PALETTE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .cmd-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 90; display: flex; align-items: flex-start; justify-content: center; padding-top: 15vh; animation: fadeIn 0.1s ease-out; }
  .cmd-box { background: var(--surface); border: 1px solid var(--border-2); border-radius: 16px; width: 100%; max-width: 560px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.7); animation: slideUp 0.15s ease-out; }
  .cmd-input { width: 100%; background: transparent; border: none; outline: none; padding: 18px 20px; font-size: 16px; color: var(--text-1); }
  .cmd-result { padding: 8px 12px; display: flex; align-items: center; gap: 12px; border-radius: 8px; cursor: pointer; color: var(--text-2); transition: background 0.1s, color 0.1s; }
  .cmd-result:hover, .cmd-result.active { background: var(--surface-2); color: var(--text-1); }

  /* ━━ FORM ELEMENTS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.06em; }
  .field-input { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text-1); font-size: 14px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; width: 100%; }
  .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .field-input::placeholder { color: var(--text-3); }
  textarea.field-input { resize: vertical; min-height: 100px; }
  select.field-input { appearance: none; cursor: pointer; }

  /* ━━ BUTTONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; padding: 8px 16px; transition: all 0.15s; cursor: pointer; white-space: nowrap; outline: none; }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(79,142,247,0.4); }
  .btn-secondary { background: var(--surface-2); color: var(--text-1); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--surface-3); border-color: var(--border-2); }
  .btn-ghost { background: transparent; color: var(--text-2); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface-2); color: var(--text-1); }
  .btn-danger { background: rgba(248,113,113,0.15); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
  .btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
  .btn-lg { padding: 11px 22px; font-size: 15px; border-radius: 10px; }
  .btn-icon { padding: 7px; border-radius: 7px; }

  /* ━━ TABS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .tabs { display: flex; gap: 2px; background: var(--bg); border-radius: 10px; padding: 3px; }
  .tab { padding: 6px 14px; border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; transition: all 0.15s; border: none; background: transparent; }
  .tab.active { background: var(--surface-2); color: var(--text-1); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  .tab:hover:not(.active) { color: var(--text-1); }

  /* ━━ MISC UI ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
  .tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: var(--surface-3); border: 1px solid var(--border); border-radius: 20px; font-size: 11px; color: var(--text-2); }
  .match-bar { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
  .match-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease-out; }
  .divider { height: 1px; background: var(--border); margin: 0 -24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .stage-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
  .section-title { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .ai-cursor::after { content: '▋'; animation: cursorBlink 1s step-end infinite; color: var(--accent); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; gap: 12px; color: var(--text-3); text-align: center; }
  .dropdown-menu { position: absolute; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 30; min-width: 160px; overflow: hidden; animation: fadeIn 0.1s ease-out; }
  .dropdown-item { padding: 9px 14px; display: flex; align-items: center; gap: 9px; cursor: pointer; color: var(--text-2); font-size: 13px; transition: background 0.1s, color 0.1s; }
  .dropdown-item:hover { background: var(--surface-3); color: var(--text-1); }
  .dropdown-item.danger:hover { background: rgba(248,113,113,0.1); color: var(--danger); }
  .score-ring { transform: rotate(-90deg); }
  .progress-bar-outer { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar-inner { height: 100%; border-radius: 3px; transition: width 0.6s ease-out; }
  .notification-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }

  /* ━━ ANIMATIONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes slideInBottom { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes accentPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes popIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .spinner { animation: spin 0.8s linear infinite; }
  .animate-pop { animation: popIn 0.2s ease-out; }

  /* ━━ MEDIA: REDUCED MOTION ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  /* ━━ MOBILE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .responsive-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .responsive-grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .flex-header-responsive { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

  @media (max-width: 768px) {
    .sidebar { width: 60px; overflow-y: auto; padding: 16px 8px 60px !important; }
    .sidebar .sidebar-label { display: none; }
    .sidebar .sidebar-logo-text { display: none; }
    .sidebar .sidebar-stats-title { display: none !important; }
    .sidebar-stats { padding: 12px 0 20px !important; }
    .sidebar-stat-row { flex-direction: column !important; gap: 4px !important; align-items: center !important; justify-content: center !important; }
    .sidebar-stat-label { display: none !important; }
    .sidebar-stat-icon { display: inline-block !important; }
    .sidebar .nav-item { padding: 9px 0; justify-content: center; }
    .sidebar .btn { padding: 8px 0; justify-content: center; }
    .detail-panel { width: 100vw; }
    .modal-overlay { padding: 10px; }
    .modal-box.lg, .modal-box.xl { max-width: 100%; }
    .modal-header { padding: 16px 20px; }
    .modal-body { padding: 16px; }
    .modal-footer { padding: 12px 20px; }
    .kanban-scroll { flex-direction: column; overflow-x: hidden; overflow-y: auto; align-items: stretch; padding-bottom: 100px !important; }
    .kanban-col { width: 100%; max-height: none !important; }
    .kanban-col-body { overflow-y: visible !important; }
    .chart-container { min-width: 280px; }
    .toast-stack { left: 20px; right: 20px; bottom: 20px; align-items: stretch; }
    .toast { max-width: 100%; }
    .responsive-grid-2 { grid-template-columns: 1fr !important; }
    .responsive-grid-6 { grid-template-columns: repeat(3, 1fr) !important; }
    .diff-row-container { flex-direction: column !important; }
    .diff-row-container > div:first-child { border-right: none !important; border-bottom: 1px solid var(--border); }
    .hidden-mobile { display: none !important; }
    .hide-mobile { display: none !important; }
    .topbar-spacer { display: none !important; }
    .sidebar-spacer { display: none !important; }
    .flex-header-responsive { flex-direction: column; align-items: stretch !important; gap: 12px; }
    .flex-header-responsive button { width: 100%; }
  }

  @media (max-width: 480px) {
    .responsive-grid-6 { grid-template-columns: repeat(2, 1fr) !important; }
  }

  /* ━━ INITIAL LOADER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  #initial-loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; }
  #initial-loader .loader-logo { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, var(--accent), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #initial-loader .loader-bar { width: 180px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  #initial-loader .loader-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--violet)); border-radius: 1px; animation: loaderFill 1.5s ease-in-out infinite; }
  @keyframes loaderFill { 0% { width: 0%; } 60% { width: 80%; } 100% { width: 100%; } }

  /* ━━ DIFF VIEW (Resume Tailor) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .diff-col { flex: 1; min-width: 0; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  .diff-col-header { padding: 10px 14px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

<body>
<div id="root">
  <div id="initial-loader">
    <div class="loader-logo">CareerDeck</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <div id="loader-status" style="font-size:12px;color:#4A5568;">Initializing AI Job Tracker…</div>
  </div>
</div>

<!-- Error overlay: shows any JS errors visually on the page -->
<script>
(function() {
  var t = 0;
  var timer = setInterval(function() {
    t++;
    var el = document.getElementById('loader-status');
    if (el) el.textContent = 'Initializing… (' + t + 's elapsed)';
    if (t >= 60) clearInterval(timer);
  }, 1000);

  window.addEventListener('error', function(e) {
    clearInterval(timer);
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,17,23,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:40px;';

function formatRelative(dateStr) {
  if (!dateStr) return '—';
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 60)   return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400)return `${Math.floor(diff/3600)}h ago`;
  const days = Math.floor(diff/86400);
  if (days < 30)   return `${days}d ago`;
  if (days < 365)  return `${Math.floor(days/30)}mo ago`;
  return `${Math.floor(days/365)}y ago`;
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function closeTruncatedJSON(str) {
  let stack = [];
  let inString = false;
  let escaped = false;
  for (let i = 0; i < str.length; i++) {
    const char = str[i];
    if (inString) {
      if (escaped) {
        escaped = false;
      } else if (char === '\\') {
        escaped = true;
      } else if (char === '"') {
        inString = false;
      }
    } else {
      if (char === '"') {
        inString = true;
      } else if (char === '{' || char === '[') {
        stack.push(char);
      } else if (char === '}') {
        if (stack[stack.length - 1] === '{') stack.pop();
      } else if (char === ']') {
        if (stack[stack.length - 1] === '[') stack.pop();
      }
    }
  }
  let closing = '';
  if (inString) {
    closing += '"';
  }
  for (let i = stack.length - 1; i >= 0; i--) {
    if (stack[i] === '{') closing += '}';
    else if (stack[i] === '[') closing += ']';
  }
  return str + closing;
}

function parseAIJSON(text) {
  // Step 0: Strip Google Search grounding footnotes (e.g. [1], [2], [1, 2]) attached to words/URLs
  const noCitations = text.replace(/(\w|["'\/.-])\[\d+(?:\s*,\s*\d+)*\]/g, '$1');

  // Step 1: strip markdown code fences
  let cleaned = noCitations.replace(/```(?:json)?\s*/gi, '').replace(/```\s*$/g, '').trim();

  // Step 2: find outermost JSON boundaries (either object {} or array [])
  const firstObject = cleaned.indexOf('{');
  const firstArray  = cleaned.indexOf('[');
  let start = -1;
  let end = -1;
  let isArray = false;

  if (firstObject !== -1 && (firstArray === -1 || firstObject < firstArray)) {
    start = firstObject;
    end = cleaned.lastIndexOf('}');
  } else if (firstArray !== -1) {
    start = firstArray;
    end = cleaned.lastIndexOf(']');
    isArray = true;
  }

  if (start === -1 || end === -1) throw new Error('No JSON found in AI response');
  let candidate = cleaned.slice(start, end + 1);

  // Step 3: try strict parse first
  try { return JSON.parse(candidate); } catch (_) { /* fall through to recovery */ }

  // Step 4: Lenient recovery — fix common AI JSON mistakes
  let fixed = candidate
    // Remove trailing commas before ] or }
    .replace(/,\s*([\]\}])/g, '$1')
    // Replace smart quotes with straight quotes
    .replace(/[\u201C\u201D]/g, '"')
    .replace(/[\u2018\u2019]/g, "'")
    // Remove NUL characters
    .replace(/\x00/g, '');

  // Step 5: If still broken, attempt to truncate to last valid closing brace
  try { return JSON.parse(fixed); } catch (_) {
    let lastClose = isArray ? fixed.lastIndexOf(']') : fixed.lastIndexOf('}');
    while (lastClose > 0) {
      try {
        const attempt = closeTruncatedJSON(fixed.slice(0, lastClose + 1));
        const parsed = JSON.parse(attempt);
        return parsed;
      } catch (_) {
        lastClose = isArray ? fixed.lastIndexOf(']', lastClose - 1) : fixed.lastIndexOf('}', lastClose - 1);
      }
    }
    throw new Error('AI response could not be parsed as JSON. Please try again.');
  }
}

}

}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) {
      resolve();
      return;
    }
    const script = document.createElement('script');
    script.src = src;
    script.onload = () => resolve();
    script.onerror = (err) => reject(err);
    document.body.appendChild(script);
  });
}

async function parsePDFToText(file) {
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
  const pdfjsLib = window.pdfjsLib;
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = '';
  
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const textContent = await page.getTextContent();
    const pageText = textContent.items.map(item => item.str).join(' ');
    fullText += pageText + '\n';
  }
  
  return fullText;
}

async function parseDocxToText(file) {
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
  const mammoth = window.mammoth;
  const arrayBuffer = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer });
  return result.value;
}

function getTailoredResumeText(base, bullets, accepted) {
  let text = base;
  bullets.forEach((b, i) => {
    const isAccepted = accepted[i] !== false;
    const orig = b.original.trim();
    const rew = isAccepted ? b.rewritten.trim() : b.original.trim();
    if (!orig) return;

    if (text.includes(b.original)) {
      text = text.replace(b.original, rew);
    } else if (text.includes(orig)) {
      text = text.replace(orig, rew);
    } else {
      // White space normalized search
      const normalize = s => s.replace(/\s+/g, ' ').trim();
      const normOrig = normalize(orig);
      const lines = text.split('\n');
      for (let j = 0; j < lines.length; j++) {
        if (normalize(lines[j]).includes(normOrig)) {
          lines[j] = lines[j].replace(orig, rew);
          break;
        }
      }
      text = lines.join('\n');
    }
  });
  return text;
}

function compileStructuredResumeToText(data, accepted) {
  if (!data) return '';
  let parts = [];
  
  if (data.personalInfo?.name) parts.push(data.personalInfo.name);
  
  const contactParts = [];
  if (data.personalInfo?.email) contactParts.push(data.personalInfo.email);
  if (data.personalInfo?.phone) contactParts.push(data.personalInfo.phone);
  if (data.personalInfo?.location) contactParts.push(data.personalInfo.location);
  if (data.personalInfo?.linkedin) contactParts.push(data.personalInfo.linkedin);
  if (data.personalInfo?.website) contactParts.push(data.personalInfo.website);
  if (contactParts.length > 0) parts.push(contactParts.join('  |  '));
  
  parts.push('');
  
  if (data.summary) {
    parts.push('SUMMARY');
    parts.push(data.summary);
    parts.push('');
  }
  
  if (data.experience && data.experience.length > 0) {
    parts.push('EXPERIENCE');
    data.experience.forEach((exp, expIdx) => {
      const jobLine = `${exp.role || ''} | ${exp.company || ''}${exp.location ? `, ${exp.location}` : ''}`;
      parts.push(jobLine);
      if (exp.dates) parts.push(exp.dates);
      
      if (exp.bullets && exp.bullets.length > 0) {
        exp.bullets.forEach((bulletObj, bIdx) => {
          const isAccepted = accepted[`${expIdx}_${bIdx}`] !== false;
          const text = bulletObj && typeof bulletObj === 'object' ? (isAccepted ? bulletObj.rewritten : bulletObj.original) : (bulletObj || '');
          if (text) parts.push(`• ${text}`);
        });
      }
      parts.push('');
    });
  }
  
  if (data.education && data.education.length > 0) {
    parts.push('EDUCATION');
    data.education.forEach((edu) => {
      const eduLine = `${edu.degree || ''} | ${edu.school || ''}${edu.location ? `, ${edu.location}` : ''}`;
      parts.push(eduLine);
      if (edu.dates) parts.push(edu.dates);
      parts.push('');
    });
  }
  
  if (data.skills && data.skills.length > 0) {
    parts.push('SKILLS');
    data.skills.forEach((skillGroup) => {
      if (skillGroup.items && skillGroup.items.length > 0) {
        parts.push(`${skillGroup.category || 'Skills'}: ${skillGroup.items.join(', ')}`);
      }
    });
    parts.push('');
  }
  
  if (data.projects && data.projects.length > 0) {
    parts.push('PROJECTS');
    data.projects.forEach((proj) => {
      parts.push(`${proj.name || 'Project'}${proj.url ? ` (${proj.url})` : ''}`);
      if (proj.description) parts.push(proj.description);
      parts.push('');
    });
  }
  
  return parts.join('\n');
}

async function exportResumeAsPDF(data, accepted, companyName = 'Tailored') {
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  // ── Design Tokens ──────────────────────────────────────────────────────────
  const MARGIN        = 18;
  const PAGE_W        = doc.internal.pageSize.getWidth();   // 210mm
  const PAGE_H        = doc.internal.pageSize.getHeight();  // 297mm
  const CONTENT_W     = PAGE_W - MARGIN * 2;                // ~174mm
  const BODY_LH       = 4.8;  // body line-height
  const ACCENT_NAVY   = [27, 54, 93];   // #1B365D
  const DARK          = [15, 23, 42];   // near-black
  const MUTED         = [100, 116, 139];// slate-500
  const BODY_GREY     = [55, 65, 81];   // slate-700
  let y = MARGIN;

  const newPage = () => { doc.addPage(); y = MARGIN; };
  const guard   = (h) => { if (y + h > PAGE_H - MARGIN) newPage(); };

  // ── Section Heading (Navy accent + thin rule) ───────────────────────────
  const sectionHead = (title) => {
    guard(14);
    y += 5;
    // Navy accent bar (left)
    doc.setFillColor(...ACCENT_NAVY);
    doc.rect(MARGIN, y - 3.5, 3, 5, 'F');
    // Section title text
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10.5);
    doc.setTextColor(...ACCENT_NAVY);
    doc.text(title.toUpperCase(), MARGIN + 5, y);
    y += 1.5;
    // Thin full-width divider
    doc.setDrawColor(203, 213, 225);
    doc.setLineWidth(0.35);
    doc.line(MARGIN, y, PAGE_W - MARGIN, y);
    y += 4.5;
  };

  // ── 1. Name (large, centered, navy) ────────────────────────────────────
  if (data.personalInfo?.name) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.setTextColor(...ACCENT_NAVY);
    doc.text(data.personalInfo.name, PAGE_W / 2, y, { align: 'center' });
    y += 8;
  }

  // ── 2. Job Title / Target role ─────────────────────────────────────────
  if (data.targetRole || data.personalInfo?.targetRole) {
    const role = data.targetRole || data.personalInfo.targetRole;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(...MUTED);
    doc.text(role, PAGE_W / 2, y, { align: 'center' });
    y += 5.5;
  }

  // ── 3. Contact bar ─────────────────────────────────────────────────────
  const pi = data.personalInfo || {};
  const contactItems = [
    pi.email, pi.phone, pi.location, pi.linkedin, pi.website
  ].filter(Boolean);
  if (contactItems.length > 0) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...MUTED);
    const contactLine = contactItems.join('   ·   ');
    const split = doc.splitTextToSize(contactLine, CONTENT_W);
    split.forEach(line => {
      guard(BODY_LH);
      doc.text(line, PAGE_W / 2, y, { align: 'center' });
      y += BODY_LH;
    });
    y += 2;
  }

  // Thin separator under header block
  doc.setDrawColor(...ACCENT_NAVY);
  doc.setLineWidth(0.5);
  doc.line(MARGIN, y, PAGE_W - MARGIN, y);
  y += 5;

  // ── 4. Professional Summary ────────────────────────────────────────────
  if (data.summary) {
    sectionHead('Professional Summary');
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(9.5);
    doc.setTextColor(...BODY_GREY);
    const lines = doc.splitTextToSize(data.summary, CONTENT_W);
    lines.forEach(line => { guard(BODY_LH); doc.text(line, MARGIN, y); y += BODY_LH; });
    y += 2;
  }

  // ── 5. Experience ──────────────────────────────────────────────────────
  if (data.experience && data.experience.length > 0) {
    sectionHead('Professional Experience');
    data.experience.forEach((exp, expIdx) => {
      guard(10);
      y += 1;

      // Role (bold, dark) + dates (italic, right-aligned) on same line
      const role      = exp.role || '';
      const company   = exp.company || '';
      const roleStr   = company ? `${role}  ·  ${company}` : role;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.5);
      doc.setTextColor(...DARK);
      doc.text(roleStr, MARGIN, y);
      if (exp.dates) {
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8.5);
        doc.setTextColor(...MUTED);
        doc.text(exp.dates, PAGE_W - MARGIN, y, { align: 'right' });
      }
      y += 4.5;

      // Location (italic, muted)
      if (exp.location) {
        guard(4);
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(8.5);
        doc.setTextColor(...MUTED);
        doc.text(exp.location, MARGIN, y);
        y += 4;
      }

      // Bullets
      const INDENT = 5;
      if (exp.bullets && exp.bullets.length > 0) {
        exp.bullets.forEach((bulletObj, bIdx) => {
          const isAccepted = accepted[`${expIdx}_${bIdx}`] !== false;
          const text = bulletObj && typeof bulletObj === 'object'
            ? (isAccepted ? bulletObj.rewritten : bulletObj.original)
            : (bulletObj || '');
          if (!text) return;
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(9);
          doc.setTextColor(...BODY_GREY);
          const lines = doc.splitTextToSize(text, CONTENT_W - INDENT);
          lines.forEach((line, li) => {
            guard(BODY_LH);
            if (li === 0) doc.text('▸', MARGIN + 0.5, y);
            doc.text(line, MARGIN + INDENT, y);
            y += BODY_LH;
          });
        });
      }
      y += 2;
    });
  }

  // ── 6. Education ──────────────────────────────────────────────────────
  if (data.education && data.education.length > 0) {
    sectionHead('Education');
    data.education.forEach((edu) => {
      guard(8);
      y += 1;
      const degStr = edu.degree ? (edu.school ? `${edu.degree}  —  ${edu.school}` : edu.degree) : (edu.school || '');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.5);
      doc.setTextColor(...DARK);
      doc.text(degStr, MARGIN, y);
      if (edu.dates) {
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8.5);
        doc.setTextColor(...MUTED);
        doc.text(edu.dates, PAGE_W - MARGIN, y, { align: 'right' });
      }
      y += 4.5;
      if (edu.location) {
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(8.5);
        doc.setTextColor(...MUTED);
        doc.text(edu.location, MARGIN, y);
        y += 4;
      }
      y += 1;
    });
  }

  // ── 7. Skills ─────────────────────────────────────────────────────────
  if (data.skills && data.skills.length > 0) {
    sectionHead('Skills');
    data.skills.forEach((sg) => {
      if (!sg.items || sg.items.length === 0) return;
      guard(6);
      y += 1;
      const catLabel = sg.category ? `${sg.category}: ` : '';
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...DARK);
      doc.text(catLabel, MARGIN, y);
      const labelW = doc.getTextWidth(catLabel);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...BODY_GREY);
      const items = doc.splitTextToSize(sg.items.join(', '), CONTENT_W - labelW);
      items.forEach((line, li) => {
        guard(BODY_LH);
        doc.text(line, MARGIN + (li === 0 ? labelW : 0), y);
        y += BODY_LH;
      });
      y += 1;
    });
  }

  // ── 8. Projects ───────────────────────────────────────────────────────
  if (data.projects && data.projects.length > 0) {
    sectionHead('Projects');
    data.projects.forEach((proj) => {
      guard(8);
      y += 1;
      const nameStr = proj.url ? `${proj.name || ''} (${proj.url})` : (proj.name || '');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.5);
      doc.setTextColor(...DARK);
      doc.text(nameStr, MARGIN, y);
      y += 4.5;
      if (proj.description) {
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(...BODY_GREY);
        const lines = doc.splitTextToSize(proj.description, CONTENT_W);
        lines.forEach(line => { guard(BODY_LH); doc.text(line, MARGIN, y); y += BODY_LH; });
      }
      y += 2;
    });
  }

  // ── 9. Footer watermark ──────────────────────────────────────────────
  const totalPages = doc.internal.getNumberOfPages();
  for (let p = 1; p <= totalPages; p++) {
    doc.setPage(p);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(203, 213, 225);
    doc.text(`Page ${p} / ${totalPages}`, PAGE_W - MARGIN, PAGE_H - 8, { align: 'right' });
  }

  const cleanCompanyName = (companyName || 'Tailored').replace(/[^a-zA-Z0-9_-]/g, '_');
  doc.save(`Resume_${cleanCompanyName}_Premium.pdf`);
}

    sectionHead('Projects');

      const nameStr = proj.url ? `${proj.name || ''} (${proj.url})` : (proj.name || '');

  const blob = await docx.Packer.toBlob(docxFile);
  const url = URL.createObjectURL(blob);
  const a = window.document.createElement('a');

  const cleanCompanyName = (companyName || 'Tailored').replace(/[^a-zA-Z0-9_-]/g, '_');
  a.download = `Resume_${cleanCompanyName}_Premium.docx`;
  window.document.body.appendChild(a);

  window.document.body.removeChild(a);
  URL.revokeObjectURL(url);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LLM API — MULTI-PROVIDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
class LLMError extends Error {
  constructor(type, msg) { super(msg); this.llmType = type; }
}

const LLM_ERROR_MESSAGES = {
  no_key:     'Please add your API key in Settings → API Configuration to use AI features.',
  rate_limit: 'Rate limit reached. Please wait a moment and try again.',
  network:    'Network error. Please check your connection and try again.',
  api_error:  'API returned an error. Check your key and provider settings.',
  parse_error:'AI response could not be parsed. Please try again.',
};

async function callLLM(systemPrompt, userMessage, onStream, config) {
  const { provider, model, apiKey } = config;
  if (!apiKey) throw new LLMError('no_key', LLM_ERROR_MESSAGES.no_key);

  let response;
  try {
    if (provider === 'gemini') {
      const bodyData = {
        contents: [{ role: 'user', parts: [{ text: userMessage }] }],
        systemInstruction: { parts: [{ text: systemPrompt }] },
        generationConfig: { maxOutputTokens: 3000, temperature: 0.7 }
      };
      if (config.webSearch) {
        bodyData.tools = [{ googleSearch: {} }];
      }
      try {
        response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bodyData)
          }
        );
        if (!response.ok && config.webSearch) {
          // Retry without tools if it failed
          delete bodyData.tools;
          response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(bodyData)
            }
          );
        }
      } catch (err) {
        if (config.webSearch) {
          delete bodyData.tools;
          response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(bodyData)
            }
          );
        } else {
          throw err;
        }
      }
    } else if (provider === 'openai') {
      response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model, stream: true, max_tokens: 3000,
          messages: [{ role:'system', content: systemPrompt },{ role:'user', content: userMessage }]
        })
      });
    } else if (provider === 'anthropic') {
      response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-allow-browser': 'true'
        },
        body: JSON.stringify({
          model, max_tokens: 3000, stream: true,
          system: systemPrompt,
          messages: [{ role:'user', content: userMessage }]
        })
      });
    } else if (provider === 'openrouter') {
      response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
          'HTTP-Referer': 'https://careerdeck.app',
          'X-Title': 'CareerDeck'
        },
        body: JSON.stringify({
          model, stream: true, max_tokens: 3000,
          messages: [{ role:'system', content: systemPrompt },{ role:'user', content: userMessage }]
        })
      });
    } else if (provider === 'groq') {
      response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model, stream: true, max_tokens: 3000,
          messages: [{ role:'system', content: systemPrompt },{ role:'user', content: userMessage }]
        })
      });
    } else if (provider === 'deepseek') {
      response = await fetch('https://api.deepseek.com/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model, stream: true, max_tokens: 3000,
          messages: [{ role:'system', content: systemPrompt },{ role:'user', content: userMessage }]
        })
      });
    } else {
      throw new LLMError('api_error', 'Unknown provider: ' + provider);
    }
  } catch (e) {
    if (e instanceof LLMError) throw e;
    throw new LLMError('network', LLM_ERROR_MESSAGES.network);
  }

  if (!response.ok) {
    const status = response.status;
    if (status === 429) throw new LLMError('rate_limit', LLM_ERROR_MESSAGES.rate_limit);
    if (status === 401 || status === 403) throw new LLMError('api_error', 'Invalid API key. Please check your settings.');
    throw new LLMError('api_error', `${LLM_ERROR_MESSAGES.api_error} (${status})`);
  }

  const reader  = response.body.getReader();
  const decoder = new TextDecoder();
  let fullText  = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value, { stream: true });
    const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
    for (const line of lines) {
      const raw = line.slice(6).trim();
      if (raw === '[DONE]' || !raw) continue;
      try {
        const data = JSON.parse(raw);
        let text = '';
        if (provider === 'gemini') {
          text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
        } else if (provider === 'openai' || provider === 'openrouter' || provider === 'groq' || provider === 'deepseek') {
          text = data?.choices?.[0]?.delta?.content || '';
        } else if (provider === 'anthropic') {
          if (data?.type === 'content_block_delta') text = data?.delta?.text || '';
        }
        if (text) { fullText += text; if (onStream) onStream(fullText); }
      } catch {}
    }
  }
  return fullText;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// APP CONTEXT & REDUCER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

const A = {
  HYDRATE:'HYDRATE', ADD_JOB:'ADD_JOB', UPDATE_JOB:'UPDATE_JOB', DELETE_JOB:'DELETE_JOB',
  SET_VIEW:'SET_VIEW', SELECT_JOB:'SELECT_JOB', SET_MODAL:'SET_MODAL',
  UPDATE_USER:'UPDATE_USER', ADD_TOAST:'ADD_TOAST', REMOVE_TOAST:'REMOVE_TOAST',
  SET_FILTERS:'SET_FILTERS', TOGGLE_PALETTE:'TOGGLE_PALETTE', CLOSE_PALETTE:'CLOSE_PALETTE',
};

const DEF_USER = {
  name:'', email:'', llmProvider:'gemini', llmModel:'gemini-2.0-flash', apiKey:'', baseResume:'',
  availableModels: {
    gemini: ['gemini-2.0-flash','gemini-1.5-pro','gemini-1.5-flash'],
    openai: ['gpt-4o','gpt-4o-mini','gpt-4-turbo'],
    anthropic: ['claude-sonnet-4-6','claude-3-5-haiku-20241022'],
    openrouter: ['google/gemini-2.5-flash:free','meta-llama/llama-3-8b-instruct:free','mistralai/mistral-7b-instruct:free','microsoft/phi-3-medium-128k-instruct:free','qwen/qwen-2.5-72b-instruct'],
    groq: ['llama-3.3-70b-versatile','llama3-8b-8192','mixtral-8x7b-32768','gemma2-9b-it'],
    deepseek: ['deepseek-chat','deepseek-reasoner']
  },
  preferences:{ defaultStage:'saved', reminderLeadDays:5, weeklyDigestEnabled:true }
};

const initState = {
  applications:[], activeView:'dashboard', selectedJobId:null,
  modals:{ addJob:false, aiMode:null, aiJobId:null },
  user:DEF_USER, toasts:[], filters:{ stage:'all', search:'', tags:[] },
  isCommandPaletteOpen:false
};

function reducer(state, action) {
  switch (action.type) {
    case A.HYDRATE:      return { ...state, ...action.payload };
    case A.ADD_JOB:      return { ...state, applications:[action.payload,...state.applications] };
    case A.UPDATE_JOB:   return { ...state, applications:state.applications.map(j=>j.id===action.payload.id?{...j,...action.payload}:j) };
    case A.DELETE_JOB:   return { ...state, applications:state.applications.filter(j=>j.id!==action.payload), selectedJobId:state.selectedJobId===action.payload?null:state.selectedJobId };
    case A.SET_VIEW:     return { ...state, activeView:action.payload };
    case A.SELECT_JOB:   return { ...state, selectedJobId:action.payload };
    case A.SET_MODAL:    return { ...state, modals:{...state.modals,...action.payload} };
    case A.UPDATE_USER:  return { ...state, user:{...state.user,...action.payload} };
    case A.ADD_TOAST:    return { ...state, toasts:[...state.toasts.slice(-2),action.payload] };
    case A.REMOVE_TOAST: return { ...state, toasts:state.toasts.filter(t=>t.id!==action.payload) };
    case A.SET_FILTERS:  return { ...state, filters:{...state.filters,...action.payload} };
    case A.TOGGLE_PALETTE: return { ...state, isCommandPaletteOpen:!state.isCommandPaletteOpen };
    case A.CLOSE_PALETTE:  return { ...state, isCommandPaletteOpen:false };
    default: return state;
  }
}

function AppProvider({ children }) {
  const [state, dispatch] = useReducer(reducer, initState);
  const saveTimer = useRef(null);

  // Hydrate from localStorage on mount
  useEffect(() => {
    const apps  = ls_get(LS.APPS, null);
    const user  = ls_get(LS.USER, null);
    const initialized = localStorage.getItem(LS.INIT);

    dispatch({ type:A.HYDRATE, payload:{
      applications: initialized ? (apps||[]) : makeSampleJobs(),
      user: user ? {...DEF_USER,...user} : DEF_USER,
    }});

    if (!initialized) {
      ls_set(LS.INIT, true);
    }

    // Hide initial loader
    setTimeout(() => {
      const loader = document.getElementById('initial-loader');
      if (loader) { loader.style.opacity='0'; loader.style.transition='opacity 0.3s'; setTimeout(()=>loader.remove(),300); }
    }, 300);
  }, []);

  // Persist to localStorage (debounced)
  useEffect(() => {
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      ls_set(LS.APPS, state.applications);
      ls_set(LS.USER, state.user);
    }, 300);
  }, [state.applications, state.user]);

  const addToast = useCallback((message, type='info', action=null, duration=3500) => {
    const id = uid();
    dispatch({ type:A.ADD_TOAST, payload:{ id, message, type, action } });
    setTimeout(() => dispatch({ type:A.REMOVE_TOAST, payload:id }), duration);
  }, []);

  const value = useMemo(() => ({ state, dispatch, addToast }), [state, addToast]);
  return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
}

  const msg = LLM_ERROR_MESSAGES[err.llmType] || err.message;

    <div style={{ background:'rgba(248,113,113,0.1)', border:'1px solid rgba(248,113,113,0.3)', borderRadius:10, padding:'14px 16px', display:'flex', flexDirection:'column', gap:10 }}>

      </div>

      <div style={{ padding:'12px 10px', flex:1, display:'flex', flexDirection:'column', gap:2 }}>
        {nav.map(({ id, label, icon:Icon, group }, i) => {
          const prev = nav[i-1];
          const showSep = prev && prev.group !== group;
          return (
            <React.Fragment key={id}>
              {showSep && <div style={{ height:1, background:'var(--border)', margin:'6px 4px' }}/>}
              {showSep && group === 'tools' && <div className="hidden-mobile" style={{ fontSize:9, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.1em', textTransform:'uppercase', padding:'4px 8px 2px' }}>AI Tools</div>}
              {showSep && group === 'analytics' && <div className="hidden-mobile" style={{ fontSize:9, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.1em', textTransform:'uppercase', padding:'4px 8px 2px' }}>More</div>}
              <button key={id} className={`nav-item${activeView===id?' active':''}`}
                onClick={() => dispatch({ type:A.SET_VIEW, payload:id })}
                aria-label={label} aria-current={activeView===id?'page':undefined}>
                {Icon && <Icon size={17} />}
                <span className="sidebar-label">{label}</span>
              </button>
            </React.Fragment>
          );
        })}

        <div className="sidebar-spacer" style={{ flex:1 }}/>

        {/* Add job button */}
        <button className="btn btn-primary" style={{ width:'100%', marginTop:8 }}
          onClick={() => dispatch({ type:A.SET_MODAL, payload:{ addJob:true } })}
          aria-label="Add new job">
          {Plus && <Plus size={15} />}
          <span className="sidebar-label">Add Job</span>
        </button>

        {/* Upload Resume button */}
        <button className="btn btn-secondary" style={{ width:'100%', marginTop:6, display:'flex', gap:6, justifyContent:'center', alignItems:'center' }}
          onClick={() => {
            dispatch({ type:A.SET_VIEW, payload:'settings' });
            setTimeout(() => {
              const el = document.getElementById('settings-resume-section');
              if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.outline = '2px solid var(--accent)';
                el.style.boxShadow = '0 0 16px var(--accent-glow)';
                setTimeout(() => {
                  el.style.outline = 'none';
                  el.style.boxShadow = 'none';
                }, 1500);
              }
            }, 100);
          }}
          aria-label="Upload Resume">
          {Upload && <Upload size={14} />}
          <span className="sidebar-label">Upload Resume</span>
        </button>

        {/* Keyboard shortcut hint */}
        <button className="nav-item" style={{ marginTop:4, fontSize:11, color:'var(--text-3)' }}
          onClick={() => dispatch({ type:A.TOGGLE_PALETTE })}
          aria-label="Open command palette">
          {Command && <Command size={14} />}
          <span className="sidebar-label">⌘K Command palette</span>
        </button>
      </div>

      {/* Stats */}
      <div className="sidebar-stats" style={{ padding:'12px 14px', borderTop:'1px solid var(--border)', display:'flex', flexDirection:'column', gap:8 }}>
        <div className="section-title sidebar-stats-title">Overview</div>
        {[
          { label:'Total Jobs', val:stats.total, icon:'💼' },
          { label:'Interviews', val:stats.interviews, icon:'📅' },
          { label:'Offers',     val:stats.offers, color:'var(--success)', icon:'🎉' },
        ].map(({ label, val, color, icon }) => (
          <div key={label} className="sidebar-stat-row" style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span className="sidebar-stat-label" style={{ fontSize:12, color:'var(--text-2)' }}>{label}</span>
            <span className="sidebar-stat-icon" style={{ display:'none', fontSize:14 }}>{icon}</span>
            <span className="mono sidebar-stat-val" style={{ fontSize:13, fontWeight:600, color:color||'var(--text-1)' }}>{val}</span>
          </div>
        ))}
      </div>
    </nav>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// JOB CARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function JobCard({ job }) {
  const { dispatch, addToast } = useApp();
  const [menuOpen, setMenuOpen] = useState(false);
  const [dragging, setDragging]  = useState(false);
  const menuRef = useRef(null);
  const meta    = STAGE_META[job.stage] || STAGE_META.saved;
  const recentlyChanged = job.updatedAt && (Date.now() - new Date(job.updatedAt).getTime() < 24*3600*1000);

  useEffect(() => {
    const close = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);

  const handleDragStart = (e) => {
    e.dataTransfer.setData('jobId', job.id);
    e.dataTransfer.setData('fromStage', job.stage);
    setDragging(true);
  };

  const quickAction = (action) => {
    setMenuOpen(false);
    if (action === 'delete') {
      dispatch({ type:A.DELETE_JOB, payload:job.id });
      addToast(`Deleted ${job.companyName}`, 'error');
    } else if (action === 'duplicate') {
      dispatch({ type:A.ADD_JOB, payload:{ ...job, id:uid(), createdAt:now(), updatedAt:now(), stage:job.stage } });
      addToast(`Duplicated ${job.roleName}`, 'success');
    } else if (action === 'applied') {
      dispatch({ type:A.UPDATE_JOB, payload:{ id:job.id, stage:'applied', appliedAt:now(), updatedAt:now() } });
      addToast(`Marked as Applied`, 'success');
    }
  };

  return (
    <div
      className={`job-card${dragging?' dragging':''}${recentlyChanged?' recently-changed':''}`}
      style={{ '--stage-color': meta.color, zIndex: menuOpen ? 20 : undefined }}
      draggable={true}
      onDragStart={handleDragStart}
      onDragEnd={() => setDragging(false)}
      onClick={() => dispatch({ type:A.SELECT_JOB, payload:job.id })}
      tabIndex={0}
      onKeyDown={e => { if (e.key==='Enter'||e.key===' ') dispatch({ type:A.SELECT_JOB, payload:job.id }); }}
      role="button" aria-label={`${job.companyName} — ${job.roleName}`}>
      <div className="accent-bar" />

      {/* Header row */}
      <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
        <CompanyLogo name={job.companyName} size={26} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:13, fontWeight:700, color:'var(--text-1)', lineHeight:1.3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{job.companyName}</div>
          <div style={{ fontSize:12, color:'var(--text-2)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{job.roleName}</div>
        </div>
        <div style={{ position:'relative', flexShrink:0 }} ref={menuRef}>
          <button className="btn btn-ghost btn-icon btn-sm" aria-label="Card options"
            onClick={e => { e.stopPropagation(); setMenuOpen(v=>!v); }}>
            {MoreVertical && <MoreVertical size={14} />}
          </button>
          {menuOpen && (
            <div className="dropdown-menu" style={{ right:0, top:'100%', marginTop:4 }} onClick={e=>e.stopPropagation()}>
              {job.stage!=='applied' && <div className="dropdown-item" onClick={()=>quickAction('applied')}>{Check&&<Check size={13}/>} Mark Applied</div>}
              <div className="dropdown-item" onClick={()=>quickAction('duplicate')}>{FileText&&<FileText size={13}/>} Duplicate</div>
              <div className="dropdown-item danger" onClick={()=>quickAction('delete')}>{Trash2&&<Trash2 size={13}/>} Delete</div>
            </div>
          )}
        </div>
      </div>

      {/* Location + Salary */}
      {(job.location || job.salaryMin) && (
        <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
          {job.location && (
            <div style={{ display:'flex', alignItems:'center', gap:3, color:'var(--text-3)', fontSize:11 }}>
              {MapPin && <MapPin size={11}/>} {job.location}
            </div>
          )}
          {job.salaryMin && (
            <div style={{ display:'flex', alignItems:'center', gap:3, color:'var(--text-3)', fontSize:11 }}>
              {DollarSign && <DollarSign size={11}/>}
              <span className="mono">{(job.salaryMin/1000).toFixed(0)}K–{(job.salaryMax/1000).toFixed(0)}K</span>
            </div>
          )}
        </div>
      )}

      {/* Tags */}
      {job.tags?.length > 0 && (
        <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
          {job.tags.slice(0,3).map(t=>(
            <span key={t} className="tag-chip">{t}</span>
          ))}
          {job.tags.length > 3 && <span className="tag-chip">+{job.tags.length-3}</span>}
        </div>
      )}

      {/* Footer: match score + time */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:4, borderTop:'1px solid var(--border)', marginTop:2 }}>
        <MatchChip score={job.matchScore} />
        <span style={{ fontSize:10, color:'var(--text-3)' }}>
          {job.appliedAt ? formatRelative(job.appliedAt) : formatRelative(job.createdAt)}
        </span>
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DASHBOARD VIEW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function DashboardView() {
  const { state, dispatch } = useApp();
  const { applications, user } = state;

  const stats = useMemo(() => {
    const active = applications.filter(j => j.stage !== 'closed');
    const withScores = applications.filter(j => j.matchScore != null);
    const avgMatch = withScores.length > 0 ? Math.round(withScores.reduce((a,j) => a + j.matchScore, 0) / withScores.length) : 0;
    const interviews = applications.filter(j => j.stage === 'interview').length;
    const offers = applications.filter(j => j.stage === 'offer').length;
    return { total:applications.length, active:active.length, avgMatch, interviews, offers };
  }, [applications]);

  const topMatches = useMemo(() =>
    [...applications].filter(j => j.matchScore != null).sort((a,b) => b.matchScore - a.matchScore).slice(0,4)
  , [applications]);

  const recentActivity = useMemo(() =>
    [...applications].sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt)).slice(0,5)
  , [applications]);

  const greeting = () => { const h = new Date().getHours(); return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening'; };
  const today = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  const openAI = (mode) => {
    const job = applications[0];
    if (job) dispatch({ type:A.SET_MODAL, payload:{ aiMode:mode, aiJobId:job.id } });
    else dispatch({ type:A.SET_MODAL, payload:{ addJob:true } });
  };

  const AI_FEATURES = [
    { id:'resume',      label:'Resume Tailor',       desc:'Rewrite bullets to match any JD',       color:'#4F8EF7', grad:'linear-gradient(135deg,#4F8EF7,#818CF8)', icon:Wand2 },
    { id:'coverletter', label:'Cover Letter',         desc:'Generate tailored cover letters',       color:'#F472B6', grad:'linear-gradient(135deg,#F472B6,#EC4899)', icon:FileText },
    { id:'ats',         label:'ATS Scanner',          desc:'Score your resume vs any job',          color:'#A78BFA', grad:'linear-gradient(135deg,#A78BFA,#8B5CF6)', icon:Target },
    { id:'interview',   label:'Interview Coach',      desc:'15 tailored practice questions',        color:'#FBBF24', grad:'linear-gradient(135deg,#FBBF24,#F59E0B)', icon:Brain },
    { id:'outreach',    label:'Outreach Writer',      desc:'Cold emails & LinkedIn messages',       color:'#34D399', grad:'linear-gradient(135deg,#34D399,#10B981)', icon:Mail },
    { id:'match',       label:'Match Score',          desc:'See your fit for any role instantly',   color:'#F97316', grad:'linear-gradient(135deg,#F97316,#EF4444)', icon:BarChart2 },
  ];

  const stageMax = Math.max(...STAGES.map(s => applications.filter(j => j.stage === s).length), 1);

  return (
    <div className="view-container">
      {/* Hero */}
      <div className="dashboard-hero">
        <div className="dashboard-hero-orb1"/><div className="dashboard-hero-orb2"/>
        <div style={{ position:'relative', zIndex:1 }}>
          <div style={{ fontSize:11, fontWeight:600, color:'rgba(255,255,255,0.55)', textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:6 }}>{today}</div>
          <h1 style={{ fontSize:26, fontWeight:800, color:'white', letterSpacing:'-0.02em', lineHeight:1.2, marginBottom:8 }}>
            {greeting()}{user.name ? `, ${user.name.split(' ')[0]}` : ''}! 👋
          </h1>
          <p style={{ fontSize:14, color:'rgba(255,255,255,0.72)', maxWidth:520, lineHeight:1.65, margin:0 }}>
            Your AI-powered career command center.{' '}
            {stats.active > 0 ? `You have ${stats.active} active application${stats.active !== 1 ? 's' : ''} in progress.` : 'Start tracking your dream job applications today.'}
          </p>
        </div>
      </div>

      {/* Stats */}
      <div className="dash-stats-grid" style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14 }}>
        {[
          { label:'Total Applications', val:stats.total,      icon:Briefcase,  color:'var(--accent)' },
          { label:'Avg Match Score',    val:stats.avgMatch+'%',icon:Target,     color:'var(--success)' },
          { label:'In Interviews',      val:stats.interviews,  icon:Users,      color:'var(--warning)' },
          { label:'Offers Received',    val:stats.offers,      icon:Trophy,     color:'var(--violet)' },
        ].map(s => (
          <div key={s.label} className="dash-stat-card">
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
              <div style={{ width:36, height:36, background:`${s.color}20`, borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center' }}>
                {s.icon && <s.icon size={17} style={{ color:s.color }}/>}
              </div>
              <span className="mono" style={{ fontSize:26, fontWeight:800, color:'var(--text-1)' }}>{s.val}</span>
            </div>
            <div style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.06em' }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Main grid */}
      <div className="dash-main-grid" style={{ display:'grid', gridTemplateColumns:'1fr 340px', gap:20 }}>
        <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
          {/* AI Features */}
          <div className="dash-section">
            <div className="dash-section-header">
              <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                {Sparkles && <Sparkles size={15} style={{ color:'var(--accent)' }}/>}
                <span>AI Superpowers</span>
              </div>
              <span style={{ fontSize:11, color:'var(--text-3)', fontWeight:400 }}>Click any to try it on your tracked jobs</span>
            </div>
            <div className="ai-features-grid" style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:10 }}>
              {AI_FEATURES.map(f => (
                <button key={f.id} className="ai-feature-card" style={{ '--feat-color':f.color, '--feat-grad':f.grad }} onClick={() => openAI(f.id)}>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <div className="ai-feature-icon" style={{ background:f.grad }}>
                      {f.icon && <f.icon size={17} style={{ color:'white' }}/>}
                    </div>
                    <div style={{ fontWeight:700, fontSize:13, color:'var(--text-1)' }}>{f.label}</div>
                  </div>
                  <div style={{ fontSize:11, color:'var(--text-3)', lineHeight:1.5 }}>{f.desc}</div>
                  <div className="ai-feature-arrow">{ChevronRight && <ChevronRight size={13} style={{ color:f.color }}/>}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Quick Actions */}
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:12 }}>Quick Actions</div>
            <div className="quick-actions-grid" style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:10 }}>
              {[
                { label:'Build Resume',      icon:FileText,   view:'resumebuilder', color:'#4F8EF7', desc:'AI-powered wizard'   },
                { label:'Find Jobs',         icon:Search,     view:'jobsearch',     color:'#34D399', desc:'25+ live openings'  },
                { label:'Practice Interview',icon:Mic,        view:'mockinterview', color:'#F472B6', desc:'AI scoring & tips'  },
                { label:'Track a Job',       icon:Plus,       modal:true,           color:'#FBBF24', desc:'Add to Kanban board' },
              ].map(qa => (
                <button key={qa.label} className="quick-action-card" style={{ '--qa-color':qa.color }}
                  onClick={() => qa.modal ? dispatch({ type:A.SET_MODAL, payload:{ addJob:true } }) : dispatch({ type:A.SET_VIEW, payload:qa.view })}>
                  <div className="quick-action-icon">
                    {qa.icon && <qa.icon size={20} style={{ color:qa.color }}/>}
                  </div>
                  <div style={{ fontWeight:700, fontSize:12, color:'var(--text-1)', marginTop:10 }}>{qa.label}</div>
                  <div style={{ fontSize:10, color:'var(--text-3)', marginTop:2 }}>{qa.desc}</div>
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Right column */}
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {/* Top Matches */}
          <div className="dash-section">
            <div className="dash-section-header">
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                {Flame && <Flame size={14} style={{ color:'var(--warning)' }}/>}
                <span>Top Matches</span>
              </div>
              <button className="btn btn-ghost btn-sm" style={{ fontSize:11 }} onClick={() => dispatch({ type:A.SET_VIEW, payload:'jobsearch' })}>
                Find Jobs {ChevronRight && <ChevronRight size={12}/>}
              </button>
            </div>
            {topMatches.length === 0 ? (
              <div style={{ padding:'20px 0', textAlign:'center', color:'var(--text-3)', fontSize:13, lineHeight:1.7 }}>
                <div style={{ fontSize:28, marginBottom:8 }}>🎯</div>
                Add jobs and run the Match Score AI to see top picks here.
              </div>
            ) : topMatches.map(job => (
              <div key={job.id} className="dash-job-row" onClick={() => dispatch({ type:A.SELECT_JOB, payload:job.id })}>
                <CompanyLogo name={job.companyName} size={28}/>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:'var(--text-1)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{job.companyName}</div>
                  <div style={{ fontSize:10, color:'var(--text-3)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{job.roleName}</div>
                </div>
                <div className="mono" style={{ fontSize:12, fontWeight:800, color:getScoreColor(job.matchScore), flexShrink:0 }}>{job.matchScore}%</div>
              </div>
            ))}
            <button className="btn btn-secondary btn-sm" style={{ width:'100%', marginTop:8, fontSize:12 }}
              onClick={() => dispatch({ type:A.SET_VIEW, payload:'jobsearch' })}>
              {Search && <Search size={12}/>} Browse 25+ Job Openings
            </button>
          </div>

          {/* Pipeline */}
          <div className="dash-section">
            <div className="dash-section-header">
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                {Activity && <Activity size={14} style={{ color:'var(--accent)' }}/>}
                <span>Your Pipeline</span>
              </div>
              <button className="btn btn-ghost btn-sm" style={{ fontSize:11 }} onClick={() => dispatch({ type:A.SET_VIEW, payload:'kanban' })}>
                Board {ChevronRight && <ChevronRight size={12}/>}
              </button>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
              {STAGES.map(s => {
                const count = applications.filter(j => j.stage === s).length;
                const meta = STAGE_META[s];
                return (
                  <div key={s} style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:7, height:7, borderRadius:'50%', background:meta.color, flexShrink:0 }}/>
                    <div style={{ fontSize:11, color:'var(--text-2)', width:68, flexShrink:0 }}>{meta.label}</div>
                    <div style={{ flex:1, height:5, background:'var(--border)', borderRadius:3, overflow:'hidden' }}>
                      <div style={{ width:`${(count/stageMax)*100}%`, height:'100%', background:meta.color, borderRadius:3, transition:'width 1s ease-out' }}/>
                    </div>
                    <div className="mono" style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', width:16, textAlign:'right', flexShrink:0 }}>{count}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Recent Activity */}
          {recentActivity.length > 0 && (
            <div className="dash-section">
              <div className="dash-section-header">
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  {Activity && <Activity size={14} style={{ color:'var(--violet)' }}/>}
                  <span>Recent Activity</span>
                </div>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
                {recentActivity.map(job => (
                  <div key={job.id} className="dash-job-row" onClick={() => dispatch({ type:A.SELECT_JOB, payload:job.id })}>
                    <div style={{ width:7, height:7, borderRadius:'50%', background:STAGE_META[job.stage].color, flexShrink:0 }}/>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, fontWeight:600, color:'var(--text-1)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{job.companyName}</div>
                      <div style={{ fontSize:10, color:'var(--text-3)' }}>{formatRelative(job.updatedAt)}</div>
                    </div>
                    <span className="stage-pill" style={{ fontSize:9, padding:'2px 7px', background:STAGE_META[job.stage].bg, color:STAGE_META[job.stage].color, border:'none' }}>{STAGE_META[job.stage].label}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Portal search URL builders
function buildPortalSearchUrl(portal, keyword, location, remote) {
  const kw = encodeURIComponent(keyword || '');
  const loc = encodeURIComponent(location || (remote ? 'Remote' : ''));
  switch (portal) {
    case 'LinkedIn':
      return `https://www.linkedin.com/jobs/search/?keywords=${kw}&location=${loc}${remote ? '&f_WT=2' : ''}`;
    case 'Indeed':
      return `https://www.indeed.com/jobs?q=${kw}&l=${loc}${remote ? '&remotejob=032b3046-06a3-4876-8dfd-474eb5e7ed11' : ''}`;
    case 'Naukri.com': {
      const kwSlug = (keyword||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      const locSlug = (location||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      return `https://www.naukri.com/${kwSlug || 'jobs'}${locSlug ? `-jobs-in-${locSlug}` : '-jobs'}`;
    }
    case 'Glassdoor':
      return `https://www.glassdoor.com/Job/jobs.htm?sc.keyword=${kw}${loc ? '&locT=C&locKeyword='+loc : ''}${remote ? '&remoteWorkType=1' : ''}`;
    case 'Monster':
      return `https://www.monster.com/jobs/search?q=${kw}&where=${loc}`;
    default:
      return `https://www.google.com/search?q=${encodeURIComponent(((keyword||'')+(location?' '+location:'')).trim()+' jobs')}+site:linkedin.com+OR+site:indeed.com`;
  }
}

// Build a guaranteed-working apply URL using job title + company name for precise search
function buildApplyUrl(portal, roleName, companyName, location, remote) {
  const compEnc = encodeURIComponent(companyName || '');
  // Combine role + company for precise search — this always works
  const combined = encodeURIComponent(`${roleName||''} ${companyName||''}`.trim());
  const loc = encodeURIComponent(location || (remote ? 'Remote' : ''));
  switch (portal) {
    case 'LinkedIn':
      return `https://www.linkedin.com/jobs/search/?keywords=${combined}&location=${loc}${remote ? '&f_WT=2' : ''}`;
    case 'Indeed':
      return `https://www.indeed.com/jobs?q=${combined}&l=${loc}`;
    case 'Naukri.com': {
      const kwSlug = (roleName||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      const locSlug = (location||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      return `https://www.naukri.com/${kwSlug || 'jobs'}${locSlug ? `-jobs-in-${locSlug}` : '-jobs'}?company=${compEnc}`;
    }
    case 'Glassdoor':
      return `https://www.glassdoor.com/Job/jobs.htm?sc.keyword=${combined}${loc ? '&locT=C&locKeyword='+loc : ''}`;
    default:
      return `https://www.linkedin.com/jobs/search/?keywords=${combined}&location=${loc}`;
  }
}

function getPortalBadgeClass(portal) {
  const m = { 'LinkedIn':'linkedin', 'Indeed':'indeed', 'Naukri.com':'naukri', 'Glassdoor':'glassdoor' };
  return m[portal] || 'default';
}

function formatSalary(min, max, targetCurrency) {
  if (!min && !max) return '—';
  if (targetCurrency === 'INR') {
    const minINR = min ? (min < 1000000 ? min * 83 : min) : 0;
    const maxINR = max ? (max < 1000000 ? max * 83 : max) : 0;
    const fmt = (val) => {
      if (val >= 10000000) return `₹${(val/10000000).toFixed(1)}Cr`;
      return `₹${(val/100000).toFixed(0)}L`;
    };
    if (minINR && maxINR) return `${fmt(minINR)}–${fmt(maxINR)}`;
    if (minINR) return `From ${fmt(minINR)}`;
    return `Up to ${fmt(maxINR)}`;
  }
  const minUSD = min ? (min >= 1000000 ? min / 83 : min) : 0;
  const maxUSD = max ? (max >= 1000000 ? max / 83 : max) : 0;
  const fmt = (val) => `$${(val/1000).toFixed(0)}K`;
  if (minUSD && maxUSD) return `${fmt(minUSD)}–${fmt(maxUSD)}`;
  if (minUSD) return `From ${fmt(minUSD)}`;
  return `Up to ${fmt(maxUSD)}`;
}
